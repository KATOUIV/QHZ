'standard',quality:0},{type:'standard',quality:0},{type:'standard',quality:0}],openingLines:['阴云低垂，荒野之上隐隐有邪气流转，你知这一战不可避免。','枯藤老树之间，一道阴冷的目光锁定了你的气机。','远处传来桀桀怪笑，一名邪道散修挡在了你的必经之路上。','风沙骤起，天边残阳如血，这场试炼比想象中更为凶险。','你踏入一片荒芜之地，脚下的白骨无声诉说着前人的结局。'],rollLines:['你并指如剑，内力破体而出，六枚骰子在虚空中划出六道弧线。','掌心雷光微闪，骰子应声而起，带起一阵呼啸的风声。','你以神念催动骰子，它们如受驱使的萤火虫般盘旋上升。','一口内力喷薄而出，化作六道青光，骰影在其中若隐若现。','你脚踏七星步，手中灵诀一变，六枚骰子如流星赶月般飞出。'],lockLines:['你以神识为针，在虚空中织就一张细密的灵网，缚住了破绽。','那枚骰子微微一滞，似是被无形之力牵引，归入你的掌控。','内力化作丝线，缠绕于骰子之上，你轻轻一提，将其锁定。','你眼中精光一闪，心神中的神念如箭般射出，正中破绽。','掌心灵纹骤亮，那枚骰子如倦鸟投林，稳稳落入你的阵中。'],bustLines:['骰子散落一地，竟无一点可成阵势，你心中暗道不妙。','六枚骰子同时黯淡下去，如被泼了一盆冷水的炭火，尽数熄灭。','你刚要收阵，却发现气机紊乱如麻，这一手竟成了废招。','天道似在捉弄于你，骰子翻滚着落入死角，失手无情降临。','一阵阴风吹过，你手中的气机被生生吹散，反噬之痛袭来。'],settleLines:['你双手收招，将散乱的气机尽数收回体内，此轮暂且作罢。','招式收拢如幕布垂下，你吐出一口浊气，气息渐趋平稳。','最后一枚骰子没入你的袖中，这一回合的交锋暂告段落。','你以神念抚平躁动的灵脉，如安抚一匹受惊的烈马。','气息回落如退潮，你睁开双目，对面之敌仍在虎视眈眈。'],enemyTurnLines:['对面的邪修舔了舔干裂的嘴唇，眼中闪烁着贪婪的光芒。','阴风再起，那散修手中多了一枚漆黑的骨骰，邪气四溢。','你察觉到对方的气机正在攀升，如毒蛇蓄势，随时可能暴起。','邪道散修怪笑一声，周身的黑雾开始疯狂翻涌旋转。','他的影子在地上扭曲变形，仿佛有无数怨灵正在嘶吼。'],allRerollLines:['六枚骰子同时发出清鸣，如编钟齐奏，天道准许你再开一局！','灵光冲天而起，在空中绘就一幅玄奥的阵图，全骰重掷！','你感受到体内某处桎梏松动，六枚骰子如获新生，再度跃起。','天地间的内力如潮水般涌来，六枚骰子沐浴其中，焕发出第二春。','一道彩虹横跨心神，六枚骰子沿虹而行，再次落入你的掌中。'],critLines:['四枚骰子同出一气，虚空之中隐隐有龙吟之声，暴击天成！','你目睹一道金光自阵中迸发，四同连星引动了上古禁制。','灵力如决堤之洪，四枚同点骰子释放出的威压令虚空震颤。','天地变色，四枚骰子的气机拧成一股，化作一柄无坚不摧的利剑。','这一击如彗星袭月，四同之阵带来的伤害远超你的预期。'],winLines:['邪修的身影在风中渐渐消散，你以一己之力拨开了这片阴云。','胜负已定，你望着对手倒下的身影，心中却无半分喜色。','最后一缕邪气被你以真火焚尽，这场试炼终于落下了帷幕。','你收拢招式，体内的灵力比战前更加凝实，武心又进了一步。','残阳依旧，可荒野之上的邪气已散，这都是你的功劳。'],loseLines:['邪气侵入经脉，你单膝跪地，以剑撑身，却再也无力站起。','对手的笑声在耳边回荡，你眼前一黑，意识如断线的风筝远去。','这一战你输得心服口服，可你知道，这只是暂时的蛰伏。','鲜血从嘴角溢出，你望着天边的最后一抹亮色，缓缓倒下。','武心虽未碎，可肉身已不堪重负，你终究没能跨过这道坎。']},hard:{difficulty:'hard',title:'困难凶局',targetScore:3e3,playerLabel:'渡劫人',playerName:'本我',enemyLabel:'凶局当前',enemyName:'血衣楼主',enemyHp:6e3,playerHpBase:4e3,enemyEquipment:[{type:'standard',quality:2},{type:'standard',quality:2},{type:'standard',quality:2},{type:'standard',quality:1},{type:'standard',quality:1},{type:'standard',quality:1}],openingLines:['血色残阳染红了整片荒原，远处楼阁的轮廓如一头蛰伏的凶兽。','你踏入了血衣楼的领地，空气里弥漫着令人作呕的血腥味。','乌鸦的啼叫撕裂了死寂，你知道，这一战将比以往任何一次都惨烈。','脚下的土地微微震颤，那是血衣楼主的气息在向外蔓延。','夜幕低垂，一轮血月悬挂天际，为这场凶局披上了不祥的外衣。'],rollLines:['你咬破指尖，以血为引，六枚骰子在血光中骤然显现。','内力如怒涛般从丹田涌出，骰子在这股狂暴的力量中上下翻飞。','你双手结出一道繁复的法印，虚空裂开六道缝隙，骰影从中射出。','一声低喝自喉间迸发，灵力化作六道赤芒，将六枚骰子卷入高空。','你以神识点燃心神中的三昧真火，骰子在火焰中浴火而生。'],lockLines:['鲜血滴落在骰子之上，那枚骰子如饮了醇酒般微微泛红，被你牢牢锁定。','你以一缕神念化作锁链，穿透虚空，将破绽死死缚在当场。','内力凝聚如实质，化作一只无形的手掌，将骰子攥入掌心。','你眼中倒映着骰子的光芒，那光芒越来越盛，最终被你以意念封禁。','招式中的某处节点骤然亮起，你顺势一引，将那枚骰子纳入正轨。'],bustLines:['六枚骰子如断线的木偶，在空中胡乱翻滚，最终散落一地沉寂。','你刚要收阵，却发现气机如脱缰的野马，根本无从驾驭，失手！','一阵刺耳的碎裂声在心神中炸响，六枚骰子同时黯淡，归于虚无。','天道似在嘲笑你的狂妄，骰子纷纷落入最不利的方位，反噬来袭。','你喷出一口鲜血，骰子在这股血雾中失去了方向，此轮尽废。'],settleLines:['你以袖抹去嘴角的血迹，强行将躁动的气机压回丹田深处。','招式如一张被撕裂的锦缎，你以神念一针一线地将其缝合收拢。','最后一枚骰子没入你的眉心，你身形微晃，显然消耗不小。','你盘膝而坐，运转心法三个周天，才将这一轮的反噬之力化解。','气息如退潮般回落，可你心中的战意却如燎原之火，越烧越旺。'],enemyTurnLines:['血衣楼主的身影在月光下拉得很长，他手中的折扇轻轻一拍，杀机顿现。','对面的气息如一座即将喷发的火山，你甚至能闻到硫磺的味道。','他嘴角勾起一抹残忍的弧度，血色的内力自他周身毛孔中溢出。','血衣楼主轻吟一声，那声音如催命的符咒，令人毛骨悚然。','你察觉到脚下的土地正在龟裂，那是对方的气势在疯狂攀升。'],allRerollLines:['六枚骰子同时浴血而鸣，如凤凰涅槃，在毁灭中获得了新生！','你以精血为祭，唤起了天道的一丝怜悯，六枚骰子重归掌中。','虚空之中降下一道血色雷霆，劈在六枚骰子之上，它们竟再度跃起！','生死一线间，你体内的潜能被彻底激发，六枚骰子如获神助。','六芒阵图在血光中重新绘制，这一次，每一笔都带着你的执念。'],critLines:['四枚骰子同鸣如丧钟，血衣楼主的面色第一次变了，暴击已成！','你目睹四道血光冲天而起，在空中交织成一只狰狞的鬼首，威力倍增。','灵力如怒龙出海，四同之阵释放出的冲击波将周围的砂石尽数震碎。','这一击如万箭穿心，四枚同点骰子化作四道血色流星，直取要害。','天地为之色变，四同连星引动了血月之力，这一击超出了常理。'],winLines:['血衣楼主的身影在血光中分崩离析，你以重伤之躯换来了这场惨胜。','楼阁在身后轰然倒塌，你拖着疲惫的身躯走出废墟，曙光已在前方。','这一战你赢了，可你也付出了代价，衣衫上的血迹便是最好的见证。','你以剑拄地，大口喘息，可眼中的光芒却比任何时候都更加明亮。','凶局终破，血月隐去，你仰天长啸，声音中满是劫后余生的快意。'],loseLines:['血衣楼主的折扇轻轻点在你的眉心，你感到神识如冰雪般消融。','你倒在血泊之中，望着那轮血月，意识逐渐被黑暗吞噬。','这一战你输得彻彻底底，可你心中的那团火，仍在灰烬中微微闪烁。','对手的笑声如夜枭啼鸣，你闭上双眼，等待着命运的裁决。','经脉尽断，丹田破碎，可你的嘴唇仍在翕动，默念着未完的心法。']},extreme:{difficulty:'extreme',title:'极难绝境',targetScore:5e3,playerLabel:'问道者',playerName:'本我',enemyLabel:'绝境逢生',enemyName:'幽冥鬼帝',enemyHp:8e3,playerHpBase:4500,enemyEquipment:[{type:'standard',quality:3},{type:'standard',quality:3},{type:'standard',quality:3},{type:'standard',quality:2},{type:'standard',quality:2},{type:'standard',quality:2}],openingLines:['九幽之下，黄泉翻涌，你站在生与死的交界线上，无路可退。','鬼哭狼嚎之声不绝于耳，幽冥鬼帝的宫殿在迷雾中若隐若现。','你深吸一口气，却吸入了满口阴寒之气，肺叶如被万针刺穿。','四周的烛火一盏接一盏地熄灭，黑暗中，有一双眼睛正注视着你。','这一战，是武心的拷问，是生死的抉择，是江湖上最险峻的绝壁。'],rollLines:['你燃烧了三十年寿元，以生命为代价，唤出了六枚随身骰子。','内力如岩浆般在经脉中奔涌，骰子在这股毁灭性的力量中剧烈震颤。','你以神识撕裂了自己的心神，从中取出了六枚蕴养多年的骰子。','一声长啸震碎了方圆十里的鬼雾，六枚骰子在这声长啸中破空而出。','你咬碎舌根，以精血为墨，在虚空中书写了一道禁忌法咒。'],lockLines:['你以一根肋骨为代价，在虚空中铸就了一道锁链，将破绽牢牢禁锢。','神识化作万千细丝，穿透了骰子的每一寸表面，将其彻底掌控。','你伸出手，那只手已白骨森森，可仍死死攥住了那枚骰子。','内力凝聚到极限，化作一颗璀璨如星辰的光点，没入骰子核心。','你以武心起誓，以灵魂为押，那枚骰子在这股执念中归于静止。'],bustLines:['六枚骰子同时炸裂，碎片如利刃般刺入你的四肢百骸，痛不欲生。','你刚要收阵，却发现心神已是一片废墟，六枚骰子尽数湮灭。','天道在此刻闭上了双眼，骰子如坠入无底深渊，再无半点回应。','一股阴冷的气息顺着你的经脉逆流而上，骰子在这股气息中尽数腐朽。','你仰天喷出一道血箭，六枚骰子在血箭中消融，此轮万劫不复。'],settleLines:['你以残破的身躯强行收拢招式，每一步都如在刀尖上起舞。','气机如溃堤之洪，你以神识为堤坝，死死拦住这股狂暴的力量。','最后一枚骰子归位时，你已七窍流血，可眼中的光芒仍未熄灭。','你盘膝于白骨之上，运转着残缺不全的心法，勉强稳住了气息。','这一轮的消耗远超你的想象，可你知道，停下就意味着死亡。'],enemyTurnLines:['幽冥鬼帝缓缓抬起手，那只手苍白如纸，却蕴含着令万物凋零的力量。','对面的鬼影在虚实之间不断切换，你甚至无法锁定他的真实位置。','鬼帝的笑声如九幽寒风，所过之处，连空气都被冻结成霜。','你察觉到无数怨灵正从地底爬出，它们的目标只有一个——你。','幽冥鬼帝睁开了双眼，那双眼睛里没有任何情感，只有无尽的虚无。'],allRerollLines:['六枚骰子在湮灭的边缘被一股神秘力量拉回，如时光倒流般重获新生！','你以武心向天道借了一息时间，六枚骰子在这息之间再度凝聚。','黄泉路上，你硬生生止住了脚步，六枚骰子从你破碎的心神中飞出。','生死簿上，你的名字被一道金光划去，六枚骰子感应到了这道光芒。','六芒阵图在废墟中重新绘制，每一笔都蘸着你的鲜血，全骰重掷！'],critLines:['四枚骰子同鸣如天崩，幽冥鬼帝的身形第一次出现了颤抖，暴击！','你目睹四道金光刺破了九幽的黑暗，那是天道对你最后的垂怜。','灵力如开天辟地之初的混沌之力，四同之阵释放出的光芒令鬼雾退散。','这一击如后羿射日，四枚同点骰子化作四支金箭，直射鬼帝心口。','天地法则在这一刻出现了裂痕，四同连星的力量超越了这个世界的极限。'],winLines:['幽冥鬼帝的身影在金光中如烟云散去，你以凡人之躯，斩落了神明。','九幽之下第一次照进了阳光，你站在这片废墟之上，如新生的太阳。','这一战你赢了，可你也老了三十岁，发丝间已有了斑驳的白霜。','你以剑为杖，一步一血印地走出幽冥，身后的宫殿正在缓缓崩塌。','绝境终破，你的武心在这生死之间淬炼得如同玄铁，再无畏惧。'],loseLines:['幽冥鬼帝的手指轻轻划过你的咽喉，你感到生命正在飞速流逝。','你倒在黄泉岸边，望着对岸的彼岸花，意识如沙漏中的细沙般流逝。','这一战你输了，可你的灵魂却在狂笑，因为你已经触碰到了道的边缘。','鬼帝将你收入了万魂幡中，你的意识在无数怨灵的嘶吼中逐渐消散。','丹田破碎，道基尽毁，可你的嘴唇仍在翕动，重复着那句未完的心诀。']},life_death:{difficulty:'life_death',title:'生死对决',targetScore:1e4,playerLabel:'逆天者',playerName:'本我',enemyLabel:'生死对决',enemyName:'血衣楼主',enemyHp:1e4,playerHpBase:5e3,enemyEquipment:[{type:'wudang',quality:0},{type:'wudang',quality:0},{type:'standard',quality:4},{type:'standard',quality:4},{type:'standard',quality:3},{type:'tianji',quality:0}],openingLines:['苍穹如墨，万星寂灭，嗜血楼主的身影遮天蔽日，如末世降临。','你立于虚空之上，脚下是破碎的山河，面前是令众生颤栗的楼主。','这一战无关胜负，只关生死；无关荣辱，只关武心。','楼主睁开了那双猩红的眼眸，目光所及之处，万物尽数凋零。','天地间的内力在这一刻凝固，时间仿佛静止，只剩下你与他，隔着万丈红尘对视。'],rollLines:['你燃烧了毕生修为，以神魂为薪，点燃了六枚承载着最后希望的随身骰子。','内力如银河倒挂，从你体内倾泻而出，骰子在这股星河之力中冉冉升起。','你撕裂了虚空，从混沌深处取出了六枚上古遗留的名震骰子。','一声长啸贯穿三界，六枚骰子在这声长啸中化作六道流光，直冲霄汉。','你以命为注，以魂为筹，在天地之间掷出了这决定众生命运的一手。'],lockLines:['你以一根指骨为代价，在虚空中铸就了一道不灭锁链，将破绽永恒禁锢。','神识化作万千星河，每一颗星子都是你的执念，将骰子牢牢钉在命运之轮上。','你伸出手，那只手已血肉模糊，可仍死死攥住了那枚决定生死的骰子。','内力凝聚到超越极限，化作一轮微型的太阳，将骰子熔铸在你的掌心。','你以三生三世的情缘为押，以百战沉浮的执念为锁，将破绽封印在永恒之中。'],bustLines:['六枚骰子同时崩解，化作漫天流萤，每一颗流萤都是你破碎的武心。','你刚要收阵，却发现天地法则已被楼主篡改，六枚骰子尽数堕入无间。','天道在此刻彻底背弃了你，骰子如坠入永恒的黑暗，再无半点光明。','楼主轻轻吹了一口气，你凝聚的全部气机如烛火般被瞬间吹灭。','你仰天喷出一道金色的血箭，六枚骰子在血箭中化作飞灰，此轮万劫不复。'],settleLines:['你以残破的神魂强行收拢招式，每一次呼吸都如在炼狱中煎熬。','气机如星河崩坠，你以意志为堤坝，在毁灭的边缘死死守住了最后一丝清明。','最后一枚骰子归位时，你的肉身已开始风化，可战意仍如燎原之火。','你盘膝于虚空之中，运转着从天道偷来的一息法则，勉强稳住了即将消散的存在。','这一轮的消耗让你的寿元再减五十载，可你知道，停下就意味着三界的终结。'],enemyTurnLines:['嗜血楼主缓缓抬起了手，那只手遮天蔽日，投下的阴影覆盖了整个九州。','楼主的笑声如雷霆万钧，每一声笑都令大地崩裂，江河倒流。','你察觉到楼主的气息正在吞噬周围的一切，连光线都无法逃脱他的引力。','他的目光如两柄血色的利剑，穿透了你的肉身，直刺你的灵魂深处。','楼主轻轻一踏，虚空如镜面般碎裂，无数空间碎片化作利刃向你袭来。'],allRerollLines:['六枚骰子在毁灭的边缘被一道来自远古的光芒拉回，如盘古开天般重获新生！','你以武心向天道借了一线生机，六枚骰子在这一线之间再度凝聚成形。','生死簿上，你的名字被一道来自上古的符咒划去，六枚骰子感应到了这道符咒。','生死局中，你的魂魄被强行拉回，六枚骰子从你即将消散的意志中飞出。','六芒阵图在虚空中重新绘制，每一笔都蘸着你的神血，全骰重掷，逆天改命！'],critLines:['四枚骰子同鸣如创世之钟，楼主的身影第一次出现了裂痕，暴击天成！','你目睹四道混沌之光刺破了楼主的护体魔焰，那是开天辟地之初的原始力量。','灵力如宇宙大爆炸般的混沌之力，四同之阵释放出的光芒令日月无光。','这一击如女娲补天时的五色神石，四枚同点骰子化作四道神光，直射楼主本源。','天地法则在这一刻彻底崩解，四同连星的力量超越了天道，直达混沌之初。'],winLines:['楼主的身影在混沌之光中如烟云散去，你以蝼蚁之躯，斩落了九天之上的神明。','苍穹之上第一次出现了曙光，你立于虚空之中，如开天辟地后的第一缕晨光。','这一战你赢了，可你的白发已如雪，可你拯救的众生正在脚下欢呼。','你以断剑为杖，一步一步走出虚空，身后的魔域正在缓缓崩塌，化为净土。','生死对决终了，你的武心在这天地之间淬炼得如同永恒之星，照耀万古。'],loseLines:['楼主的手指轻轻点在你的眉心，你感到神魂如冰雪般消融，归于虚无。','你倒在虚空之中，望着那轮永恒的血月，意识如宇宙中的尘埃般飘散。','这一战你输了，可你的笑声却在三界回荡，因为你已经触碰到了天道的边缘。','楼主将你收入了混沌鼎中，你的意识在无尽的炼化中逐渐与大道合一。','神魂破碎，道基尽毁，可你的最后一丝意念仍在天地之间游荡，守护着众生。']}},Pl=['你以神识为丝，轻轻缚住了那枚骰子，破绽初定。','指尖轻点，骰子微微一颤，已归入你的掌控之
