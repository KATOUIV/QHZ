<body>
  <div class="wlog-container">
    <div class="wlog-header" id="wlog-header">
      <span class="wlog-title" id="wlog-time">正在获取时间...</span>
      <span class="wlog-icon" id="wlog-icon">▼</span>
    </div>
    <div class="wlog-content" id="wlog-body">
      <div class="wlog-loading">正在展开世界状况...</div>
    </div>
  </div>

  <script type="module">
    /* ========== 获取消息内容 ========== */
    function getMessageData() {
      var chatMessages = getChatMessages(getCurrentMessageId());
      if (!chatMessages || chatMessages.length === 0) {
        return null;
      }
      return chatMessages[0].message;
    }

    /* ========== 解析数据 ========== */
    function parseData(messageText) {
      /* 匹配标签及可能的 time 属性 */
      var match = messageText.match(/<wlog(?:[^>]*time="([^"]+)")?[^>]*>([\s\S]*?)<\/wlog>/);
      if (match) {
        return {
          time: match[1] || '世界状况流转',
          text: (match[2] || '').trim()
        };
      }
      return { time: '世界状况', text: '' };
    }

    /* ========== 渲染界面 ========== */
    function renderPage(data) {
      /* 渲染折叠栏标题（时间） */
      jQuery('#wlog-time').text(data.time);
      
      if (!data.text) {
        jQuery('#wlog-body').html('<div class="wlog-loading">暂无天下变动记录。</div>');
        return;
      }

      /* 按 *** 分割区块 */
      var blocks = data.text.split(/\*\*\*/);
      var html = '';
      
      blocks.forEach(function(block) {
        var content = block.trim();
        if (!content) return;
        
        var lines = content.split('\n');
        var blockHtml = '<div class="wlog-block">';
        
        lines.forEach(function(line) {
          var trimmed = line.trim();
          if (!trimmed) return;
          
          /* 清理可能存在的孤立 <br> 标签 */
          trimmed = trimmed.replace(/<br\s*\/?>/ig, '');
          
          /* 提取【】作为小标题高亮 */
          if (trimmed.startsWith('【') && trimmed.indexOf('】') !== -1) {
            var closeIdx = trimmed.indexOf('】');
            var title = trimmed.substring(0, closeIdx + 1);
            var rest = trimmed.substring(closeIdx + 1).trim();
            blockHtml += '<div class="wlog-block-title">' + title + '</div>';
            if (rest) {
              blockHtml += '<p class="wlog-text">' + rest + '</p>';
            }
          } else {
            blockHtml += '<p class="wlog-text">' + trimmed + '</p>';
          }
        });
        
        blockHtml += '</div>';
        html += blockHtml;
      });

      jQuery('#wlog-body').html(html);
    }

    /* ========== 主函数 ========== */
    function init() {
      try {
        var messageText = getMessageData();
        if (!messageText) {
          jQuery('#wlog-body').html('<div class="wlog-loading">❌ 无法获取世界状况消息</div>');
          return;
        }
        
        var data = parseData(messageText);
        renderPage(data);

        /* 绑定折叠展开事件 */
        jQuery('#wlog-header').off('click').on('click', function() {
          jQuery('#wlog-body').slideToggle(250);
          jQuery('#wlog-icon').toggleClass('open');
        });
      } catch (error) {
        console.error("世界状况渲染错误:", error);
        jQuery('#wlog-body').html('<div class="wlog-loading">❌ 渲染失败：' + error.message + '</div>');
      }
    }

    jQuery(function() { init(); });
  </script>
</body>
</html>
