<style>/* ═══════════════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════════════ */

/* ── CSS 自定义属性 ── */
:root {
  --rarity-common: #b0b0b0;

  --rarity-rare: #4fc3f7;
  --rarity-rare-glow: rgba(79, 195, 247, 0.4);
  --rarity-epic: #ce93d8;
  --rarity-epic-glow: rgba(206, 147, 216, 0.45);
  --rarity-legendary: #ffd54f;
  --rarity-legendary-glow: rgba(255, 213, 79, 0.5);
  --rarity-mythic: #ff6d6d;

  --glass-bg: rgba(15, 15, 25, 0.55);
  --glass-border: rgba(255, 255, 255, 0.12);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  --glass-blur: 16px;

  --text-primary: #f0e6d3;
  --text-secondary: #b8a9c9;
  --text-accent: #ffd54f;

  --space-xs: 4px; --space-sm: 8px; --space-md: 12px;
  --space-lg: 16px; --space-xl: 24px;

  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 20px; --radius-full: 9999px;

  --font-display: 'STKaiti', 'KaiTi', 'Noto Serif SC', 'SimSun', serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
  --font-art: 'STXingkai', 'KaiTi', 'STKaiti', 'Ma Shan Zheng', cursive;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; max-width: 100%;
  height: auto; min-height: 0;
  overflow: visible;
  background: transparent !important;
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}

html.ka-folded, html.ka-folded body, body.ka-folded { overflow: visible; height: fit-content; min-height: 0; }
html.ka-expanded, html.ka-expanded body, body.ka-expanded { overflow: hidden; height: auto; min-height: 0; }
body.ka-expanded #ka-collapsed { display: none; }
body.ka-folded #main-modal { display: none !important; }

#ka-collapsed {
  position: relative; width: 100%; max-width: 100%;
  min-height: 44px; display: flex; align-items: center; justify-content: center;
  padding: 4px 0; cursor: pointer; touch-action: manipulation;
}

/* ── 文字艺术效果 ── */
.text-art {
  font-family: var(--font-art); font-weight: 700;
  text-shadow:
    0 0 10px currentColor, 0 0 20px currentColor,
    1px 1px 0 rgba(0,0,0,0.8), -1px -1px 0 rgba(0,0,0,0.8),
    1px -1px 0 rgba(0,0,0,0.8), -1px 1px 0 rgba(0,0,0,0.8);
  -webkit-text-stroke: 1px rgba(0,0,0,0.6);
  paint-order: stroke fill; letter-spacing: 0.05em;
}

/* ── 毛玻璃 ── */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
}

.glass-heavy {
  background: rgba(10,10,20,0.7);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
}

/* ── 七彩流光 ── */
@keyframes rainbow-flow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes rainbow-glow {
  0% { box-shadow: 0 0 8px rgba(255,109,109,0.5), 0 0 16px rgba(255,109,109,0.3); }
  16% { box-shadow: 0 0 8px rgba(255,213,79,0.5), 0 0 16px rgba(255,213,79,0.3); }
  33% { box-shadow: 0 0 8px rgba(79,195,247,0.5), 0 0 16px rgba(79,195,247,0.3); }
  50% { box-shadow: 0 0 8px rgba(206,147,216,0.5), 0 0 16px rgba(206,147,216,0.3); }
  66% { box-shadow: 0 0 8px rgba(165,214,167,0.5), 0 0 16px rgba(165,214,167,0.3); }
  83% { box-shadow: 0 0 8px rgba(255,183,77,0.5), 0 0 16px rgba(255,183,77,0.3); }
  100% { box-shadow: 0 0 8px rgba(255,109,109,0.5), 0 0 16px rgba(255,109,109,0.3); }
}

.rainbow-text {
  background: linear-gradient(270deg, #ff6d6d, #ffd54f, #4fc3f7, #ce93d8, #a5d6a7, #ffb74d, #ff6d6d);
  background-size: 600% 100%;
  animation: rainbow-flow 3s linear infinite;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ── 稀有度色彩 ── */
.rarity-common { color: var(--rarity-common); }
.rarity-rare { color: var(--rarity-rare); }
.rarity-epic { color: var(--rarity-epic); }
.rarity-legendary { color: var(--rarity-legendary); }
.rarity-mythic {
  background: linear-gradient(270deg, #ff6d6d, #ffd54f, #4fc3f7, #ce93d8, #ff6d6d);
  background-size: 400% 100%; animation: rainbow-flow 3s linear infinite;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ── 收起触发球 ── */
#floating-ball {
  position: relative; width: 44px; height: 44px; border-radius: 50%;
  flex-shrink: 0; cursor: pointer; touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s ease, box-shadow 0.3s ease;
}
#floating-ball:active { transform: scale(0.95); }
#floating-ball .ball-icon { width: 24px; height: 24px; pointer-events: none; }
#floating-ball .ball-ring {
  position: absolute; inset: -3px; border-radius: 50%; pointer-events: none;
  border: 2px solid transparent;
  background: linear-gradient(270deg, #ff6d6d, #ffd54f, #4fc3f7, #ce93d8, #ff6d6d) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  background-size: 400% 100%; animation: rainbow-flow 4s linear infinite;
}

/* ── 主面板（iframe 内联展开） ── */
#main-modal {
  position: relative; width: 100%; max-width: 100%;
  height: var(--ka-panel-height, 480px);
  max-height: var(--ka-panel-max, 520px);
  min-height: 320px;
  border-radius: var(--radius-lg); z-index: 1;
  display: none; flex-direction: column; overflow: hidden;
}
#main-modal.open { display: flex; }
#main-modal .modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
}
#main-modal .modal-title {
  font-family: var(--font-art); font-size: 15px; color: var(--text-primary);
  text-shadow: 0 0 8px rgba(255,213,79,0.4); letter-spacing: 0.08em;
}

/* ── 搜索栏 ── */
.search-container { padding: var(--space-sm) var(--space-lg); flex-shrink: 0; }
#search-input {
  width: 100%; height: 38px; padding: 0 36px 0 12px;
  border-radius: var(--radius-full);
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06);
  color: var(--text-primary); font-size: 14px; font-family: var(--font-body);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
#search-input:focus {
  border-color: rgba(255,213,79,0.4);
  box-shadow: 0 0 12px rgba(255,213,79,0.15);
}
#search-input::placeholder { color: rgba(255,255,255,0.25); }
.search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 22px; height: 22px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.1); color: var(--text-secondary);
  cursor: pointer; display: none; align-items: center; justify-content: center;
  font-size: 12px; padding: 0;
}
.search-clear.visible { display: flex; }

/* ── 分类标签 ── */
.category-tabs {
  display: flex; gap: 6px; padding: var(--space-sm) var(--space-lg);
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
}
.category-tabs::-webkit-scrollbar { display: none; }
.category-tab {
  flex-shrink: 0; padding: 5px 12px; border-radius: var(--radius-full);
  border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
  color: var(--text-secondary); font-size: 12px; font-family: var(--font-body);
  cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.category-tab.active {
  background: rgba(255,213,79,0.15); border-color: rgba(255,213,79,0.3);
  color: var(--text-accent);
}
.category-tab:active { transform: scale(0.95); }

/* ── 条目列表 ── */
.entry-list {
  flex: 1; overflow-y: auto; padding: var(--space-sm) var(--space-lg);
  -webkit-overflow-scrolling: touch;
}
.entry-list::-webkit-scrollbar { width: 3px; }
.entry-list::-webkit-scrollbar-track { background: transparent; }
.entry-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* ── 条目卡片 ── */
.entry-card {
  display: flex; align-items: center; gap: var(--space-md);
  padding: var(--space-md); margin-bottom: var(--space-sm);
  border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03); cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden; min-height: 48px;
}
.entry-card:active { transform: scale(0.98); background: rgba(255,255,255,0.06); }
.entry-card .card-indicator { width: 3px; height: 28px; border-radius: 3px; flex-shrink: 0; }
.entry-card .card-indicator.ind-common { background: var(--rarity-common); }
.entry-card .card-indicator.ind-rare { background: var(--rarity-rare); box-shadow: 0 0 6px var(--rarity-rare-glow); }
.entry-card .card-indicator.ind-epic { background: var(--rarity-epic); box-shadow: 0 0 8px var(--rarity-epic-glow); }
.entry-card .card-indicator.ind-legendary { background: var(--rarity-legendary); box-shadow: 0 0 10px var(--rarity-legendary-glow); }
.entry-card .card-indicator.ind-mythic {
  background: linear-gradient(180deg, #ff6d6d, #ffd54f, #4fc3f7, #ce93d8);
  background-size: 100% 300%; animation: rainbow-flow 3s linear infinite;
  box-shadow: 0 0 12px rgba(255,109,109,0.5);
}
.entry-card .card-info { flex: 1; min-width: 0; }
.entry-card .card-name {
  font-family: var(--font-art); font-size: 14px; line-height: 1.3; word-break: break-all;
}
.entry-card .card-keys { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.entry-card .card-key-tag {
  font-size: 10px; padding: 1px 6px; border-radius: var(--radius-full);
  background: rgba(255,255,255,0.06); color: var(--text-secondary);
  white-space: nowrap; max-width: 80px; overflow: hidden; text-overflow: ellipsis;
}
.entry-card .card-arrow {
  flex-shrink: 0; width: 16px; height: 16px; color: var(--text-secondary); opacity: 0.5;
}

#detail-modal {

  display: flex; align-items: center; justify-content: center;

/* ── 通知提示 ── */

  z-index: 100002; display: flex; flex-direction: column; gap: 8px; pointer-events: none;

.toast.error { border-color: rgba(255,109,109,0.3); }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toast-out {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-12px); }
}

/* ── 空状态 ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px; color: var(--text-secondary); text-align: center;
}
.empty-state .empty-icon { width: 40px; height: 40px; margin-bottom: var(--space-md); opacity: 0.3; }
.empty-state .empty-text { font-size: 13px; line-height: 1.5; }

/* ── 响应式 ── */
@media (max-width: 360px) {
  .category-tab { font-size: 11px; padding: 4px 10px; }
  .entry-card .card-name { font-size: 13px; }
}

<script>"use strict";
(() => {
  // src/keyword-activator/ui/FloatingBall.ts
  var FloatingBall = class {
    constructor(onToggle) {
      this.onToggle = onToggle;
      this.el = this.create();
      this.el.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        this.onToggle();
      });
    }
    create() {
      const ball = document.createElement("div");
      ball.id = "floating-ball";
      ball.className = "glass-heavy";
      ball.setAttribute("role", "button");
      ball.setAttribute("tabindex", "0");
      ball.setAttribute("aria-label", "展开关键词激活器");
      ball.innerHTML = `
      <div class="ball-ring"></div>
      <svg class="ball-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10" stroke="url(#ball-grad)" />
        <circle cx="12" cy="12" r="5" />
        <circle cx="12" cy="12" r="2" fill="currentColor" />
        <defs>
          <linearGradient id="ball-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ff6d6d" />
            <stop offset="33%" stop-color="#ffd54f" />
            <stop offset="66%" stop-color="#4fc3f7" />
            <stop offset="100%" stop-color="#ce93d8" />
          </linearGradient>
        </defs>
      </svg>`;
      ball.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          this.onToggle();
        }
      });
      return ball;
    }
    destroy() {
      this.el.remove();
    }
