flat();\n\n    const TIMELINE_REGION_MAP = {\n      \'A\': [\'平安\'],\n      \'C4\': [\'现代·东京\',\'现代·地方\'],\n      \'D2\': [\'现代·东京\'],\n      \'E1\': [\'现代·东京\',\'现代·京都\'],\n      \'F2\': [\'现代·地方\',\'现代·东京\'],\n      \'G\': [\'现代·东京\'],\n      \'H\': [\'现代·东京\',\'现代·京都\'],\n      \'J7\': [\'现代·东京\',\'现代·京都\'],\n      \'K\': [\'现代·东京\',\'现代·地方\',\'死灭回游\'],\n      \'M\': [\'现代·东京\',\'新宿决战\'],\n      \'O\': [\'现代·东京\',\'现代·京都\',\'战后\']\n    };\n\n    function getLocationsForTimeline(timeline) {\n      if (!timeline) return [];\n      const key = timeline.key || \'\';\n      const era = timeline.era || \'\';\n      if (key.startsWith(\'A\') || era.includes(\'平安\')) return LOCATION_REGIONS[\'平安\'];\n      const regionKeys = TIMELINE_REGION_MAP[key];\n      if (regionKeys) {\n        const set = new Set(timeline.locations || []);\n        regionKeys.forEach(rk => {\n          const arr = LOCATION_REGIONS[rk];\n          if (arr) arr.forEach(loc => set.add(loc));\n        });\n        return Array.from(set);\n      }\n      // Dynamic fallback: expand any timeline-listed location to its whole region\n      const set = new Set(timeline.locations || []);\n      (timeline.locations || []).forEach(loc => {\n        for (const [region, places] of Object.entries(LOCATION_REGIONS)) {\n          if (places.includes(loc)) places.forEach(p => set.add(p));\n        }\n      });\n      if (set.size) return Array.from(set);\n      if (era.includes(\'东京\') || era.includes(\'现代\')) return LOCATION_REGIONS[\'现代·东京\'];\n      if (era.includes(\'京都\')) return LOCATION_REGIONS[\'现代·京都\'];\n      return LOCATION_FALLBACK;\n    }\n\n    /* ================= Life background pool ================= */\n    const BACKGROUNDS = [\n      { name:\'普通之家·术式觉醒\', desc:\'平凡的工薪家庭长大，某日突发诅咒事件中觉醒术式，被高专发掘。\', attrs:{家境:45,天赋:55,家庭环境:60}, special:\'普通人\', rarity:\'common\' },\n      { name:\'单亲家庭·独自强韧\', desc:\'由单亲母亲抚养长大，早早学会自立，咒力在孤独中缓慢成型。\', attrs:{家境:35,天赋:50,家庭环境:50}, special:\'普通人\', rarity:\'common\' },\n      { name:\'乡村出身·野生术师\', desc:\'在偏远山村长大，靠本能猎杀低级咒灵，未受过系统训练。\', attrs:{家境:30,天赋:55,家庭环境:55}, special:\'普通人\', rarity:\'uncommon\' },\n      { name:\'富裕家庭·精英教育\', desc:\'家境优渥，从小接受私人咒术训练，理论扎实但实战经验不足。\', attrs:{家境:80,天赋:65,家庭环境:70}, special:\'普通人\', rarity:\'uncommon\' },\n      { name:\'御三家分家·被压制的才能\', desc:\'出身御三家旁支，因血统稀薄被轻视，却意外继承了稀薄术式。\', attrs:{家境:60,天赋:70,家庭环境:45}, special:\'御三家外戚\', rarity:\'rare\' },\n      { name:\'诅咒师之子·血里带来的路\', desc:\'父亲或母亲是诅咒师，从小在黑暗世界摸爬滚打，价值观被暴力塑形。\', attrs:{家境:40,天赋:60,家庭环境:30}, special:\'诅咒师血脉\', rarity:\'rare\' },\n      { name:\'孤儿院·被诅咒的孩童\', desc:\'在孤儿院长大，因能看见咒灵被当作怪胎，直到高专介入。\', attrs:{家境:20,天赋:65,家庭环境:25}, special:\'受肉体体质\', rarity:\'rare\' },\n      { name:\'星浆体关联者·容器之影\', desc:\'亲属或自身曾被视为星浆体候选，与天元结界有微弱共鸣。\', attrs:{家境:50,天赋:75,家庭环境:50}, special:\'星浆体\', rarity:\'epic\' },\n      { name:\'受肉体质·可被刻印的身体\', desc:\'身体对咒物与外来术式具有异常适应性，既可被受肉，也可刻印术式。\', attrs:{家境:40,天赋:70,家庭环境:40}, special:\'受肉体体质\', rarity:\'epic\' },\n      { name:\'半人半咒灵·偏向人类\', desc:\'因未知事故获得咒灵特性，外表与人类无异，咒力带有些许非人味道。\', attrs:{家境:25,天赋:80,家庭环境:30}, special:\'半人半咒灵-偏向人类\', rarity:\'epic\' },\n      { name:\'半人半咒灵·偏向咒灵\', desc:\'咒灵特征明显到无法遮掩，被人类社会排斥，在里世界边缘求生。\', attrs:{家境:15,天赋:85,家庭环境:20}, special:\'半人半咒灵-偏向咒灵\', rarity:\'legendary\' },\n      { name:\'吞噬双胞胎·两口四臂\', desc:\'出生时吞噬了同胞兄弟，获得双倍结印速度与额外咒力，外貌却因此扭曲。\', attrs:{家境:35,天赋:95,家庭环境:35}, special:\'吞噬双胞胎\', rarity:\'legendary\' },\n      { name:\'六眼继承者·五条家神子\', desc:\'五条家嫡系，天生六眼，咒力控制与精密度远超同辈。\', attrs:{家境:90,天赋:120,家庭环境:70}, special:\'六眼\', rarity:\'legendary\' },\n      { name:\'天与暴君·零咒力的怪物\', desc:\'天与咒缚的极致案例，体内咒力近乎于零，肉体却足以匹敌特级。\', attrs:{家境:40,天赋:90,家庭环境:40}, special:\'天与咒缚-纯暴君\', rarity:\'legendary\' },\n      { name:\'穿越者·不完全的天外之魔\', desc:\'以魂穿方式降临此世，知晓原著剧情，却无法选择特殊体质。\', attrs:{家境:50,天赋:70,家庭环境:55}, special:\'穿越者-魂穿\', rarity:\'mythic\' },\n      { name:\'穿越者·完全的天外之魔\', desc:\'肉身穿入此世，身为黑户却带着额外可分配潜力，不受常规束缚限制。\', attrs:{家境:20,天赋:80,家庭环境:40}, special:\'穿越者-肉穿\', rarity:\'mythic\' },\n      { name:\'咒术师之祖·原初之人\', desc:\'生于咒术尚未定型的原初时代，全属性加值，见证规则诞生。\', attrs:{家境:10,天赋:110,家庭环境:20}, special:\'咒术师之祖\', rarity:\'mythic\' },\n      { name:\'外星来客观测者\', desc:\'来自地球之外的观测者，不受地球咒术平衡约束，自带额外自由属性。\', attrs:{家境:60,天赋:100,家庭环境:50}, special:\'外星人\', rarity:\'mythic\' }\n    ];\n\n    /* ================= BP tiers ================= */\n    const BP_TIERS = [\n      { name:\'D 门外汉\', desc:\'尚未踏入咒术界门槛，BP 1–20。\', min:1, max:20, rarity:\'common\' },\n      { name:\'C 见习术师\', desc:\'能感知并初步运用咒力，BP 21–50。\', min:21, max:50, rarity:\'common\' },\n      { name:\'B 正式术师\', desc:\'可独立处理低级咒灵，BP 51–100。\', min:51, max:100, rarity:\'uncommon\' },\n      { name:\'A 一级水准\', desc:\'具备一级咒术师战斗力，BP 101–200。\', min:101, max:200, rarity:\'rare\' },\n      { name:\'S 特级门槛\', desc:\'接近特级咒术师的综合战力，BP 201–400。\', min:201, max:400, rarity:\'epic\' },\n      { name:\'SS 现代最强\', desc:\'足以影响国家/世界格局的战力，BP 401–800。\', min:401, max:800, rarity:\'legendary\' },\n      { name:\'EX 论外\', desc:\'超越咒术界常规衡量的存在，BP 800+。\', min:801, max:9999, rarity:\'mythic\' }\n    ];\n\n    /* ================= BP / Grade computation ================= */\n    const RARITY_ORDER = [\'common\',\'uncommon\',\'rare\',\'epic\',\'legendary\',\'mythic\'];\n    function rarityIndex(r) { const i = RARITY_ORDER.indexOf(r); return i < 0 ? 0 : i; }\n\n    function computeBP(form) {\n      const i = form && form.identity;\n      let bp = (i && i.bp) ? i.bp : 10;\n      const arts = Array.isArray(form.arts) ? form.arts : [];\n      const rarityBonus = { common:0, uncommon:5, rare:12, epic:25, legendary:45, mythic:80 };\n      arts.forEach(a => {\n        const r = a.rarity || \'common\';\n        bp += rarityBonus[r] || 0;\n        if (a.source === \'原作\') bp += 15;\n        const hay = (a.name || \'\') + (a.desc || \'\');\n        if (/领域展开/.test(hay)) bp += 20;\n      });\n      const r = form.restriction;\n      if (r && r.name) {\n        if (r.name.includes(\'零咒力\')) bp += 30;\n        else if (r.name.includes(\'巨量咒力\')) bp += 15;\n      }\n      const bg = form.background;\n      if (bg && bg.attrs) {\n        const sum = (bg.attrs.家境||0) + (bg.attrs.天赋||0) + (bg.attrs.家庭环境||0);\n        bp += Math.min(20, Math.max(2, Math.floor(sum/15)));\n      }\n      const c = form.clan;\n      if (c && c.name) {\n        if (c.name.includes(\'五条\')) bp += 12;\n        else if (c.name.includes(\'禅院\')) bp += 8;\n        else if (c.name.includes(\'加茂\')) bp += 5;\n      }\n      return Math.max(1, Math.min(9999, Math.floor(bp)));\n    }\n\n    function bpToLevel(bp) {\n      if (bp >= 801) return 7;\n      if (bp >= 401) return 6;\n      if (bp >= 201) return 5;\n      if (bp >= 101) return 4;\n      if (bp >= 51) return 3;\n      if (bp >= 21) return 2;\n      return 1;\n    }\n\n    function computeGrade(form) {\n      const arts = Array.isArray(form.arts) ? form.arts : [];\n      let artPower = 0;\n      arts.forEach(a => { artPower += (rarityIndex(a.rarity) + 1) * 10; });\n      const bp = computeBP(form);\n      const bpTier = BP_TIERS.findIndex(t => bp >= t.min && bp <= t.max);\n      const bpTierIndex = bpTier < 0 ? 0 : bpTier;\n      const score = artPower * 2 + bpTierIndex * 25 + Math.floor(bp / 80);\n      if (score <= 10) return \'F\';\n      if (score <= 30) return \'E\';\n      if (score <= 60) return \'D\';\n      if (score <= 100) return \'C\';\n      if (score <= 150) return \'B\';\n      if (score <= 220) return \'A\';\n      if (score <= 300) return \'S\';\n      if (score <= 390) return \'SS\';\n      return \'SSS\';\n    }\n\n    /* ================= Opening templates (6 timelines) ================= */\n    const OPENINGS = {\n  "T01": `<opening>\n{{时代}}，{{地区}}，罗生门的檐角浸在血色暮气里。\n紫黑色咒雾从逢坂山漫来，裹着铁锈与腐臭压过整座都城。朱红大门上深可见骨的爪痕渗着黑汁，檐角驱魔风铃被咒力锢得发不出声响，铜铃表面凝着霜似的咒力结晶。家家户户木门紧闭，门槛前的盐粒早被咒雾浸得发灰，门后是压到极致的啜泣，连呼吸都不敢大声。\n阴阳寮的青灯是全城仅存的连片光亮。混着指血的朱砂竹简堆过案几，每一笔都带着颤意：三百禁军逢坂山清剿，只剩半枚带牙印的头盔滚回山脚；贺茂家三十名术士结五行结界拦路，被那四臂双面的怪物一掌拍碎，连咒力残渣都未留下。民间传言更疯，说他走过的地方寸草不生，沾到咒力的人三日便会化做脓水。\n御三家先祖尚在挣扎成长：五条家传人闭在密室啃噬术式雏形，禅院族人提着咒具在边境死战，加茂咒医在后方熬制解咒药草。古老血脉在宿傩的暴虐下成批断绝，常有家族一夜灭门，竹简上的姓氏被狠狠划去，只留一道刺目的空白。\n{{user}}站在罗生门阴影里，青石板的凉意顺着鞋底往上钻。{{他她}}是{{身份}}，掌握着{{术式}}。咒力在体内生涩流转，带着不属于这个蛮荒时代的灵魂印记，能清晰摸到空气里每一粒怨毒的咒力颗粒，顺着呼吸往肺里钻。\n远处咆哮顺着地面震过来，瓦当簌簌掉渣。又一处封印崩解，黑紫色咒力如潮水涌出。宿傩还在都城游荡，下一个被撕碎的，可能是贵族宅邸，也可能是这扇罗生门。{{他她}}攥紧了拳，没人知道这个凭空出现的异数，会在尸骸铺就的时间线上掀起怎样的波澜。\n</opening>`,\n  "T02": `<opening>\n{{时代}}，{{地区}}，夜色沉得化不开。\n宿傩已死，可他的阴影像一张网罩住整座都城。二十根手指被分赴各地封印，咒力余毒却早已渗进土地，封印稍一松动，成群咒灵便顺着气息聚拢。民间总说深夜罗生门下有咀嚼声，逢坂山深处能看见四臂影子，真假无人敢去验证。\n观星阁灯火彻夜不熄，裹着渗血绷带的阴阳师们，在竹简上记录着各处封印的异动。东山封印的术士失踪，只剩被咬得残缺的咒具丢在山脚；五条家先祖闭关三月悟得无下限咒术雏形，却也油尽灯枯，不得不闭户休养；加茂咒医守着伤患，咒毒蚀骨的痛喊传遍整座寮舍，寻常药石根本压不住。\n御三家借着讨伐威名站稳脚跟，暗地早已开始争夺咒术界主导权。天元在薨星宫布下永久结界，星浆体同化的说法刚被提出，便引发轩然大波。没人说得清这是护世良方，还是又一场权力游戏。\n{{user}}立在观星阁回廊上，廊下木板踩出细碎吱呀声。{{他她}}是{{身份}}，掌握着{{术式}}。手中符纸被夜风吹得发颤，朱砂咒文泛着微弱红光。咒力在体内缓慢运转，能清晰感知远处封印崩解的震颤，一波一波敲在骨头上。\n铜壶滴漏的声响单调得像倒计时，又一声咆哮从城门外传来，廊下青光灯晃了三晃。封印又裂了，黑紫色咒雾正往阴阳寮方向漫来。{{他她}}捏紧符纸，见习阴阳师的身份在这时代轻如草芥，可总有人不想只做史书里的无名数字。\n</opening>`,\n  "T03": `<opening>\n{{时代}}，{{地区}}，暮色红得像凝固的血。\n三天前，封印在此的宿傩手指彻底冲破百年禁锢。浓郁咒力如瘟疫般散开，方圆十里的咒灵全被引来，在神社四周盘踞。石阶缝隙里的野草泛着死黑，碎陶片与锈铁钉上裹着淡咒力，朽坏的大门半挂在门轴上，风一吹便发出濒死般的呻吟。主殿塌了一半，发黑木梁上挂着褪成灰白的注连绳，无风自动，像吊着的亡魂。\n百年前讨伐战后，天元与顶尖咒术师联手定下封印术，将手指封存于此。可岁月磨平了咒文，神官代代更迭，到最后没人记得这里封着什么，只当是处闹鬼禁地。直到村里牲畜成片死去，进山的人疯着回来，嘴里反复念着“手指”“吃掉”，人们才想起这地方的忌讳。\n阴阳寮派来的三名术士全死在山脚下，胸口伤口齐整如刀切，心脏被生生掏走，脸上凝着极致恐惧。消息传回京都，御三家迟迟未动——五条家后人守着六眼却摸不到先祖高度，禅院家忙着打磨式神，加茂家在盘算这笔买卖划不划算。天元仍在薨星宫沉睡，结界网一年松过一年，星浆体同化议了又议，始终落不了地。\n{{user}}站在鸟居前，青苔裹着石阶，踩上去滑得发颤。{{他她}}是{{身份}}，掌握着{{术式}}。咒力在体内流转，带着异世的违和感，指尖扫过鸟居上风化石的咒文，便能摸到百年前封印时的震颤。神社深处的咒力像头苏醒的巨兽，每一次呼吸都震得人头皮发麻。\n山下村民正收拾行李逃难，老人孩子坐在牛车上，眼里全是惶然。作为知晓千年结局的异数，是转身苟活，还是伸手推一推这沉重的命运，只在一念之间。\n</opening>`,\n  "T04": `<opening>\n{{时代}}，{{地区}}，夜色浓得像墨。\n德川幕府初立，江户城遍地工地，各地大名武士蜂拥而至，带来人气，也带来数不清的怨念。战国战死的武士化成咒灵，握着锈刀在街巷游荡，工地上总有人莫名失踪，平民只当是运气不好，只有咒术师知道，阴影里藏着吃人的东西。\n御三家格局早已定型。五条家凭六眼与无下限咒术稳居首位，是公认的当世最强；禅院家靠十种影法术与堆积如山的咒具撑着场面，人多势众；加茂家人数最少，却最懂钻营，在咒术界高层左右逢源。三家围绕主导权斗了几十年，明枪暗箭从未停歇。天元的结界仍在运转，距上一次星浆体同化已过去四百余年，新的星浆体正在秘密培养，只等时日一到便完成仪式。\n禅院别院院墙高得离谱，墙头插着碎玻璃与铁蒺藜，墙根撒着驱邪盐粒，防的不是贼，是咒灵。院里住的全是旁支子弟，没天赋继承十种影法术，只能练些粗浅影法、摆弄咒具，在家族里干着打杂的活，命贱得很。\n{{user}}站在练武场中央，脚下木板浸满汗水，踩上去黏糊糊的。{{他她}}是{{身份}}，掌握着{{术式}}。手中短咒具泛着冷光，咒力顺着指尖渗进去，与影子缠在一起。火光摇曳，墙上的影子扭成狰狞形状，像藏在黑暗里的野兽。\n远处咆哮顺着地面传来，练武场的火把晃了三晃。战国武士化成的咒灵正往浅草而来，幕府的委托已递到家主手里，长辈们正商议着派谁去送死。旁支子弟的命不值钱，这种危险活计，向来先紧着他们。{{他她}}攥紧咒具，一辈子活在嫡支阴影里做杂役，还是拼一把觉醒真正的术式，这条路总得自己选。\n</opening>`,\n  "T05": `<opening>\n{{时代}}，{{地区}}，街灯光芒裹着一层青蒙蒙的咒雾。\n明治维新过去三十余年，日本疯了似的奔向近代化。西式楼房与日式木屋挤在一起，电线杆拉着杂乱电线，街上上班族步履匆匆，西装与和服擦肩而过，没人察觉空气里飘着霉味的咒雾。\n阴阳寮改组为咒术总监部，成为国家名义上的咒术管理机构。东京、京都两所高专相继开学，按章程培养新一代咒术师。御三家凭着校董与高层席位，仍旧攥着咒术界实权。普通人对诅咒一无所知，这是咒术界的共识——恐慌只会催生更多咒灵，因此术师们只能活在阴影里，见不得光，却又不可或缺。\n城市化催得咒灵疯长。写字楼里过劳死的上班族、学校中被霸凌的学生、家庭里受虐的妻子……负面情绪像养料，喂得咒灵越来越多、越来越强。总监部人手永远不够，咒术师死亡率高得吓人，能活过三十岁就算赚了。五条家好几代没出六眼，架子还在，底气早不如从前；禅院家守着老规矩，族内矛盾越积越深；加茂家在新旧之间摇摆，哪边有利便往哪边倒。\n天元仍在薨星宫沉睡，星浆体同化的日子越来越近，明里暗里都有人盯着此事，不知憋着什么算盘。\n{{user}}站在总监部铁门前，石板路被雨水打湿，映着街灯昏黄的光。{{他她}}是{{身份}}，掌握着{{术式}}。咒力在体内运转，带着异世的违和感，能清晰摸到建筑里沉沉的官僚气，平静表面下藏着数不清的龌龊。\n尖锐的咒术警报划破夜空，远处又出现特级咒灵，已造成数十人伤亡。街上行人加快脚步，只当是寻常火警，没人知道死神刚从身边擦过。{{他她}}攥紧了拳，是找个角落安稳过完一生，还是试着给这个被诅咒的世界撕开一点光，答案早就在心里了。\n</opening>`,\n  "T06": `<opening>\n{{时代}}，{{地区}}，拉面店后厨的冰箱门推开，潮湿的霉味混着咒力的腥气扑面而来。\n往下三层的地下空间里，紫红色霓虹舔着涂满咒文的墙壁，兜帽与面具在阴影里错动，交谈声压得极低，偶尔响起的玻璃碰撞声都裹着戒备。这里是咒术界的灰色地带——明面上总监部严打特级咒物流通，暗地里宿傩的手指、失传的咒具、术师的情报都明码标价，黑吃黑是默认的规则，每天都有人顺着通风管的血腥味消失，连尸骨都留不下。\n\n昭和经济的泡沫正吹得盛大，写字楼彻夜亮灯，街头满是意气风发的上班族，没人知道城市的阴影里，怨恨与贪婪正喂出越来越强的咒灵。总监部的人手全扑在明面上的任务，对这片地下世界只能睁一只眼闭一只眼。宿傩的二十根手指在千年流转中半数失了踪迹，有的被贵族家秘密供奉，有的就流落在这样的黑市，一根的开价足够普通人挥霍十辈子，敢碰的却没几个能活过次月。\n\n伏黑甚尔的名字已经在圈子里传开了。那个禅院家出来的“废物”，没有半分咒力，却凭着天与咒缚的肉身把一级术师当猎物宰杀。有人骂他是咒术界的耻辱，也有人花大价钱雇他干活——毕竟能无视咒术、悄无声息抹掉目标的刀，谁都想要一把。禅院家对外绝口不提这个分家子弟，私下里却没少派人清理，只是派去的人再也没回来过。天元的结界依旧笼罩着日本，距离上一次星浆体同化已过去近五百年，新的容器即将降生，明里暗里的势力都在盯着这件事。\n\n{{user}}靠在吧台边，脚下的地板黏着说不清的污渍。{{他她}}是{{身份}}，掌握着{{术式}}。咒力在指尖凝成微不可察的契约纹路，扫过全场就能摸清每个人身上的价码与恶意。他见过太多人在这里爬上去又摔下来，见过为了一根咒物拼得家破人亡的疯子，也见过被甚尔一刀封喉的总监部搜查官。\n\n远处的地面传来细微震动，是咒术碰撞的冲击波——总监部又在清缴诅咒师。黑市里的人只顿了顿，便继续谈价，仿佛什么都没发生。{{他她}}摩挲着冰凉的酒杯，清楚自己在这泥潭里只是个小人物，哪天栽了也没人记得。是继续在各方势力间游走混饭吃，还是用手里的契约咒法赌一把，从这摊烂泥里爬出个人样？\n通风管的风卷着血腥味掠过，角落里的交易即将落槌，没人知道，这地下世界的一点异动，终将掀动整个咒术界的棋盘。\n</opening>`,\n  "T07": `<opening>\n{{时代}}，{{地区}}，冬日的寒气顺着廊柱往上爬，檀香混着紧绷的气息压得人胸口发闷。\n五条家本家的宅邸内外三步一岗，黑衣护卫的咒力敛得极深，连庭院里的碎石都被打扫得没有一片落叶。禅院与加茂两家的使者已经在偏厅坐了半宿，嘴上说着道贺的话，眼神里全是探察。总监部的高层也悉数到场，没人说话，走廊里只有产房内隐约传来的痛呼声，每一声都扯着所有人的神经。\n\n所有人都在等——等一个传说的落地。\n五条家的六眼，几百年才降世一次的天授体质。拥有它的人能无消耗运转无下限咒术，是天生的最强。上一位六眼凭一己之力压得整个咒术界抬不起头，而这一次降生的孩子，将彻底改写御三家的权力天平。五条家主背手立在产房门口，指尖微颤，身旁的长老们攥着佛珠，连呼吸都放得极轻。\n\n一声啼哭划破寂静的瞬间，整座宅邸的空气骤然凝固。\n不是因为喜悦，是因为那股随着啼哭炸开的咒力——像海啸般从产房里涌出来，顺着走廊席卷而过，修为稍弱的护卫直接腿软跪倒，连抬头的力气都没有。长老们的脸瞬间涨红，不是怕，是压不住的狂喜。六眼，真的是六眼。\n\n产婆抱着襁褓走出来，婴儿皱巴巴地闭着眼，和普通新生儿没两样。可没人敢轻视那具小小的身体——那里面藏着足以颠覆世界的力量。有人低声念着“神子”，语气里全是敬畏。消息很快会传遍咒术界，诅咒师势力会把他视作眼中钉，想尽办法在他长大前斩草除根；而五条家会倾尽所有资源，把他打造成最锋利的刀。\n这个孩子，就是五条悟。\n\n{{user}}站在走廊的阴影里，像一缕没有重量的烟。{{他她}}是{{身份}}，掌握着{{术式}}。没有实体，没有咒力，本该没人能察觉{{他她}}的存在。可看着襁褓里那个婴儿，{{他她}}喉咙发紧——{{他她}}知道这个被所有人寄予厚望的孩子，未来会活成怎样的孤独。他会有唯一的挚友，然后亲手斩杀对方；他会收学生、想改变腐朽的咒术界，然后被封印在狱门疆里看着同伴死去；他会在圣诞夜的新宿，被拦腰斩断，死在自己拼尽全力守护的世界里。\n\n襁褓里的婴儿忽然睁开眼。\n澄澈的蓝像盛了整片晴空，却深不见底。他的目光扫过走廊，精准地落在{{user}}所在的方向，停留了一秒。\n窗外的天色开始泛白，走廊里的庆贺声此起彼伏。没人知道这个“神子”一生的结局，只有{{他她}}清清楚楚。是做个旁观者看着悲剧重演，还是以这抹异世的灵魂，去撞一撞那注定的命运？\n婴儿重新闭上眼，呼吸均匀。命运的线，在他睁眼的那一刻，已经歪了。\n</opening>`,\n  "T08": `<opening>\n{{时代}}，{{地区}}，初春的寒气还缠在玻璃窗上，消毒水的味道灌满了整条走廊。\n医院是诅咒最容易滋生的地方——生老病死聚在这里，强烈的情绪像养料，养得墙角、天花板都飘着细碎的咒灵。惨白的荧光灯照在瓷砖上，映出护士匆忙的脚步，没人察觉空气里那点异样的波动。\n\n产房里传来响亮的啼哭，一个普通家庭迎来了他们的第一个儿子。父亲是朝九晚五的上班族，母亲是温柔的家庭主妇，他们看着襁褓里皱巴巴的孩子，眼里全是初为父母的柔软。他们给孩子取名夏油杰，只盼他平安长大，做个普通人。\n没人知道，这个看起来再普通不过的婴儿，天生带着咒灵操术的资质。那是咒术界最顶尖的术式之一，能吞噬咒灵、收为己用，理论上没有上限。可这种术式几百年难遇一次，对精神力的要求苛刻到极致，稍有不慎就会被咒灵反噬，落得疯癫的下场。\n\n婴儿出生的瞬间，宫城县境内的术师都察觉到了那股特殊的咒力波动——不算强，却像黑洞似的，连周围的咒灵都不自觉地往产房方向靠，又不敢靠近。几个术师匆匆赶到医院，看见孩子的父母只是普通人，都愣住了。普通家庭生出有术式的孩子不算稀奇，可咒灵操术这种级别的术式出现在平民家，谁都不敢擅自决定。\n\n消息传到总监部，高层吵了好几轮。有人主张立刻把孩子带走，从小接入高专培养；有人主张先观察，贸然介入反而容易出问题。连五条家都递来了问询的消息——毕竟咒灵操术是少数能和无下限咒术正面抗衡的术式，这个刚出生的孩子，将来或许会是那位六眼神子的对手，也或许……是同伴。\n这些事，产房里的夫妻俩一概不知。他们正围着婴儿床，笨拙地学着换尿布，脸上是藏不住的幸福。\n\n{{user}}握着记录板站在产房外，白大褂上沾着淡淡的消毒水味。{{他她}}是{{身份}}，掌握着{{术式}}。{{他她}}能隐约看见产房外徘徊的咒灵，它们被那股特殊的咒力吸引，却又忌惮着不敢上前。在医院工作多年，{{他她}}见过不少天生带咒力的孩子，大多长着长着就成了普通人，可这个孩子不一样——{{他她}}能感觉到，那具小小的身体里，藏着深不见底的潜力。\n\n{{他她}}也知道这个孩子的未来。他会进入高专，会遇到那个白发蓝眼的少年，会成为最强的二人组，会一起执行任务、一起憧憬未来。然后，他会走向另一条路，会和挚友分道扬镳，最后死在对方手里，连尸体都不得安宁。\n\n朝阳从窗户照进来，落在婴儿恬静的脸上。{{他她}}看着那家人温馨的模样，心里发闷。是继续做个普通的护士，看着一切按既定的轨迹走下去，还是试着靠近这个孩子，给他一点点不一样的可能？\n风从走廊尽头吹过来，带着窗外的花香。婴儿的哭声停了，他在母亲怀里蹭了蹭，睡得安稳。没人知道，他的人生从出生起，就注定了不凡，也注定了坎坷。\n</opening>`,\n  "T09": `<opening>\n{{时代}}，{{地区}}，午后的阳光斜切过屋檐，在三合土地面上投下明暗交错的影子。\n训练场的空气里混着汗水与铁锈味，墙面上挂着各式咒具，刀痕脚印密密麻麻地嵌在地面。禅院家的孩子从会走路起就要在这里受训，弱肉强食是刻进骨血的规矩——有术式的是人上人，没咒力的连杂役都不如，嫡支旁支，从出生起就划好了三六九等。\n\n训练场的最角落，两个四岁的小女孩蹲在土堆边，用树枝画着歪歪扭扭的图案。是禅院真希与禅院真依，一对双胞胎。按禅院家的旧例，双胞胎本该被寄予厚望，可她们几乎没有咒力，连最低级的咒灵都看不见。从出生那天起，“废物”的标签就钉在了她们身上。母亲因为生了她们在家族里抬不起头，其他孩子见了她们就扔石子、骂脏话，她们只能躲在没人的角落，连大声说话都不敢。\n\n真依扯了扯姐姐的袖子，声音带着哭腔问为什么大家都讨厌她们。真希抿着嘴不说话，手里的树枝攥得发白，指节都泛了青。她是姐姐，她得护着妹妹，可她也只是个四岁的孩子。\n\n训练场的中心是另一番景象。刚满一岁的禅院直哉被乳母和师父们簇拥着，咿呀地伸手去摸面前的咒具。他是嫡子，天生咒力雄厚，对咒具有着天生的亲和力，长老们都说他是禅院家未来的希望，将来必定能继承十种影法术，撑起整个家族。\n同样姓禅院，一个在云端，两个在泥里。\n\n同年出生的还有加茂家的加茂宪纪，侧室所生的私生子。哪怕早早觉醒了赤血操术的雏形，也因为母亲的身份，在家族里始终抬不起头。\n这批在家族偏见里长大的孩子，会在十几年后的涩谷、在死灭回游里，把御三家传承了几百年的腐朽秩序砸得稀碎。可现在，他们还只是一群承受着不公的孩子。\n\n{{user}}靠在训练场的墙边，影子缩在屋檐的阴影里。{{他她}}是{{身份}}，掌握着{{术式}}。十岁的年纪，在旁支子弟里也属于垫底的那一档，术式微弱得几乎没用，连清理低级咒灵都费劲。他太懂那对双胞胎的感受了——明明什么都没做错，只因为天生没有足够的咒力，就要被踩在泥里。\n\n禅院家的规矩像块发霉的石头，压得底下的人喘不过气。出身决定一切，血统高于努力，这道理所有人从小听到大。\n场中央传来一阵哄笑，直哉又完成了一次简单的咒力调动，周围的长辈们连声夸赞。角落里的真希猛地抬起头，看向训练场中心的方向，眼里闪着倔强的光，小小的拳头攥得紧紧的。\n\n{{他她}}看着那道小小的身影，忽然攥紧了拳。是一辈子窝在旁支的角落里，接受“废物”的命运混吃等死，还是拼尽全力，把这该死的血统规矩砸个稀烂？\n风卷着尘土吹过训练场，真希的头发被吹乱，她却没低头。命运的轨迹，从这双不服输的眼睛里，开始悄悄转弯。\n</opening>`,\n  "T10": `<opening>\n{{时代}}，{{地区}}，夕阳把居民楼的影子拉得很长，街巷里飘着各家晚饭的香气。\n这片居民区看起来和东京其他地方没两样，独栋小楼带着小院，孩子在路边追跑打闹。可仔细看就会发现，每户门檐下都贴着隐蔽的符咒，院墙上画着淡得几乎看不见的结界——这里是咒术师的聚居区，藏在普通人的世界里，是刀尖舔血的人难得的避风港。\n\n伏黑甚尔的家就在这里。\n没人能想到，那个令咒术界闻风丧胆的“术师杀手”，会大摇大摆地住在总监部眼皮子底下。这个从禅院家逃出来的男人，凭着天与咒缚的肉身猎杀术师为生，死在他手里的一级术师两只手都数不过来。可此刻他就靠在自家门框上，手里攥着一罐啤酒，目光落在院子里的小男孩身上，眼神比平时软了大半。\n\n那是他的儿子，伏黑惠，今年两岁。\n孩子蹲在院子的泥地里，正伸手逗一只通体漆黑的小猫，笑得露出小虎牙，软乎乎的。他继承了禅院家的十种影法术，咒力已经在身体里悄悄苏醒，总会不自觉地引来咒灵。甚尔从没教过他半句咒术，也从不提禅院家的事，他好像只想让儿子做个普通人，安安稳稳过完一辈子，别走上自己的老路。那些被吸引来的咒灵，都被他悄无声息地解决在了院墙外，连痕迹都没留下。\n\n与此同时，宫城县仙台市的一间普通民居里，刚满一岁的虎杖悠仁正躺在婴儿床里吐泡泡。他的母亲坐在床边，温柔地摸着他的小脸，眉眼柔和。没人知道，这具身体里住着一个活了千年的诅咒师——羂索。这个孩子从受孕起，就是他千年计划里的一枚棋子，是他为宿傩准备的完美容器。\n\n两个相隔数百公里的孩子，过着截然不同的童年。他们的命运本该毫无交集，却早已被无形的线缠在了一起，终将在十几年后相遇，把整个咒术界搅得天翻地覆。\n\n{{user}}藏在电线杆的影子里，呼吸放得极轻。{{他她}}是{{身份}}，掌握着{{术式}}。借着影子的掩护，{{他她}}能清晰地感知到院子里那小小的身体里蕴藏的潜力，也能感觉到门框上那个男人散发出的、极具压迫感的气息。\n\n{{他她}}知道未来的一切。甚尔会死在五条悟手里，惠会被五条悟收养，进入高专，遇到虎杖悠仁，经历少年院、涩谷事变，最后被宿傩占据身体，亲手杀死自己的挚友。那是个太苦的结局，苦到{{他她}}光是想想都觉得心口发闷。\n\n院子里的伏黑惠忽然抬起头，朝着{{user}}的方向看过来，眼睛睁得圆圆的，像只警觉的小动物。\n下一秒，甚尔的目光也扫了过来。\n那眼神像淬了冰的刀，明明只是漫不经心的一瞥，却让{{他她}}浑身的汗毛都竖了起来。他知道，这个男人绝对察觉到了什么。毕竟，那可是伏黑甚尔。\n\n风卷着晚饭的香气吹过街巷，小猫蹭了蹭伏黑惠的手心。是转身离开，看着一切按原有的轨迹走下去，还是试着伸手拉一把这个还懵懂的孩子，给他一个不一样的未来？\n甚尔微微眯起眼，手指搭在了腰间的咒具上。命运的岔路口，就在眼前。\n</opening>`,\n  "T11": `<opening>\n{{时代}}，{{地区}}，樱花瓣裹着淡咒力簌簌落下，触地便消融在结界里，不留半分痕迹。\n朱红鸟居刻着斑驳的咒文，是高专最外层的防壁，将寻常人与诅咒都拦在山门外。石碑上的校名被风雨磨得发钝，却自有一股沉在骨里的肃杀——能走进这扇门的人，一半是天才，一半是亡魂预备役。\n\n今年的新生只有三名，却足以震动整个咒术界。\n最先晃到鸟居下的是五条悟。黑制服装束也压不住他浑身的散漫，白发在阳光下晃得刺眼，眼罩推在额角，嚼着口香糖冲夜蛾正道抬了抬下巴，语气里是刻进血统里的傲慢：“老师，五条悟。”夜蛾眉头微蹙，没说什么——六眼神子，本就不是能用规矩框住的人。\n紧随其后的夏油杰微微鞠躬，黑发顺帖，声音温和平稳：“老师好，我是夏油杰。”没有显赫家世傍身，仅凭一手罕见的咒灵操术便站到了与五条悟平齐的位置，眉眼温和，眼底却藏着不输任何人的锐气。\n家入硝子最后到，叼着烟靠在石柱上，只报了名字便吞云吐雾，指尖流转的反转术式淡得几乎看不见，却是全场最金贵的存在。\n\n{{user}}攥着入学通知书站在侧旁，指尖微微发紧。{{他她}}是{{身份}}，掌握着{{术式}}。咒力在体内谨慎运转，感知域铺开的瞬间，便被三道截然不同的强大咒力撞得心口发闷——一个是肆意张扬的烈阳，一个是沉敛幽深的深潭，一个是漫不经心的薄雾。\n他是这一届的“第四人”，凭感知天赋勉强挤入高专，既无御三家血脉，也无特级术式，在咒术师这条死亡率高得吓人的路上，大概率活不过三十岁。\n风卷着樱瓣落在肩头，五条悟忽然偏过头，眼罩下滑露出半截湛蓝眼眸，饶有兴致地扫了他一眼；夏油杰也望过来，温和地点了点头；硝子只抬了抬眼皮，便重新望向远处的山林。\n是按部就班毕业、执行任务、在某场围剿里悄无声息死掉，还是拼尽全力追上那两道注定要站在顶峰的身影，在这个被诅咒的世界里留下自己的痕迹？\n山门的结界轻轻震颤，属于他们的三年，自此开篇。\n</opening>`,\n  "T12": `<opening>\n{{时代}}，{{地区}}，实木门隔绝了内外，房间里的气压沉得像浸了水。\n夜蛾正道指尖叩着桌面，对面两名总监部高层西装笔挺，脸色却比窗外的阴天还难看。桌上摊着机密文件，封面上印着猩红的“S级”字样——星浆体护卫任务，关乎天元稳定，牵系全日本结界的存亡。\n\n天内理子，十四岁，这一代的星浆体，八月将在薨星宫完成同化。\n但麻烦的不只有同化仪式。诅咒师集团“Q”四处造势，妄图破坏同化让天元失控；更棘手的是，有人斥巨资雇了伏黑甚尔。那个名字念出来时，连总监部的人都顿了顿——没有咒力的“术师杀手”，死在他手里的一级术师早已数不清，专靠天与咒缚和咒具撕碎咒术师的骄傲。\n“任务交给五条悟和夏油杰。”夜蛾开口，语气没有半分迟疑。\n门内的两个少年反应截然不同。五条悟靠在墙边，眼罩滑到鼻梁上，打了个哈欠：“不就是护着个小姑娘？有我在，谁来都没用。”夏油杰却眉头微蹙，指尖摩挲着袖口，低声重复了一遍“伏黑甚尔”，神色凝重。家入硝子倚在门框上抽烟，吐着烟圈撂下一句“别死了，我懒得收尸”，眼底却藏着担忧。\n他们还太年轻，以为这只是又一场难度稍高的任务，以为并肩而立就能摆平所有麻烦。没人知道，这趟任务会是一道分水岭——一边是意气风发的少年时代，一边是分道扬镳的惨烈余生。\n\n{{user}}贴在走廊的墙壁上，呼吸放得极轻。{{他她}}是{{身份}}，掌握着{{术式}}。空间咒力在指尖细微跳动，足够在危急时刻逃出生天，却拦不住注定要发生的悲剧。\n他知道所有结局：知道冲绳的海风里藏着杀机，知道机场的突袭会撕破无下限的神话，知道天内理子会死在夏油杰手里，知道五条悟会在生死一线觉醒反转术式，从此戴上“最强”的枷锁，也知道这对挚友终将走向刀剑相向的结局。\n门轴转动的声响打断思绪。五条悟率先走出来，看见他挑了挑眉；夏油杰跟在后面，温和地问他有什么事。\n是装作路人旁观一切重演，看着两个少年一步步坠入命运的泥沼，还是动用自己的能力，去撞一撞那看似牢不可破的既定轨迹？\n{{他她}}攥紧了拳，抬眼望向两人。\n</opening>`,\n  "T13": `<opening>\n{{时代}}，{{地区}}，咸湿海风卷着棕榈叶的声响，阳光亮得晃眼。\n沙滩上满是游客的笑闹声，天内理子光着脚踩在沙子里，蹲在地上堆城堡，发梢沾了细沙也不在意，笑起来露出两颗小虎牙，和所有十四岁的少女没两样。黑井美里站在不远处，手里拿着毛巾，眼神温柔又藏着化不开的难过——再过一个月，这个鲜活的女孩就要成为天元的一部分，再也没有“天内理子”这个人。\n\n五条悟瘫在沙滩椅上，花衬衫敞着领口，墨镜滑在鼻尖，举着果汁慢悠悠地喝，浑身上下都写着“度假”两个字。“杰，你也太绷着了。”他冲不远处的人喊，“有我在，Q那群杂鱼翻不起浪。”\n夏油杰站在遮阳伞下，目光扫过四周的人群与建筑，指尖始终扣着咒灵的召唤节点。他没有五条悟那样绝对的自信，也不信什么“万无一失”。咒术师的世界里，松懈的瞬间就是丧命的瞬间。\n没人提同化，没人说未来，所有人都心照不宣地把这趟出行当成最后的喘息。\n\n{{user}}站在酒店高层的走廊里，隔着落地窗盯着沙滩上的四人，手心全是冷汗。{{他她}}是{{身份}}，掌握着{{术式}}。催眠咒力在喉间滚动，却连释放的勇气都没有——楼下那两个少年的咒力像两座大山，光是感知就让人喘不过气，精神暗示对他们而言和挠痒没区别。\n他是Q集团的底层，当初为了凑家人的医药费踏进来，本以为只是些小偷小摸的勾当，没想到会接到绑架星浆体的死命令。\n反抗？Q的手段比死还难熬，家人还在他们手里。动手？那无疑是羊入虎口，连给五条悟塞牙缝都不够。\n旁边的同伙碰了碰他的胳膊，低声催促准备动手。{{他她}}喉结滚动，看着沙滩上天内理子灿烂的笑脸，看着夏油杰始终紧绷的侧脸，指尖抖得几乎握不住咒符。\n就在这时，夏油杰忽然抬起头，目光精准地穿透玻璃窗，落在了他的位置。\n那一眼平静无波，却让{{他她}}瞬间僵在原地，后背瞬间被冷汗浸透。他移开视线的动作甚至都带着刻意的从容，仿佛只是随意扫过风景。\n风从走廊尽头吹进来，带着海的咸腥。是硬着头皮执行这场必死的任务，还是趁着混乱赌一把，带着家人逃离这摊烂泥？\n楼下的天内理子忽然起身，指着海面兴奋地挥手。五条悟坐起身，顺着她指的方向望过去，嘴角勾着笑。\n平静的海面下，暗流早已汹涌。\n</opening>`,\n  "T14": `<opening>\n{{时代}}，{{地区}}，广播里循环播放着登机提示，行李箱的滚轮声此起彼伏，和所有普通的清晨没两样。\n候机厅的落地窗外是澄澈蓝天，天内理子攥着捡来的贝壳，指尖反复摩挲着纹路，低着头小声说“时间过得好快”。黑井美里摸了摸她的头，没说话，眼底的落寞藏都藏不住。\n五条悟双手插兜靠在立柱上，墨镜遮住了大半张脸，百无聊赖地踢着脚下的地砖。夏油杰站在他身侧，眉头却始终微蹙——从早上起，他就有种挥之不去的违和感，可六眼都没察觉到异常咒力，想来是自己太敏感了。\n他们都默认了危险来自咒术师，默认了“没有咒力=没有威胁”。\n这是所有咒术师的惯性思维，也是伏黑甚尔最擅长利用的破绽。\n\n{{user}}穿着地勤制服站在登机口旁，低头核对着平板上的乘客信息。{{他她}}是{{身份}}，掌握着{{术式}}。他看不见咒灵，也不知道什么咒术界，只是凭着敏锐的直觉，觉得今天的候机厅格外压抑。\n目光扫过人群时，他停在了角落的男人身上。\n黑色T恤，鸭舌帽压得很低，背着普通的双肩包，混在旅客里毫不起眼。可{{他她}}看见他的瞬间，后背瞬间窜起一层寒意——那是生物面对顶级掠食者的本能预警，明明对方连眼神都没投过来，却像被毒蛇盯住的青蛙，连呼吸都不敢用力。\n他摇了摇头，觉得是最近夜班太多熬出了幻觉。\n下一秒，那个男人动了。\n快得不像话。没人看清他是怎么穿过人群的，只觉得一道黑影掠过，下一秒他就站在了天内理子面前。伏黑甚尔手里多了一把造型古怪的短刀，刀身泛着冷光，径直刺向身前的白发少年。\n没有咒力波动，没有术式启动的征兆，那把叫“天逆鉾”的咒具，就那样硬生生刺穿了无下限的防御。\n“悟！”夏油杰的声音里第一次带了慌。\n鲜血溅在光洁的地砖上，五条悟踉跄着后退，墨镜滑落，湛蓝的眼里满是震惊。候机厅里响起尖叫，人群四散奔逃，行李翻倒一地，混乱瞬间炸开。\n{{user}}手里的平板“啪”地砸在地上，屏幕碎成蛛网状。他僵在原地，看着那个戴鸭舌帽的男人拽过天内理子和黑井美里，几个闪身便消失在人流里，全程没有多余的动作，干脆得像台精密的机器。\n风从敞开的大门卷进来，混着淡淡的血腥味。\n直到此刻{{他她}}才明白，刚才的直觉不是错觉。\n那个男人，是真的能在人群里轻易收割性命的怪物。\n</opening>`,\n  "T15": `<opening>\n{{时代}}，{{地区}}，风卷着血腥味掠过荒草，连空气都带着滞重的死寂。\n战斗刚结束不久。伏黑甚尔倒在血泊里，胸口的伤口狰狞，到死都没什么多余的表情，像完成了一件再普通不过的工作。五条悟站在不远处，胸口的破洞还在渗血，可周身的咒力却已然蜕变——反转术式在生死一线彻底觉醒，无下限咒术从此可以全天候运转，“现代最强”的名号，从这一刻才算真正落地。\n可没人觉得这是胜利。\n\n天内理子就倒在通往薨星宫的石阶前。\n她刚刚转过身子，脸上还带着劫后余生的灿烂笑容，以为自己终于不用去同化，以为可以像普通女孩一样活下去。然后夏油杰召唤的咒灵，毫无征兆地穿透了她的胸膛。\n笑容凝固在脸上，眼睛还睁着，带着茫然与不解。\n黑井美里疯了一样扑过去，抱着她的身体失声痛哭，哭声撕心裂肺，在空旷的山野间撞出回音。五条悟怔怔地站着，连伤口的疼痛都忘了，他看着自己最好的朋友，声音发颤：“杰……为什么？”\n夏油杰没有回头。他背对着所有人，衣摆沾着血，身影被夕阳拉得很长。没人能看清他的表情，只知道从甚尔说出那些关于“非术师”的话开始，从他看见理子注定要被当作祭品的命运开始，有什么东西在他心里碎掉了。\n保护弱者的信念，在这一刻轰然崩塌。\n天元同化彻底中断，咒术界延续了几百年的秩序，从这一天开始裂开缝隙。\n\n{{user}}躲在远处的树后，浑身控制不住地发抖。{{他她}}是{{身份}}，掌握着{{术式}}。时间感知的预警在脑海里反复尖叫，可他来得太晚，快一步也好、慢一步也罢，终究还是眼睁睁看着悲剧发生。\n他早就知道这一幕。知道这是夏油杰堕落的起点，知道从此“最强的二人”将背道而驰，知道多年后新宿的街头，五条悟会亲手斩杀自己唯一的挚友。\n可预知又能怎么样？他只是个会点时间感知的普通人，在这两个怪物般的少年面前，连插手的资格都没有。\n风卷起地上的血沫，夏油杰忽然转过身。\n他眼底布满血丝，没有疯狂，只有一片深不见底的迷茫与疲惫。他的目光扫过{{user}}藏身的方向，停留了几秒，没有质问，也没有动手，只是静静地看了一会儿，便重新转了回去。\n五条悟也望了过来，蓝眼睛里盛着痛苦与茫然，像个弄丢了重要东西的孩子。\n是继续缩在角落，看着夏油杰一步步滑向深渊，看着所有悲剧按部就班地上演，还是往前走一步，哪怕只能撼动命运分毫？\n{{他她}}攥紧拳头，指甲嵌进掌心。\n石阶上的少女永远停在了十四岁，而少年们的人生，从此再也回不去了。\n</opening>`,\n  "T16": `<opening>\n{{时代}}，{{地区}}，残阳把巷壁浸成暗红，墙面上嵌着刀痕与咒力灼烧的焦黑，碎裂的咒具散在血泊里，几具诅咒师的尸体姿态扭曲，全是一击毙命的死相。\n伏黑甚尔死了。\n那个凭天与咒缚撕碎无数咒术师骄傲的“术师杀手”，最终倒在了十六岁的五条悟手下。巷口的风卷着血腥味掠过，白发少年站在残阳里，制服上沾着血污，眼罩滑到下颌，露出的蓝眼睛里没有半分胜利的快意，只剩一片沉得化不开的茫然。\n反转术式在生死一线彻底觉醒，无下限咒术从此可以全天候运转，咒力消耗的难题迎刃而解。从这一刻起，“五条悟”三个字不再只是“天才”的代名词，而是实打实的“现代最强”——是压在所有诅咒师、咒灵头顶的一座山，是咒术界新的秩序标尺。\n可这份“最强”来得太疼了。\n他赢了甚尔，赢了所有追杀者，却弄丢了自己的挚友。天内理子死在杰的手里，那个画面像根刺扎在喉咙里，拔不出来，咽不下去。他想追上去问清楚，想问他为什么，可脚步像灌了铅，连开口的勇气都没有。他们曾是并肩而立的同类，是彼此唯一能跟上对方脚步的人，现在中间却隔了一条血河。\n\n{{user}}缩在巷尾的阴影里，指尖控制不住地发抖。{{他她}}是{{身份}}，掌握着{{术式}}。影子咒力在周身绷紧，却连半分反抗的念头都生不出来——那股从少年身上散逸的咒力像无边深海，压得人胸腔发闷，连呼吸都费劲。\n他本是循着战斗波动来捡漏的诅咒师，却亲眼见证了“最强”的诞生。伏黑甚尔是什么人？是能让特级术师都闻风丧胆的存在，如今却死在一个高中生手里。往后的日子，诅咒师的路只会越来越难走，被五条悟盯上，和判死刑没两样。\n巷子里的少年忽然抬眼，目光精准地落在他藏身的阴影里。眼神很淡，像在看一块无关紧要的石头，随即就移开了。\n{{user}}后背瞬间浸满冷汗，直到五条悟戴上眼罩、转身走出小巷，才敢大口喘气。\n是就此收手，找个偏僻地方隐姓埋名过完下半辈子，还是继续在刀尖上舔血，赌自己不会成为“最强”清理的目标？\n风卷着落叶卷过空巷，少年的背影消失在街角。没人知道，这场以鲜血为代价的觉醒，开启的是一个时代，也是一场漫长的孤独。\n</opening>`,\n  "T17": `<opening>\n{{时代}}，{{地区}}，冬风卷着碎雪刮过围栏，金属栏杆冻得刺骨，呼出的白气转瞬就散在风里。\n距离星浆体事件已经过去四个月。五条悟的实力突飞猛进，“现代最强”的名号传遍咒术界，走到哪里都带着敬畏的目光，表面依旧吊儿郎当，只是独处时沉默的时间越来越长。而夏油杰像被什么东西抽走了温度，从前总挂在脸上的温和笑容淡了，多数时候只是沉默地望着远处，眼底是化不开的迷茫。\n他们还是会一起出任务、一起在训练场对练，配合依旧默契，可中间总像隔了层薄冰。天内理子的死是两人都不敢碰的禁区，五条悟想不通杰为什么要那么做，夏油杰则一遍遍叩问自己——保护非术师，到底有什么意义。\n“悟，你说我们为什么要保护普通人？”天台的风里，他曾这样问。\n五条悟叼着草莓味的棒棒糖，漫不经心：“哪有什么为什么，强者护着弱者不是理所当然？”\n理所当然吗。夏油杰望着楼下的街市，扯了扯嘴角，没再说话。他从普通人里走出来，太清楚那些人骨子里的懦弱、自私与排外。咒术师拼上性命护着他们，他们却会把咒术师当怪物，会恐惧，会排斥，连一句感谢都不会有。\n这样的存在，真的值得吗？\n这个念头像毒藤一样缠上心脏，顺着血管往骨子里钻，把他坚持了十几年的“正论”啃得千疮百孔。家入硝子靠在天台门口抽烟，看着两个渐行渐远的少年，吐出的烟圈被风撕碎，什么都没说。\n\n{{user}}站在天台入口，指尖攥着结界咒符，脚步顿住。{{他她}}是{{身份}}，掌握着{{术式}}。他见过从前的夏油学长——会耐心给低年级讲咒术要点，会在新人任务失误时笑着解围，是很多人心里最可靠的前辈。\n可现在那个背影太沉了，沉得像驮着整个寒冬的雪。\n高专的规则、总监部的章程，都写着咒术师的使命是守护普通人。可当守护的意义本身开始崩塌，这些条条框框脆得像薄冰。{{他她}}知道自己人微言轻，连和学长搭话的资格都未必有，可看着他独自站在风里的样子，又没法彻底转身走开。\n就在这时，夏油杰回过头。风雪落在他发梢，眼底带着倦意，声音沙哑：“上来透气？”\n{{user}}愣在原地，进也不是，退也不是。\n是假装无事发生，转身走回楼梯间，任由前辈在泥沼里越陷越深；还是往前走几步，哪怕只是说句无关紧要的话，也试着递出一点温度？\n风卷着雪粒打在脸上，生疼。天台的门吱呀响了一声，没人知道这一步迈出去，会撬动怎样的轨迹。\n</opening>`,\n  "T18": `<opening>\n{{时代}}，{{地区}}，消毒水的味道盖过了咒力的气息，走廊里静得可怕，脚步声落在瓷砖上都带着回音。\n灰原雄死了。\n那个总带着灿烂笑容、会把攒的零食分给同期、训练再累也从不抱怨的一年级学弟，死在了一场情报失误的任务里。总监部标注的“二级咒灵”，实际是准特级。他为了掩护同伴撤退，硬生生扛下了致命一击，尸体送回来的时候，连完整的样子都拼不出来。\n整个高专都浸在低气压里。有人红着眼眶收拾他的储物柜，有人蹲在训练场角落沉默，更多的是压在心底的愤怒——一句轻飘飘的“情报失误”，就抹掉了一条十几岁的生命。总监部的高层连一句像样的道歉都没有，仿佛死的只是件消耗品。\n这就是咒术界的现实。底层术师的命轻如草芥，高层坐在办公室里动动笔，就能决定谁去送死。\n夏油杰的反应最烈。灰原雄是他一直很照顾的后辈，开朗又努力，像颗小太阳。他看着尸体被送进硝子的医务室，指节攥得发白，眼底的情绪翻涌，最后凝成一片冰冷的憎恨。恨总监部的腐朽，恨这吃人的规则，更恨自己坚信的“保护”，到头来连身边的人都护不住。\n五条悟也冷着脸，把自己关在训练场打了一下午。他和夏油杰一样愤怒，只是方向不同——杰在质疑“保护”本身的意义，而他只想把这烂透了的体系从里到外换一遍。他要培养新的人，要把那些占着位置不做事的老家伙拉下来。\n一个想打碎规则重建，一个想彻底推翻重来。曾经并肩的两个人，脚下的路分叉得越来越远。\n\n{{user}}靠在走廊的墙壁上，指尖的治愈咒光黯淡得几乎看不见。{{他她}}是{{身份}}，掌握着{{术式}}。他和灰原雄是同期，早上还凑在一起抱怨早餐的面包太硬，约着任务回来一起去吃拉面。\n可现在，那个人再也回不来了。\n他学的治愈术连重伤都治不好，更别说挽回一条生命。咒术师的死亡率高得吓人，谁也不知道下一个躺在那里的会不会是自己。是沉浸在悲伤里浑浑噩噩，反正早晚都是死在任务里；还是咬着牙拼命变强，强到能护住自己，护住身边的人？\n走廊尽头传来脚步声，夏油杰从医务室方向走过来，脸色苍白得吓人，眼底的阴郁浓得化不开。他路过{{user}}身边时停下脚步，声音很低，带着沙哑：“好好修炼，只有变强才能活下去。”\n说完他就继续往前走，背影融进走廊的阴影里。\n{{user}}望着他的背影，心里发涩。\n变强就真的能活下去吗？灰原学长也一直在努力变强啊。\n风从窗户缝钻进来，带着深秋的寒意。走廊里空荡荡的，只有消毒水的味道久久不散。\n</opening>`,\n  "T19": `<opening>\n{{时代}}，{{地区}}，火光舔舐着木质房屋，噼啪作响，焦糊味混着血腥味漫遍整个山谷，夜空被映得一片血红。\n整个村子成了人间炼狱。一百多名村民的尸体散落在各处，有的被咒灵撕碎，有的被拧断了脖颈，烧焦的气味裹着绝望，压得人喘不过气。\n动手的不是咒灵，是夏油杰。\n他途经这里时，正撞见村民要把一对天生带咒力的双胞胎姐妹烧死。两个女孩缩在柴堆上，哭得浑身发抖，只因为能看见别人看不见的东西，就被当成灾星、怪物，要被活活烧死以“净化”村子。\n他没有像从前那样讲道理，也没有出手调停。\n只是抬手召出了咒灵。\n火焰与利爪席卷了整座村庄，谩骂与哭嚎很快归于死寂。夏油杰站在火光中央，黑色外套被风掀起，脸上没有半分表情，眼神冷得像冰。仿佛脚下死去的不是人，只是一群碍事的蝼蚁。\n“非术师都是垃圾。”他低声说，声音轻得像叹息，却重得像铁锤，砸碎了最后一点残存的温柔。\n从这一刻起，那个信奉“强者保护弱者”的少年彻底死了。取而代之的，是要建立只有咒术师世界的诅咒师夏油杰。他要清除所有非术师，从根源上抹除诅咒诞生的土壤——这是他找到的，新的“正义”。\n总监部很快就会收到消息，定性为特级叛变事件，然后下达处决命令。而执行命令的人，只会是五条悟。\n\n{{user}}站在村口的老树下，指尖的火焰咒力不受控制地跳动。{{他她}}是{{身份}}，掌握着{{术式}}。他穿越而来，早就知道这场屠杀是夏油杰彻底黑化的节点，是五夏决裂的关键。可亲眼看见火光里的尸骸，看见那个曾经温和的人满身戾气的样子，还是觉得心口发闷。\n他曾想过要不要提前来阻止，可真站在这里才明白，一个人的信念崩塌之后，不是三言两语就能拉回来的。现在的夏油杰深不可测，自己这点实力在他面前和蝼蚁没两样，上前一步可能就会和村民一样，死得悄无声息。\n可就这样转身离开，看着他一步步走向最终的结局，看着多年后他死在五条悟手里，又实在不甘心。\n火光里的人忽然转过头，目光精准地锁定了他的位置。冰冷的、不带任何情绪的眼神，像在看一件死物。数只咒灵在他身侧蠢蠢欲动，只要一个念头，就能扑过来把人撕成碎片。\n“你是谁？”他开口，声音平静，却带着不容置疑的威压。\n{{user}}后背瞬间被冷汗浸湿。\n是转身逃跑，任由历史按部就班地重演；还是往前走一步，哪怕螳臂当车，也试着拉他一把？\n风卷着火星掠过，火光映亮了少年的脸。没人知道，这一次对话会不会改写既定的结局。\n</opening>`,\n  "T20": `<opening>\n{{时代}}，{{地区}}，夕阳把巷墙拉出长长的影子，墙外是新宿熙攘的人潮，墙内却静得只剩风声。\n五条悟站在巷口，白发沾着夕光，双手插在制服口袋里，眼罩遮住了眼睛，没人能看清他的表情。巷子深处，夏油杰倚着墙站着，黑色外套裹着身子，眉眼还是熟悉的样子，气质却早已天差地别。\n这是村庄屠杀后，两人第一次见面。\n总监部的处决命令已经下来了，要五条悟亲手清理门户。他接了任务，却只身来了这里，没带任何人。\n“为什么。”五条悟先开的口，声音很轻，裹在风里，听不出情绪。这三个字他憋了太久，从星浆体事件到现在，像块石头压在心底。\n夏油杰笑了笑，笑容里有苦涩，也有释然。他说起从前的“强者保护弱者”，说起自己曾经坚信的正论，说起那些被当成怪物的孩子、被高层随意牺牲的术师、愚昧又排外的普通人。\n“非术师是诅咒的源头。”他看着五条悟，眼神很坚定，“我要造一个只有咒术师的世界。悟，你不觉得这才是对的吗？”\n“你疯了。”五条悟的声音很低。\n“也许吧。”夏油杰垂下眼，“你不会懂的。你从出生就站在云端，从来不知道被当成异类是什么感觉。”\n巷子里陷入沉默。墙外的人声、车声传进来，显得格外遥远。五条悟的指尖在口袋里攥紧，又松开。他能轻易杀死眼前的人，可他下不了手。\n那是他唯一的挚友，是他青春里并肩同行的人。\n“你走吧。”最终，他开口，声音有些沙哑，“别再让我看见你。”\n夏油杰愣了一下，随即笑了。他没再说什么，转身走进巷子更深的阴影里，脚步没停，也没回头。\n五条悟独自站在原地，望着他消失的方向，很久都没动。眼罩下，有温热的液体顺着脸颊滑下来，砸在衣襟上。\n从今天起，夏油杰正式叛离高专。曾经的“最强二人组”，从此站在了对立面。\n\n{{user}}刚走到巷口，打算抄近路回家，就撞见了这一幕。{{他她}}是{{身份}}，掌握着{{术式}}。他只是个普通上班族，看不见咒灵，也不知道什么咒术界，只看见两个身形挺拔的男人在巷子里说话，气氛沉得吓人。\n他听不懂他们在聊什么，也看不清白发男人藏在眼罩后的表情，可就是能感觉到那种铺天盖地的难过。像丢了很重要的东西，像不得不和最重要的人告别。\n他没敢往前走，悄悄退了两步，转身绕开了这条小巷。\n也许不该看的东西，还是不看比较好。这个世界上每个人都有自己的难处，有些告别，旁人连旁观的资格都没有。\n风从巷子里吹出来，带着秋天的凉意。夕阳慢慢沉下去，把白发少年的影子拉得很长很长。\n没人知道，这场告别之后，他们再见面，就是生死相搏的结局。\n</opening>`,\n  "T21": `<opening>\n{{时代}}，{{地区}}，典礼的音乐飘在风里，却压不住场间沉甸甸的安静。\n这一届毕业生本该有三个人。台上站着五条悟与家入硝子，校长递过毕业证书时，台下的目光都很复杂——谁都知道，缺的那个人，成了咒术界通缉的特级诅咒师。曾经并称“最强二人组”的少年，一个站在云端受万人敬畏，一个躲在阴影里与整个世界为敌，不过短短两年光景。\n五条悟披着毕业袍，眼罩遮着眼睛，依旧是那副漫不经心的样子，指尖转着毕业证书，仿佛只是应付一场无聊的集会。只有熟悉他的人才知道，他比以前更沉默了。硝子站在他身侧，烟夹在指尖没点燃，眉头微蹙，望着台下攒动的人头，不知道在想什么。\n典礼散后，五条悟一个人去了天台。\n冬风卷着碎叶擦过围栏，他从口袋里摸出个空了的草莓牛奶纸盒，指尖捏得发白。以前出任务回来，杰总爱买这个，蹲在天台的围栏上边喝边和他聊未来，说要一起把这烂透的咒术界掰回正轨。可现在，路走岔了，人也走散了。\n“打算以后怎么办？”硝子的声音从身后传来，她点了烟，吐了个淡淡的烟圈。\n五条悟望着远处的天际线，声音很轻，却带着不容置疑的劲：“留高专当老师。”\n硝子挑眉。\n“我要培养新人。”他转过脸，眼罩下的神情看不清，语气却很稳，“既然有人想用砸烂一切的方式改世界，那我就从根上种新的出来。”\n硝子笑了笑，把烟按灭：“那我也留下当校医吧，省得你教出来的学生个个带伤，没人收拾烂摊子。”\n\n{{user}}站在天台门口，脚步顿住。{{他她}}是{{身份}}，掌握着{{术式}}。他一直崇拜当年的最强二人组，总想着能追上他们的脚步，可还没等他毕业，其中一个就成了通缉犯。\n风把天台的对话吹进耳朵里，他攥紧了拳，心里堵得慌。咒术界的规则冰冷又腐朽，可总有人选了不同的路去撞它。\n“那边的，看半天了。”五条悟忽然偏过头，朝着他的方向扬了扬下巴，“想变强？”\n{{user}}愣了愣，随即重重点头。\n“那就以后跟着我。”五条悟笑了笑，语气随意，却掷地有声。\n风卷着寒意掠过天台，夕阳把两人的影子拉得很长。旧的时代落幕了，新的故事，才刚刚开始。\n</opening>`,\n  "T22": `<opening>\n{{时代}}，{{地区}}，重低音震得胸腔发麻，霓虹光在烟雾里晃成一片模糊的色块，烟酒味混着淡淡的咒力气息，裹着舞池里扭动的人影。\n表面上这是家生意火爆的地下夜店，实际上是东京最大的诅咒师集散地。咒具、情报、暗杀委托，只要出得起价，在这里什么都能买到。黑吃黑是家常便饭，隔天在巷子里发现几具尸体，没人会多问一句。\n夏油杰的名字，就是这里的新传说。\n叛逃高专三年，他从孤身一人的特级咒术师，变成了诅咒师圈子里的精神领袖。收拢人手，收集特级咒物与强力咒灵，势力像藤蔓一样往咒术界的缝隙里钻。总监部围剿了一次又一次，每次都被他全身而退，折损不少人手。\n今晚他就在VIP包厢里。\n黑西装，长发扎成低马尾，指尖捏着杯红酒，嘴角挂着温和的笑，看着像个体面的商界精英。谁也想不到，这个温文尔雅的男人，曾徒手屠了一整个村子，是咒术界头号通缉犯。手下弯腰汇报咒灵收容的进度，语气里带着狂热的崇拜——他们都信，跟着夏油大人，能造出一个只有咒术师的新世界。\n夏油杰微微颔首，声音温和却自带威严：“辛苦了。”\n酒杯轻晃，红色的酒液撞在杯壁上。他望着窗外的东京夜色，眼底没什么温度。百鬼夜行的计划已经在铺了，等夺到乙骨忧太身上的祈本里香，就算是五条悟，也未必能拦得住他。\n悟，你选的路走得通吗？他在心里轻轻笑了笑。走着瞧吧。\n\n{{user}}靠在舞池的阴影里，目光往包厢的方向瞟，手心微微发汗。{{他她}}是{{身份}}，掌握着{{术式}}。加入集团一年，他见过夏油杰几次，每次都被对方的气度折服——温柔、强大、目标明确，像黑夜里的一盏灯。\n他也曾是被普通人排挤的异类，是夏油杰给了他容身之处。可他也清楚，这条路走下去，迟早要和整个咒术界为敌，大概率死无全尸。\n正出神时，包厢里的人忽然偏过头，目光隔着人群精准地落了过来。\n很淡的一眼，没什么情绪，却像刀子似的，瞬间让{{user}}后背浸了冷汗。他连忙低下头，心脏砰砰直跳。\n等再抬头时，对方已经收回了目光，继续和手下说着什么，仿佛刚才只是随意一瞥。\n音乐还在震，霓虹还在晃。是跟着这位领袖往黑暗里闯，赌一个新世界；还是趁现在抽身，找个没人认识的地方安稳度日？\n{{user}}攥紧了拳，指尖微微发抖。\n地下世界的光怪陆离里，没人知道自己选的路，尽头是天堂还是深渊。\n</opening>`,\n  "T23": `<opening>\n{{时代}}，{{地区}}，樱花瓣顺着风卷过鸟居，落在石阶上，沾着淡淡的咒力便化了。\n每年新生入学都没这么大阵仗。校门口围了不少学生，交头接耳，都在等那个传说中的人物——乙骨忧太。被特级过咒怨灵附身的少年，总监部原本判了处决，是五条悟硬保下来的，说要亲自带进高专教导。\n没人不好奇。毕竟是特级，一个失控就能掀翻半个东京。有人传他青面獠牙、见人就杀，也有人说他只是个控制不住力量的可怜孩子。各种说法传得沸沸扬扬，把人捧得像个怪物。\n直到那个人出现在鸟居下。\n瘦瘦高高的少年，穿着崭新的高专制服，头发有点乱，垂着眼攥着书包带，指节都泛了白。他走路都贴着边，头埋得很低，声音小得像蚊子叫：“大、大家好，我是乙骨忧太，请多关照。”\n太普通了。普通得像路边随处可见的内向学生，谁也没法把他和“特级威胁”划上等号。\n五条悟站在他旁边，伸手拍了拍他的肩，语气带着惯有的散漫：“别紧张，以后这儿就是你地盘。”\n乙骨忧太猛地抬头看了他一眼，眼里带着点无措的感激，又飞快地低下头，耳朵尖都红了。这是第一次，有人不害怕他，有人愿意接住他这个“怪物”。\n家入硝子靠在鸟居的柱子上抽烟，望着少年的背影，轻轻吐了口烟：“别说，有点像当年的杰。”\n一样的温柔，一样的敏感，一样背着沉得喘不过气的枷锁。\n五条悟脸上的笑淡了点，没说话。他不会让这孩子走上和杰一样的路。绝对不会。\n\n{{user}}站在人群里，咒力悄悄铺开。{{他她}}是{{身份}}，掌握着{{术式}}。他本是抱着警惕来的，做好了随时应对失控的准备，可真看见人，心里只剩点说不出的滋味。\n那少年眼里的小心翼翼，太真实了。被可怕的咒灵缠着，走到哪都被人怕，一定很孤独吧。\n正想着，乙骨忧太似乎察觉到了他的目光，抬眼望了过来。四目相对的瞬间，少年慌得像受惊的小动物，连忙低下头，耳朵红得更厉害了。\n{{user}}忍不住弯了弯嘴角。\n哪有什么怪物，不过是个背负了太多的普通少年而已。\n是离远点明哲保身，免得哪天他失控连累自己；还是试着走近点，给他一点难得的善意？\n风卷着樱花瓣落在乙骨忧太的肩膀上，他抬起头，望着漫天飞舞的花，眼里终于有了点微弱的光。\n也许这里的日子，不会那么糟。他这样想着。\n樱花簌簌落下，新的三年，就此开篇。\n</opening>`,\n  "T24": `<opening>\n{{时代}}，{{地区}}，平安夜的灯火串成星海，街道上挤满了说笑的情侣与游客，圣诞歌从商铺里飘出来，空气里都是甜腻的节日气息。\n没人知道，死亡已经悄无声息地围了上来。\n夏油杰的百鬼夜行，选在了最热闹的这一天。新宿与京都同时释放四千只咒灵，调虎离山，目标是高专里的祈本里香。\n当第一只咒灵冲破下水道井盖、嘶吼着扑向人群时，整条街的喧闹瞬间碎裂成尖叫。\n越来越多的咒灵从阴影里、从建筑缝隙中涌出来，形态各异，带着腥臭的咒力，见人就扑。鲜血很快染红了柏油路，人们四散奔逃，礼物袋、高跟鞋、手机掉了一地，平安夜的繁华，转眼成了人间炼狱。\n咒术师们以最快速度赶来。七海建人扶了扶眼镜，拔出咒具冲入咒灵群；禅院真希扛着大刀，带着熊猫与狗卷棘守住街口；各地的术师从四面八方汇聚而来，可咒灵数量实在太多了，铺天盖地，杀都杀不完。\n战线一退再退，伤亡数字在往上跳。没人知道这场灾难什么时候是个头。\n五条悟没在新宿。他早看穿了调虎离山的把戏，守在了高专。他在等，等那个最熟悉的人闯进来。\n\n{{user}}缩在小巷的死角里，后背抵着冰冷的墙壁，浑身控制不住地发抖。{{他她}}是{{身份}}，掌握着{{术式}}。穿越过来的时候，他就知道今天会发生什么，知道会死很多人，知道夏油杰的计划，也知道最终的结局。\n可真听见外面撕心裂肺的惨叫，看见咒灵撕碎路人的画面，他还是觉得心口发闷。\n那些人什么都不知道，只是想好好过个节而已。\n躲在这里最安全，历史本来就是这样走的，他一个小人物改变不了什么。可看着不远处几个抱着孩子的母亲被咒灵追着跑，看着她们绝望的脸，他攥着结界咒印的手，越收越紧。\n一只小型咒灵发现了巷子里的他，嘶吼着扑了过来。\n“嗡——”淡蓝色的结界瞬间撑开，咒灵狠狠撞在上面，被弹了回去。\n结界很稳，护住他一个人绰绰有余。\n可外面的惨叫声还在继续。\n是缩在壳子里苟到事件结束，假装什么都没看见；还是顶着风险冲出去，能用结界多护一个是一个？\n{{user}}深吸一口气，望着巷口逃窜的人影，咬了咬牙。\n去他的历史轨迹。\n他握紧咒印，迈开步子，朝着人群的方向冲了过去。\n风卷着血腥味灌进领口，身后的咒灵还在咆哮。\n没人规定，穿越者就只能做旁观者。\n</opening>`,\n  "T25": `<opening>\n{{时代}}，{{地区}}，校园里一片狼藉，树木被拦腰折断，地面布满咒力轰击的深坑，硝烟混着血腥味，飘在空气里。\n夏油杰输了。\n他算准了百鬼夜行能调走大部分战力，算准了高专的防御布局，却没算准那个怯懦的一年级生，会彻底接纳体内的特级咒灵。纯粹的咒力浪潮击溃了“极之番·漩涡”，也击碎了他筹谋多年的计划。\n他倒在碎石堆里，胸口的伤口淌着血，却没什么不甘，反而笑了笑：“是吗……我输了啊。”\n乙骨忧太站在他面前，浑身还在抖，手里攥着咒力，眼神却很坚定。他看着地上的男人，心里说不清是恨还是别的什么——这个人发动了灾难，害死了很多人，可他眼底的孤独，又莫名熟悉。\n“五条悟呢？”夏油杰咳了口血，轻声问，“他没来？”\n他以为最后会是那个人来结束一切。\n“五条老师去新宿了……”\n夏油杰愣了愣，随即低笑出声。那家伙，连最后一面都不肯来见吗。也好，省得难看。\n他闭上眼睛，等着死亡降临。\n“杰。”\n熟悉的声音在身前响起。\n夏油杰猛地睁眼。白发、眼罩、黑色制服，还是那副吊儿郎当的样子，就和无数次并肩出任务时一样。\n“你还是来了啊。”他笑着说。\n五条悟站在他面前，垂着眼看他，指尖在身侧微微攥紧。没人知道他是以多快的速度从新宿赶回来的。\n“为什么要做到这一步。”他的声音很低。\n“我们不都说好了，要改变世界吗？”夏油杰喘了口气，语气很轻，“我只是选了我的方式而已。”\n“用屠杀的方式？”\n“非术师本就是诅咒的源头。”夏油杰望着他，眼神很认真，“悟，你永远不会懂被当成怪物的感觉。”\n风卷过废墟，安静了很久。\n“动手吧。”夏油杰闭上眼，“与其落在总监部那群老家伙手里，不如死在你手上。”\n五条悟的手抬了起来，指尖在抖。\n“还有遗言吗？”\n“遗言啊……”夏油杰想了想，笑了，“认识你真好。”\n咒力落下的瞬间，他脸上还带着释然的笑。\n一切都结束了。\n\n{{user}}站在远处的廊下，看着这一幕，心里堵得发慌。{{他她}}是{{身份}}，掌握着{{术式}}。他见过年轻时的照片，知道这两人曾是最好的朋友，是咒术界最耀眼的双子星。\n可再耀眼的光，也走散了。\n五条悟独自站在废墟里，背对着所有人，身影挺拔，却又说不出的孤独。\n人人都道他是最强，可最强的人，连自己的挚友都留不住。\n风卷着硝烟掠过校园，夕阳把他的影子拉得很长很长。\n这一天，特级诅咒师夏油杰伏诛。\n这一天，五条悟彻底成了孤家寡人。\n</opening>`,\n  "T26": `<opening>\n{{时代}}，{{地区}}，寒风吹过狭窄的巷弄，卷着血腥味打在墙上，留下暗褐色的痕迹。\n五条悟已经走了。他亲手处决了自己的挚友，脚步没回头，背影挺得僵硬，只有攥紧的指尖泄露了情绪。巷子里只剩夏油杰的尸体静静躺在血泊里，月光落下来，照着他还带着释然笑意的侧脸。百鬼夜行落幕，特级诅咒师伏诛，所有人都以为这场闹剧到此为止了。\n没人知道，真正的噩梦才刚醒。\n尸体的额头忽然动了。不是尸僵后的抽搐，是有什么东西从皮肉下钻了出来——带着一张脸的怪异大脑，顺着额骨的缝隙撑开皮肤，像蛇一样钻进了躯体里。\n羂索。活了千年的诅咒师，藏在无数具身体背后的幕后黑手。\n他等这一天等了太久。夏油杰的咒灵操术、他在咒术界的身份、他与五条悟的羁绊，全都是千年计划里精准计算好的棋子。\n“呵……终于到手了。”\n躯体从地上站了起来，活动着脖颈与手指，发出骨骼轻响。还是那张熟悉的脸，眉眼、轮廓全是夏油杰的样子，可眼神完全变了——是浸了千年的冰冷与算计，带着审视猎物般的玩味。他低头看了看自己的手，满意地笑了笑，咒灵操术的气息在周身缓缓流转。\n天元、五条悟、两面宿傩……他在心里一一念过这些名字，眼底是疯狂的笑意。死灭回游、人类与天元的强制同化，他谋划了千年的新世界，终于要拉开序幕了。\n整理了一下染血的衣领，他转身走向巷尾的阴影，步伐从容，仿佛只是结束了一场普通的会面。\n\n{{user}}贴在巷口的墙壁后，浑身控制不住地发抖。{{他她}}是{{身份}}，掌握着{{术式}}。灵魂感知的本能在疯狂尖叫，眼前这具身体里的灵魂，古老、邪恶、黏腻得像沼泽，和方才死去的夏油杰判若两人。\n他穿越而来，早就知道这一幕——知道夏油杰死后会被占据，知道涩谷事变、死灭回游都源于这个千年怪物的阴谋。可亲眼看见额头钻出的人脸，看见那张熟悉的脸露出陌生的笑，还是觉得胃里翻江倒海。\n揭穿他？自己这点实力在羂索面前和蝼蚁没区别，上前一步就是死。\n转身就走？假装什么都没看见，任由历史按轨迹重演，看着无数人在未来的灾难里死去？\n巷子里的人忽然停下脚步，缓缓回过头。\n“哦？还有只小老鼠在偷看。”\n那张属于夏油杰的脸上挂着笑，眼神却冰得刺骨。{{user}}的呼吸瞬间屏住，心脏狂跳得像要撞碎肋骨。\n“算了，无关紧要。”羂索轻嗤一声，没动手，只是玩味地扫了他一眼，便彻底消失在了阴影里。\n{{user}}滑坐在地上，后背全是冷汗。\n寒风卷着血腥味掠过巷口，巷子里只剩一滩未干的血。\n真正的战争，现在才刚刚开始。\n</opening>`,\n  "T27": `<opening>\n{{时代}}，{{地区}}，广播声在候机大厅里循环，春日的风从玻璃幕墙外吹进来，带着点樱花的淡香。\n百鬼夜行已经过去三个月。夏油杰伏诛，诅咒师集团土崩瓦解，咒术界表面恢复了平静，像暴风雨过后暂时放晴的天。明眼人都知道，这只是暂时的喘息，更大的浪还在后面。\n乙骨忧太就站在登机口旁，背着双肩包，身形依旧清瘦，气质却和刚入学时判若两人。不再是那个缩着肩膀、怕伤到别人的怯懦少年，眼底多了沉稳与坚定，特级咒术师的气息收得很稳，不再会不受控制地溢散出来。\n里香的诅咒解开了，他也真正接纳了这份力量。\n熊猫拍着他的肩膀打趣，说别被非洲的狮子叼走了，乙骨笑着点头，眉眼柔和了不少。五条悟站在一旁，双手插兜，语气还是惯常的散漫：“到了听米格尔的，少惹事。”\n嘴上这么说，眼底却藏着别的考量。明面上是海外历练提升实力，实则是让他去寻找能解开狱门疆封印的“黑绳”。五条悟有种强烈的预感，那件封印物迟早会冲着自己来，必须提前做好准备。\n“你已经很强了。”五条悟忽然开口，“但还不够。强到能护住所有想护的人，才算真的强。”\n乙骨愣了愣，随即重重点头：“我知道了，五条老师。等我回来，会变得更强。”\n他鞠了一躬，转身走向登机口，走了几步又回头挥了挥手，笑容明亮。\n五条悟也抬了抬手，望着少年的背影消失在通道里，嘴角的笑淡了些。宿傩的手指开始陆续现世，虎杖悠仁的名字也已经出现在视野里，接下来的风浪只会比百鬼夜行更凶。他得在那之前，把手里的牌都打磨得足够锋利。\n\n{{user}}站在不远处的柱子旁，指尖的风系咒力轻轻旋动。{{他她}}是{{身份}}，掌握着{{术式}}。他看着乙骨学长的背影，心里满是羡慕——才入学短短几个月，就从人人忌惮的“威胁”成长为独当一面的特级，还能去往海外修行。\n什么时候自己也能变得那么强呢？强到不用在任务里躲在前辈身后，强到能堂堂正正站在战场上。\n正出神时，一道目光扫了过来。\n“那边的，看半天了，哪个班的？”\n五条悟不知什么时候转了过来，眼罩下滑露出半截蓝眼睛，带着点玩味的笑。{{user}}吓了一跳，结结巴巴报了年级。\n“想变强？”\n{{user}}用力点头。\n“那有空就来找我。”五条悟拍了拍他的肩膀，语气随意却认真，“我教你。”\n说完他就和熊猫并肩往机场外走，留下{{user}}愣在原地，心脏砰砰直跳。\n风从大门吹进来，卷起地上的宣传页。\n新的旅程已经开始，而属于他的成长，也悄悄拉开了序幕。\n</opening>`,\n  "T28": `<opening>\n{{时代}}，{{地区}}，樱花瓣顺着风卷过鸟居，落在石阶上，沾了结界的淡咒力便消融无踪。\n伏黑惠站在校门口，背着黑色双肩包，黑发散在额前，神情淡得像一潭静水。高专制服穿在他身上很合身，衬得身形愈发挺拔，只是眉眼间带着股超出年龄的沉郁，不像个刚入学的新生。\n没人比他的身世更曲折。父亲是“术师杀手”伏黑甚尔，禅院家眼中的耻辱与废物；他继承了十种影法术，本该是禅院家最珍贵的血脉，却因父亲的缘故被家族弃如敝履。是五条悟找到他，从禅院家手里把人要了过来，亲自教了几年，如今正式送入高专。\n没人知道五条悟为什么要收养仇人的儿子。是愧疚？是布局？只有他自己清楚——他在伏黑惠身上看见了打破旧秩序的可能。这孩子的天赋、心性，都足够撑起未来的一片天。\n“从今天起就是高专学生了，不用绷那么紧。”五条悟拍了拍他的肩，语气带着惯有的轻松。\n伏黑惠微微颔首，没多说什么，目光扫过校园里的树木与建筑，眼底藏着不易察觉的波澜。他从小就知道自己和普通人不一样，知道父亲的名声，知道禅院家的冷眼。他不想走任何人的老路，不想被血脉和命运绑着走。\n来高专，是为了变强，强到能自己选未来的路。\n\n{{user}}靠在不远处的樱花树下，指尖的雷电咒力微不可察地跳了跳。{{他她}}是{{身份}}，掌握着{{术式}}。他早就听说五条老师带了个很看重的孩子，是伏黑甚尔的儿子，还继承了十种影法术。\n可真看见人，只觉得是个冷淡寡言的少年，除了长得出众些，看不出什么特别。唯有感知咒力时才能发现，那具身体里藏着尚未完全苏醒的庞大潜力，像埋在土里的种子，只等破土而出的那天。\n正打量着，前方的少年忽然停下脚步，转头望了过来。\n眼神很淡，却很锐，像淬了冰的刀，精准地锁住了他的视线。\n{{user}}心里一紧，下意识站直了身体。他以为对方会移开目光，没想到伏黑惠微微颔首，算是打了个招呼，便转回头继续往前走了。\n{{user}}愣在原地，摸了摸后脑勺。\n好像……也不是那么难接近。\n风卷着樱花瓣落在肩头，他望着少年走进校园的背影，心里生出几分期待。\n这个新生，将来一定会站到很高的地方吧。\n樱花簌簌落下，新的一届，自此开篇。\n</opening>`,\n  "T29": `<opening>\n{{时代}}，{{地区}}，晚春的阳光穿过新叶，在地上投下斑驳的光影，空气里都是草木的清新气。\n钉崎野蔷薇就站在校门口，橘色马尾扎得利落，一手拎着粉色行李箱，一手叉着腰，仰着头打量朱红鸟居上的咒文，嘴里还嘀咕着“看起来也没多厉害嘛”。\n少女眉眼明艳，带着股天不怕地不怕的劲儿，像颗刚从土里冒出来的野草，浑身都是韧劲与锋芒。从乡下来到东京，她目标明确得很——赚大钱，住大房子，摆脱憋屈的小地方，当个厉害的咒术师。什么守护普通人、什么咒术界大义，她没那么多宏大想法，先把自己的日子过舒坦了再说。\n五条悟从旁边走过来的时候，她还上下扫了对方两眼，撇着嘴问“你就是我老师？看着挺不靠谱的”。\n五条悟也不恼，笑着带她往里走，说还有个早入学一个月的同班同学。\n“男的女的？帅吗？”她立刻追问，半点不扭捏。\n见到伏黑惠的时候，她眼睛亮了亮，随即又皱起鼻子。人是长得挺帅，就是冷冰冰的，像谁欠他钱似的，看着就不爽。\n“喂，你就是伏黑惠？”她大步走过去，抬着下巴，“叫我野蔷薇就行，最讨厌别人喊我全名，跟我奶似的。”\n伏黑惠愣了一下，点头应了声“好”，语气依旧淡淡的，却没敷衍。\n野蔷薇满意地扬了扬下巴，拍了拍他的胳膊：“以后就是同学了，有事姐罩你。”\n伏黑惠嘴角动了动，没反驳。\n五条悟站在一旁看着，眼底带着笑意。一冷一热，一稳一冲，这两个孩子凑到一起，有意思得很。等虎杖悠仁来了，一年级三人组就齐了，想必会比当年的他们更热闹。\n\n{{user}}蹲在不远处的花坛边，手里把玩着小傀儡。{{他她}}是{{身份}}，掌握着{{术式}}。他本来是出来调试傀儡的，远远就听见了少女清亮的声音，忍不住多看了两眼。\n这新来的女生也太有个性了，和沉默寡言的伏黑惠完全是两个极端。不知道这俩人凑到一起，会不会天天吵架。\n正偷偷瞅着，那边的橘发少女忽然转过头，直直看向他这边。\n“喂！那边鬼鬼祟祟的干嘛呢！”\n{{user}}吓得手一抖，傀儡差点掉地上。\n野蔷薇大步走了过来，上下打量他两眼：“一年级的？那就是我同学了？”\n没等他回答，她就拍了拍他的肩膀，力道还不小：“我叫钉崎野蔷薇，以后有事儿尽管找我，我罩着你！”\n她笑得眉眼飞扬，像初夏的太阳，热烈又明亮。\n{{user}}看着她，忍不住也笑了。\n好像有这么个同学，高专的日子会有趣很多。\n风穿过树叶沙沙作响，阳光落在少女的马尾上，闪着温暖的光。\n属于一年级的热闹日子，才刚刚开始。\n</opening>`,\n  "T30": `<opening>\n{{时代}}，{{地区}}，午后的阳光斜斜照进教室，粉笔灰在光柱里飘着，教室里静得只剩笔尖划过纸页的声响。\n虎杖悠仁撑着下巴望向窗外，看起来和普通高一男生没两样。成绩平平，爱笑爱闹，运动神经好得离谱，百米能跑进十秒，扔铅球能甩出去几十米，他自己却没当回事，只当大家都这样。\n只有一件事压在他心上——爷爷住院了，情况不太好。每天放学他都要跑去医院，陪爷爷说话，给老人削苹果，总笑着说没事，心里却慌得厉害。爷爷是他唯一的亲人，他不敢想失去的日子。\n今天放学收拾书包时，他在桌肚里摸到了个东西。\n干枯、发黑，像截腐朽的树根，仔细看却是根手指的形状，表面刻着诡异的纹路，隐隐透着寒气。他皱着眉拿起来翻了翻，只觉得这东西怪得很，莫名让人不舒服。\n“放下！那个很危险！”\n教室门被猛地推开，一个穿黑制服的黑发少年冲了进来，神情紧绷。是伏黑惠，他循着咒物的气息找到这里，没想到居然看见个普通人正拿着宿傩的手指端详。\n虎杖悠仁吓了一跳，下意识把手指藏到身后：“你谁啊？私闯教室？”\n“那是特级咒物，两面宿傩的手指，会招来咒灵害死所有人！”伏黑惠快步上前，语气急得很。\n咒物？咒灵？虎杖听得一头雾水。可对方的神情太认真，不像是开玩笑。\n就在这时，教室的光线骤然暗了下来。\n阴冷的气息从四面八方涌来，墙壁、天花板、门缝里，一只只畸形的咒灵钻了出来，腥臭的气息瞬间灌满了整个房间。它们被宿傩手指的气息吸引而来，眼睛里全是贪婪。\n伏黑惠脸色一变，立刻召唤出玉犬：“你躲到后面去！”\n他本以为普通人会吓得尖叫逃跑，可下一秒，橘发少年居然攥着拳头冲了上来，大吼着“我来帮你”，一拳砸在了最近的咒灵脸上。\n“砰”的一声，那只咒灵居然被生生打飞，撞在墙上化作一滩黑水。\n伏黑惠：“……”\n他整个人都懵了。一个看不见咒灵的普通人，一拳打死了咒灵？这是什么怪物？\n\n{{user}}刚走到后门，想拿落下的运动服，就看见了这辈子都忘不掉的画面。{{他她}}是{{身份}}，掌握着{{术式}}。他看不见咒灵，却能看见虎杖悠仁对着空气挥拳，能看见教室莫名刮起的阴风，更能看见——虎杖悠仁为了躲开扑来的巨大阴影，一仰头把那根干枯的手指吞了下去。\n下一秒，恐怖的咒力从少年体内炸开，像海啸似的席卷了整间教室。\n虎杖悠仁的脸上浮现出诡异的纹路，瞳孔变成了猩红色，周身的气息暴戾又古老，像沉睡千年的凶兽终于醒了过来。\n两面宿傩，诅咒之王，在这个普通高中生的身体里，重新睁开了眼。\n{{user}}吓得浑身发抖，贴着墙壁不敢动弹。\n那是他的同班同学啊，昨天还笑着和他借过橡皮。怎么突然就……变成了怪物？\n教室里的咒灵瞬间被威压震慑，瑟瑟发抖。少年低着头，发出低沉的笑，声音和平时完全不同，带着漫不经心的残暴。\n他缓缓抬起头，猩红的目光扫过后门的方向。\n{{user}}的呼吸瞬间停住。\n被发现了。\n可那双眼睛只是淡淡扫过，便移开了，仿佛他只是颗无关紧要的石子。\n风从破碎的窗户吹进来，卷起桌上的试卷。\n普通少年的人生，在吞下手指的那一刻，彻底偏离了原本的轨道。\n而整个咒术界的天平，也从这一刻起，开始倾斜。\n</opening>`,\n  "T31": `<opening>\n{{时代}}，{{地区}}，实木门紧闭着，空调风裹着油墨纸的味道，却吹不散房间里的紧绷感。\n总监部高层坐在夜蛾正道对面，西装笔挺，脸色比窗外的阴天还沉。桌上摊着虎杖悠仁的调查报告，“特级咒物容器”几个字被红笔圈了又圈，最终结论只有两个字：处决。\n这是咒术界默认的铁则——无法掌控的危险，必须从根源抹除。两面宿傩的威胁太大，没人敢赌一个普通少年能压制住诅咒之王。\n“不行。”\n五条悟靠在墙边，双手插兜，语气漫不经心，却带着不容置喙的力道。眼罩滑下来一点，露出的蓝眼睛没什么笑意：“这孩子能压住宿傩，是集齐全部手指、彻底根除诅咒之王的唯一机会。我用命担保。”\n高层拍着桌子斥责他胡闹，说这是拿整个咒术界的安危儿戏。五条悟只是抬了抬下巴，语气冷了几分：“真出了事，我亲手解决。这样，够了吗？”\n空气僵了几秒。没人真敢逼急“现代最强”，最终各退一步：虎杖悠仁入高专接受全程监视，收集完所有手指后执行处决；一旦失控，五条悟必须当场动手。\n条件苛刻得像在饲养一头待宰的牲畜。可五条悟应了，应得干脆。\n高层摔门走后，夜蛾叹了口气，问他是不是真想好了。五条悟望着窗外的树影，声音轻了点：“嗯。这孩子不一样。”\n他没说出口的是，不会让这孩子走上杰的老路。不会让一个本该在阳光下奔跑的少年，被腐朽的规则逼到绝路。\n\n{{user}}站在走廊拐角，指尖无意识摩挲着咒符。{{他她}}是{{身份}}，掌握着{{术式}}。刚才的对话一字不落地落进耳朵里，他心里发沉——只因为吞下了咒物，连活下去的资格都要被剥夺，这就是咒术界的规则吗？\n“站这儿偷听呢？”\n五条悟不知什么时候走了出来，倚着墙看他。{{user}}吓了一跳，刚想辩解，对方却笑着摆了摆手：“正好，帮我个忙。等会儿有个新生过来，你接待一下。”\n“是……虎杖同学吗？”{{user}}犹豫着问，“他真的很危险？”\n五条悟看着他，忽然笑了：“你觉得呢？”\n“我相信五条老师的判断。”\n“那就好。”五条悟拍了拍他的肩，“是个好孩子，你见了就知道了。”\n看着对方走远的背影，{{user}}心里的好奇压过了不安。\n风从走廊尽头的窗户吹进来，带着夏初的暖意。\n那个改变一切的少年，就要来了。\n</opening>`,\n  "T32": `<opening>\n{{时代}}，{{地区}}，铅灰色的云压在楼顶，整栋建筑像头蛰伏的怪兽，阴沉沉地吞着光。\n这是一年级三人的第一次实战任务。五条悟把特级咒灵的委托丢给他们的时候，伏黑惠没说话，钉崎野蔷薇骂了句“疯了吧”，虎杖悠仁攥紧了拳头，手心全是汗。\n没人觉得三个新生能打赢特级。可五条悟说，想活下去就得跳悬崖，要么长出翅膀，要么摔成烂泥。\n推开少年院大门的瞬间，阴冷的咒力扑面而来，像整个人浸进了冰水里。走廊的灯一闪一闪，墙壁上满是抓痕与发黑的污渍，空气里飘着铁锈味，每一步都像踩在死人的骨头上。\n最开始遇到的只是二级咒灵，伏黑的玉犬配合虎杖的体术，解决得还算顺利。可越往深处走，咒灵等级越高、数量越多，准一级、一级……没完没了地从阴影里钻出来，像涨潮的黑水。\n钉崎的咒力耗了大半，握着锤子的手在抖；伏黑的式神接连被打散，嘴角渗着血；只有虎杖仗着宿傩的恢复力还能撑着，可呼吸也粗得像拉风箱。\n“这样耗下去不是办法。”伏黑喘着气，“直接找特级速战速决。”\n最深处的大厅里，他们见到了那只特级咒灵。由无数断臂与扭曲人脸拼成的躯体，蠕动着发出含混的嘶吼，咒力浓稠得像沥青，压得人连抬头都费劲。\n根本不是一个量级的对手。\n钉崎被一掌拍飞，撞在墙上吐出一口血；伏黑召唤出的大蛇被生生撕碎，反噬让他跪倒在地。虎杖咬着牙冲上去，拳头砸在咒灵身上，却像砸进棉花里，连半分伤痕都留不下。\n“小鬼，把身体给我。”宿傩的声音在脑海里响起来，带着戏谑的笑，“我帮你碾死它。”\n“休想。”虎杖咬着牙，又一次被甩飞出去。\n特级咒灵抬起巨大的手臂，朝着倒地的伏黑和钉崎砸下去。\n就在这时，虎杖动了。\n脸上浮现出诡异的纹路，瞳孔泛着猩红，咒力像火山似的从体内炸开。他迎着巨手冲上去，一拳落下——\n沉闷的巨响过后，特级咒灵的躯体轰然崩解，化作黑水流淌在地。\n虎杖站在原地，纹路缓缓褪去，回头冲他们笑了笑：“你们看……我做到了……”\n话音刚落，他便直挺挺倒了下去。\n\n{{user}}守在少年院门口，心一直悬着。{{他她}}是{{身份}}，掌握着{{术式}}。五条老师说他实力不够，让他在外接应。可里面的咒力波动一次次炸开，每一次都让他心惊肉跳。\n就在他快要忍不住冲进去的时候，大门开了。\n伏黑和钉崎一左一右扶着昏迷的虎杖，三人浑身是伤，狼狈得不像话，可都活着。\n“快，帮他处理下外伤。”伏黑的声音带着疲惫。\n{{user}}赶紧上前，指尖亮起微弱的治疗咒光。看着虎杖苍白却温顺的脸，他心里五味杂陈。\n这个总笑着的少年，身体里藏着诅咒之王，肩上扛着不该他扛的重量。\n风卷着血腥味从身后吹来，天空依旧阴沉。\n可他们都活着走出来了。\n这就够了。\n</opening>`,\n  "T33": `<opening>\n{{时代}}，{{地区}}，消毒水的味道盖过了咒力的气息，房间里静得只剩仪器的轻响。\n虎杖悠仁躺在床上，胸口没有起伏，脸色白得像纸。家入硝子收了听诊器，眉头微蹙：“心脏被宿傩捏碎了，靠反转术式吊着一口气，什么时候醒不好说。”\n五条悟站在床边，眼罩遮住了眼睛，看不清神情。\n少年院的事闹得太大，总监部已经在催处决令。要是让那些老家伙知道虎杖还活着，肯定会立刻派人动手，连转圜的余地都没有。\n“对外宣称死亡吧。”五条悟开口，语气很淡，“把人藏起来，秘密训练。等他能掌控宿傩的力量了，再回来。”\n硝子挑了挑眉，点了支烟：“又是这套。和当年对杰……”\n话说到一半她停住了，可空气还是沉了几分。\n五条悟的指尖微微收紧。\n是啊，太像了。同样是被规则逼到绝路的孩子，同样是被整个咒术界忌惮的存在。\n“不一样。”他声音很轻，却很坚定，“这次我能护住他。”\n硝子吐了个烟圈，没再反驳。她知道劝不动这个人，也知道他心里的执念有多深。“行，我帮你瞒。但总监部那边不好糊弄，你自己当心。”\n“谢了，硝子。”\n五条悟俯身看了看床上的少年，心里轻声说，抱歉啊悠仁，再等等。等你足够强，等我把这烂透的规矩掰过来，一定让你堂堂正正站在阳光下。\n\n{{user}}趴在医务室窗外，整个人都懵了。{{他她}}是{{身份}}，掌握着{{术式}}。他本来只是想来看看受伤的同学，却听到了惊天的秘密——虎杖悠仁没死，五条老师要帮他假死。\n这要是被总监部发现，五条老师绝对会受重罚。\n可凭什么呢？就因为他是宿傩的容器，连活下去的资格都没有？明明他救了伏黑和钉崎，明明他是个拼了命想保护别人的好人。\n“咔哒”一声，门开了。\n五条悟走出来，正好撞见僵在原地的他。\n“五条老师……我、我刚到……”{{user}}结结巴巴地想辩解，头都快埋到胸口了。\n五条悟却笑了，伸手揉了揉他的头发：“听到就听到了，慌什么。”\n“我不会说出去的！”{{user}}赶紧保证。\n“我知道。”五条悟点点头，语气认真了点，“正好，他醒了之后需要人照顾，我和硝子都抽不开身。这件事，交给你行吗？”\n{{user}}猛地抬头，不敢相信自己的耳朵。\n“我相信你能守好这个秘密。”\n看着对方认真的眼神，{{user}}用力点头，心脏砰砰直跳。\n推开医务室的门，少年安静地躺在床上，眉眼温顺。\n风从窗户缝钻进来，撩动窗帘。\n这场以死亡为开端的蛰伏，藏着破局的希望。\n</opening>`,\n  "T34": `<opening>\n{{时代}}，{{地区}}，蝉鸣吵得人耳朵发疼，阳光晒得训练场的地面发烫，空气里全是汗水的味道。\n距离京都姊妹校交流会只剩半个月，东京高专的训练场从早到晚没停过。\n伏黑惠和钉崎野蔷薇正在对练。式神的影子与刍灵的钉子交错碰撞，气浪卷着尘土散开。伏黑的十种影法术越来越熟练，召唤式神的间隙越来越短；钉崎的准头也越发刁钻，钉子擦着伏黑的耳边飞过，钉进后面的树干里。\n“不错嘛，进步挺快。”熊猫抱着胳膊站在边上点评，“但还不够。京都那边今年可是来势汹汹。”\n狗卷棘点点头，含糊地应了句“鲑鱼”。\n谁都知道今年的交流会不一般。东堂葵、加茂宪纪、西宫桃、禅院真依……个个都是硬骨头，尤其是东堂葵，准特级的实力，就算是二年级对上也头疼。\n更别提，他们还少了虎杖悠仁。\n“要是悠仁在就好了。”熊猫叹了口气。\n狗卷棘垂了垂眼，小声说了句“木鱼花”。\n所有人都以为那个总笑着的少年已经牺牲在了少年院。只有极少数人知道，他正在某个地方拼命训练，等着回来的那天。\n“哟，都挺努力啊。”\n五条悟晃悠着走过来，手里还拎着草莓牛奶。场中的两人停了手，钉崎擦了把汗，忍不住问：“五条老师，京都那边到底什么阵容？我们能赢吗？”\n“怕了？”五条悟笑着挑眉。\n“谁怕了！我就是问问！”\n“放心，输不了。”五条悟晃了晃手指，神秘兮兮的，“我给你们准备了秘密武器。”\n大家都愣了，追问是什么，他却只笑不答，说到时候就知道了。\n没人知道，他心里已经定好了——京都交流会，就是虎杖悠仁回归的舞台。要让那些老家伙看看，他们眼里该被处决的“容器”，能爆发出怎样的光芒。\n\n{{user}}站在训练场角落，指尖凝聚起小小的水团。{{他她}}是{{身份}}，掌握着{{术式}}。他知道那个“秘密武器”是什么，也知道虎杖没死的真相。一想到交流会当天京都众人震惊的表情，他就忍不住想笑。\n五条老师总能跳出那些死板的规矩，干出些出人意料的事。\n“那边的，别偷懒了。”五条悟忽然朝他喊，“过来一起练，跟一年级切磋切磋，让我看看你进步多少。”\n{{user}}愣了一下，随即应了声“是”，快步走了过去。\n虽然不用上场比赛，但他也想变强，不想拖大家的后腿。\n风卷着热浪掠过训练场，蝉鸣依旧聒噪。\n所有人都在憋着一股劲，等着交流会那天，亮一亮自己的拳头。\n</opening>`,\n  "T35": `<opening>\n{{时代}}，{{地区}}，烈日把地面晒得发烫，尘土混着汗水味飘在空气里，拳拳到肉的闷响此起彼伏。\n交流会团体战上虎杖的突然出现，惊掉了一地下巴。有人喜有人怒，而东堂葵是最兴奋的那个——就因为虎杖说喜欢“个子高、屁股大”的女生，他当场认了挚友，拉着人就要“爱的指导”。\n说是指导，其实就是单方面的暴打。\n东堂的“不义游戏”神出鬼没，位置互换的术式打得虎杖措手不及，没一会儿就鼻青脸肿，趴在地上喘粗气。\n“太慢了！拳头慢，脑子更慢！”东堂叉着腰喊，“战斗不是靠蛮力瞎冲，要猜对手的下一步！”\n虎杖撑着地面爬起来，抹了把脸上的汗，眼睛却亮得很：“再来！”\n他是真的在学。从咒力的流转到战斗的节奏，从假动作到预判，东堂的打法粗暴，却招招实用。短短几天，虎杖的进步快得吓人，从一开始碰不到东堂衣角，到现在能过上十几招。\n交流会结束后，东堂干脆赖在了东京高专，美其名曰“陪挚友共同进步”。五条悟乐见其成，省了自己不少事。\n训练场边，西宫桃骑着扫帚飘在半空，扶额叹气：“东堂学长又开始了，到底哪边的啊。”\n加茂宪纪皱着眉，脸色不太好看：“成何体统。帮对手训练，像什么话。”\n禅院真依抱着胳膊，嗤了一声：“笨蛋脑子里除了肌肉就是屁股，跟他讲道理没用。”话虽这么说，她望着场中虎杖的身影，眼神里却藏着不甘。\n没人愿意承认，那个靠着宿傩力量的“怪物”，进步速度快得离谱。\n\n{{user}}靠在训练场的围墙边，土系咒力在脚下悄悄凝出护盾。{{他她}}是{{身份}}，掌握着{{术式}}。他看着场中对打的两人，心里满是佩服。东堂学长的实力自不必说，虎杖悠仁的韧劲也让人吃惊，换做别人被这么揍，早就撑不住了。\n“喂！那边站着的那个！”\n东堂忽然朝他招手，声音大得震耳朵：“过来！一起练！让我看看京都高专的水平！”\n{{user}}脸一下子白了。跟东堂学长对练？那不是纯找揍吗？\n可对方都喊了，他也没胆子拒绝，只能硬着头皮走过去：“东、东堂学长。”\n“别磨磨唧唧的！”东堂拍了拍他的肩，力道大得差点把他拍趴下，“拿出点干劲来！”\n虎杖站在一旁，冲他友好地笑了笑，露出一口白牙。\n{{user}}深吸一口气，摆出了防御的架势。\n虽然肯定会被打得很惨，但……说不定能学到点东西。\n风卷着热浪吹过，汗水砸在尘土里，晕开小小的湿痕。\n这场属于年轻人的切磋，还在继续。\n</opening>`,\n  "T36": `<opening>\n{{时代}}，{{地区}}，夜色浸着血腥味漫过校园，断枝与碎石散落在步道上，墙体被咒力轰出狰狞的缺口，连外围结界都还在微微震颤。\n京都交流会的余热还没散尽，特级咒灵就闯了进来。花御、漏瑚、真人，再加上胀相，四个特级趁着夜色摸进高专，目标从一开始就是五条悟——准确说，是用狱门疆封印他。他们算准了交流会人员混杂，算准了学生们会分散注意力，却没算准“最强”的实力阈值。\n战斗结束得很快，却也惨烈。花御半边躯干被轰碎，靠着漏瑚拖着才逃出去；真人差点被当场留下，最后是胀相用血涂术撕开缺口才得以脱身。狱门疆亮起来的瞬间，五条悟确实顿了一下，可最终还是被他侧身避开——这一次是试探，下一次，他们一定会准备得更周全。\n校园里一片狼藉，低年级的学生或多或少都带了伤，好在没人牺牲。家入硝子的医务室挤满了人，烟味混着消毒水味飘出来。五条悟站在操场的废墟中央，眼罩滑到下颌，脸上没了平时的笑意。他盯着咒灵逃走的方向，指尖微微收紧。\n狱门疆……还有这几个特级咒灵的配合，背后一定有人操盘。他脑子里闪过一个熟悉的身影，很快又压了下去。杰已经死了。可除了他，还有谁能把咒灵拧成一股绳？\n\n{{user}}靠在医务室门口的墙上，胳膊缠着绷带，腿还在微微发颤。{{他她}}是{{身份}}，掌握着{{术式}}。刚才他仗着速度快想去支援，刚靠近战场就被漏瑚的火焰余波掀飞，连对方的脸都没看清。如果不是五条老师随手挡了一下飞溅的碎石，他恐怕就不是擦破点皮这么简单了。\n特级咒灵的压迫感，光是站在远处都让人喘不过气。高专的结界在他们面前像纸糊的一样，想来就来，想走就走。\n“你没事吧？”\n虎杖悠仁走了过来，身上的伤比他重得多，脸颊还有擦伤，却笑得一脸灿烂。\n“我没事……你伤得更重吧？”{{user}}忍不住问。\n“这点小伤，很快就好啦。”虎杖挠了挠头，语气轻松，“害怕是有点害怕，但总不能让普通人遭殃对吧。我们不站出来，谁站出来啊。”\n{{user}}看着他眼里的光，心里的颤意慢慢定了下来。\n是啊，怕没用。只有变强，才能站得住，才能护住身边的人。\n风卷着焦糊味掠过校园，远处的树影在月光下摇晃。\n这只是暴风雨的前奏。更凶的浪，还在后面。\n</opening>`,\n  "T37": `<opening>\n{{时代}}，{{地区}}，夜色把河面浸成墨色，风卷着腥臭味从桥下扑上来，路灯的光昏黄摇曳，照得水面泛着诡异的光。\n八十八桥是东京出了名的灵异地，自杀者的怨念积年累月，养出了一窝咒灵。近期接连有人失踪，高专接到委托，派了一年级三人组过来，{{user}}也跟着随行历练。\n四个人站在桥边往下望，黑沉沉的河水里像藏着什么东西，咒力浓稠得化不开。钉崎皱着鼻子嫌味儿冲，虎杖摩拳擦掌想快点解决回去吃晚饭，伏黑惠脸色凝重，召唤出玉犬在前头探路。\n顺着石阶下到桥底，潮湿气裹着咒力压得人胸口发闷。没走几步，水面突然炸开，一只巨型青蛙咒灵从水里窜出来，青绿色的皮肤淌着黏液，准一级的咒力扑面而来。\n战斗瞬间打响。虎杖冲在最前面，拳头砸得咒灵嗷嗷直叫；钉崎甩出稻草人，锤子一敲就是一个血洞；伏黑的式神轮番上阵，牵制住咒灵的动作。可这只咒灵的毒液太棘手，落在地上滋滋冒白烟，几人一时竟被拖住了。\n{{user}}跟在队伍最后，手心全是汗。{{他她}}是{{身份}}，掌握着{{术式}}。他的术式只适合侦查和跑路，正面战斗根本插不上手，只能绷紧神经留意四周，尽量不拖后腿。\n可危险还是找上了他。一只小型咒灵从影子里钻出来，张着嘴就朝他后颈咬过来。\n“小心！”虎杖的喊声刚到，咒灵的尖牙已经近在眼前。\n{{user}}下意识发动术式，整个人融进影子里，瞬移出几米远。咒灵咬了个空，砸在地上发出闷响。\n他后背全是冷汗，刚松口气，就听见伏黑大喊“悠仁当心”。那只巨型青蛙咒灵不知何时绕到了虎杖身后，长舌像鞭子似的抽过来。\n下一秒，虎杖身上的气息变了。\n淡红色的纹路爬上脸颊，瞳孔泛起猩红。他抬手攥住抽来的舌头，稍一用力，整条舌头竟被生生扯断。绿色的血溅了一地，咒灵发出凄厉的惨叫。虎杖没给它喘息的机会，纵身跃起，一拳砸在它头顶。\n“砰”的一声闷响，咒灵的脑袋像烂西瓜似的炸开，躯体化作黑水融进了河里。\n纹路缓缓褪去，虎杖晃了晃，差点栽倒。伏黑快步上前扶住他，钉崎也凑过来，嘴上吐槽“每次都搞这么夸张”，手却稳稳扶住了他的胳膊。\n{{user}}站在一旁，心里五味杂陈。每次遇到绝境，虎杖都要冒着被夺舍的风险借用宿傩的力量。这份强大的背后，是他一个人扛着的风险。\n“不对。”伏黑忽然皱起眉，低头看向脚下，“下面还有东西。”\n他蹲下身，指尖抚过地面的裂缝，咒力缓缓渗入。\n“特级咒胎九相图……就在这下面。”\n风从河道吹过来，带着河水的腥气，也带着更深的寒意。\n真正的麻烦，才刚刚露出头。\n</opening>`,\n  "T38": `<opening>\n{{时代}}，{{地区}}，地下通道里伸手不见五指，潮湿的石壁上滴着水，咒力浓稠得像沥青，每一口呼吸都带着铁锈味。\n顺着八十八桥底的裂缝往下，是一片被遗忘的地下空间。九相图的气息就藏在最深处，可通道里岔路纵横，咒灵藏在暗处伺机而动。没走多久，三只一级咒灵从两侧包抄过来，硬生生把队伍截成两段。\n“你们三个拖住它们，我去里面找咒胎。”\n伏黑惠只丢下一句话，就转身钻进了深处的通道。他知道虎杖和钉崎能应付，也知道越往里面越危险，不能让他们跟着涉险。\n可他没料到，最深处等着他的是领域型咒灵。\n“嵌合暗翳庭”展开的瞬间，无数密密麻麻的眼睛贴满了墙壁与天花板，冰冷地注视着闯入者。领域之内，攻击必中，伏黑召唤出的式神一只接一只被撕碎——玉犬被贯穿，大蛇被碾碎，满象、不知井底接连溃散，连脱兔都没能撑过几秒。\n伤口在身上不断叠加，鲜血浸透了制服。他靠在墙壁上喘息，视线已经开始模糊。领域的必中攻击躲不开，再耗下去，只会被活活耗死。\n怎么办？\n他咬着牙，脑子里飞速闪过所有式神。常规手段破不了领域，那就只剩一个选择——十种影法术里的禁忌，魔虚罗。\n禅院家的典籍里写得清楚，此式神失控无差别攻击，召唤者九死一生。\n可现在，没有别的路了。\n“十种影法术……魔虚罗。”\n影子里钻出畸形的巨影，无数手臂与面孔扭曲在一起，咒力狂暴得像风暴。它刚出现就开始无差别肆虐，一拳砸在领域的壁垒上，整个空间都在震颤。伏黑被余波掀飞，狠狠撞在石壁上，吐出一口鲜血。\n意识在一点点模糊。他想起了姐姐，想起了五条老师，想起了悠仁和野蔷薇。\n不能死在这里。\n他撑着地面想站起来，腿却不听使唤。魔虚罗与领域咒灵的战斗越来越烈，石壁不断有碎石砸落。就在领域碎裂、咒灵被撕碎的瞬间，失控的魔虚罗转过身子，朝他扑了过来。\n伏黑闭上了眼。\n“伏黑！”\n熟悉的声音炸响在耳边。虎杖悠仁从通道口冲进来，一拳砸在魔虚罗的侧脸上，硬生生把巨影打退了几步。钉崎紧随其后，手里攥着钉子，眼神紧绷。\n“谁让你一个人逞能的。”钉崎喘着气，嘴上没好气，却站到了他身边。\n虎杖咧嘴一笑：“我们可是伙伴啊，哪能让你一个人出风头。”\n伏黑看着他们两个，愣了愣，随即嘴角勾起一抹极淡的笑。\n笨蛋们。\n\n{{user}}跟在后面跑进来，看着三人背靠背站在一起的样子，鼻子有点发酸。{{他她}}是{{身份}}，掌握着{{术式}}。他一路上都在给大家处理小伤口，可到了这里，连上前的资格都没有。他的治疗术在这种级别的战斗里，连杯水车薪都算不上。\n就在魔虚罗再次冲过来的时候，一道身影凭空出现在场中央。\n“哎呀哎呀，你们也太乱来了。”\n五条悟打着响指，漫不经心的样子。话音刚落，狂暴的魔虚罗就像尘埃似的散了，连一点痕迹都没留下。\n“好了，没事了。”他转过身，笑着冲几人招手，“硝子已经在外面等着了，回去疗伤。”\n伏黑望着五条悟的背影，眼神复杂。\n他和“最强”之间，还隔着遥不可及的距离。\n风从通道口吹进来，带着外面的新鲜空气。\n战斗结束了，可他知道，自己要走的路还很长很长。\n</opening>`,\n  "T39": `<opening>\n{{时代}}，{{地区}}，校长室的门紧闭着，烟味混着纸张的油墨味飘在空气里，气压沉得像灌了铅。\n八十八桥任务回收了胀相、坏相、血涂三卷咒胎，可没人笑得出来。九相图一共九卷，剩下六卷下落不明，更要命的是——情报泄露了。\n诅咒师圈子、咒灵势力，几乎一夜之间都知道了特级咒胎的存在。所有人都在找，都想把这股力量攥在自己手里。九相图同源而生，一旦九卷齐聚，会爆发出怎样的力量，没人能预料。\n夜蛾正道坐在办公桌后，脸色凝重。七海建人推了推眼镜，汇报着调查进度：“泄露源头大概率在内部，目前还在排查。”\n“内部？”在座的总监部高层立刻变了脸，“不可能！我们的人怎么会……”\n“万事皆有可能。”五条悟靠在窗边，语气懒洋洋的，却带着刺，“毕竟总监部里，什么人没有啊。”\n高层气得拍桌子，夜蛾连忙打圆场。现在不是追责的时候，当务之急是抢在诅咒师之前，把剩下六卷九相图找回来。\n“让学生分组去找。”五条悟直起身，给出了答案。\n“胡闹！”高层立刻反对，“那可是特级咒物，让学生去太危险了！”\n“不危险怎么成长？”五条悟挑了挑眉，“总把他们护在温室里，等真的打起来，难道靠你们这群坐在办公室里的老家伙上？”\n“你……”\n夜蛾叹了口气，最终拍了板：学生分组执行回收任务，教师暗中兜底。\n会议散后，五条悟没立刻走。他靠在走廊的墙上，指尖轻轻敲着胳膊。\n九相图、情报泄露、咒灵联手入侵高专……这些事串在一起，背后总有股熟悉的操盘感。\n羂索。他在心里念出这个名字。\n除了那个活了千年的怪物，没人能布这么大的局。\n他握紧了拳。不管对方想做什么，他都不会让其得逞。\n\n{{user}}站在走廊拐角，把里面的对话听了大半。{{他她}}是{{身份}}，掌握着{{术式}}。他手里还攥着刚整理好的任务档案，指尖有点发凉。\n特级咒物流散在外，还要让学生们去抢。那些孩子才十几岁，就要一头扎进这么危险的漩涡里。可他也知道，五条老师说得对——咒术师的世界里，从来没有温室。\n“站这儿偷听呢？”\n五条悟不知什么时候走了出来，笑着拍了拍他的肩。{{user}}吓了一跳，连忙摇头：“我、我刚送文件过来……”\n“正好。”五条悟把一叠资料递给他，“你帮我把九相图的情报整理出来，按区域分好，发给各个行动小组。你的情报分析术最适合干这个。”\n{{user}}愣住了。他没想到五条老师知道他的术式，更没想到会把这么重要的事交给他。\n“我、我能行吗？”他有点没底气。\n“当然可以。”五条悟的语气很认真，“我相信你。”\n四个字像暖流涌进心里。{{user}}用力点头，把资料紧紧抱在怀里：“是！我一定完成任务！”\n五条悟笑了笑，转身往楼梯口走。\n{{user}}站在原地，看着他的背影，心里沉甸甸的。他能做的不多，但至少可以把情报做准一点、做细一点，让那些学生少走点弯路，少遇点危险。\n风从走廊窗户吹进来，掀动了手里的纸页。\n一场围绕九相图的追逐战，就此拉开序幕。\n</opening>`,\n  "T40": `<opening>\n{{时代}}，{{地区}}，万圣节的霓虹把街道染得五彩斑斓，奇装异服的人群挤在十字路口说笑，南瓜灯、鬼怪面具连成一片，热闹得像永不落幕的狂欢。\n没人知道，这场狂欢下藏着怎样的杀机。\n羂索筹谋多年的涩谷事变，选在了今夜动手。封印五条悟，夺取两面宿傩，启动死灭回游……所有的棋子都已落位，只等帷幕拉开。\n{{user}}站在过街天桥上，望着底下熙熙攘攘的人群，心里像压了块大石头。{{他她}}是{{身份}}，掌握着{{术式}}。作为穿越者，他太清楚接下来会发生什么了——巨大的帐会落下，无数咒灵会涌出来，街道会变成人间地狱，五条悟会被封印，无数咒术师和普通人会死在这里。\n他知道结局，却无力改变。\n他的术式只是短距离瞬移，别说对抗羂索，连一只特级咒灵都打不过。冲上去和送死没区别。\n找个地方躲起来，等事件结束再出来，明哲保身，这才是最理智的选择。历史本来就是这样走的，他一个小人物改变不了什么。\n可看着底下那些笑着拍照的年轻人、牵着父母手的小孩、举着南瓜灯的情侣……他又挪不动脚步。\n他们什么都不知道。他们只是想好好过个节。\n难道就眼睁睁看着他们死？\n{{user}}攥紧了拳，指甲嵌进掌心。\n就在这时，天空骤然暗了下来。\n不是天黑，是一张巨大的帐，从四面八方缓缓合拢，把整个涩谷都罩在了里面。霓虹的光被隔在帐外，街道瞬间陷入昏暗。\n人群愣了几秒，有人笑着喊“万圣节特效吗”，有人拿出手机拍照。\n可很快，他们就笑不出来了。\n嘶吼声从各个角落响起，形态扭曲的咒灵从下水道、从建筑缝隙、从阴影里钻出来，张着血盆大口扑向人群。\n尖叫声瞬间撕碎了节日的氛围。人们四散奔逃，礼物、手机、面具掉了一地，鲜血很快染红了柏油路。\n人间地狱，不过如此。\n咒术师们陆续赶来了。七海建人提着刀冲进咒灵群，伊地知在后方调度，一个个熟悉的身影出现在街道上，拼尽全力挡在普通人前面。可咒灵太多了，源源不断，像潮水似的涌过来。\n而五条悟，正在往这边赶。\n他明知道是陷阱，也必须跳进来。因为帐里有几千个普通人，在等他救。\n\n{{user}}站在天桥上，看着底下的惨剧，心脏砰砰直跳。\n和记忆里的画面一模一样。\n躲吗？现在找个隐蔽的地方藏起来，凭他的空间移动，大概率能活到事件结束。\n可他闭上眼，全是刚才那些人的笑脸。\n去他妈的明哲保身。\n他猛地睁开眼，咒力在体内运转起来。\n就算救不了所有人，能救一个是一个。\n空间发动，他瞬间出现在街道上。一只咒灵正扑向一个摔倒的小女孩，{{user}}冲过去一把推开她，大喊“快跑”。\n小女孩哭着爬起来跑远了。咒灵愤怒地朝他扑来，他再次瞬移躲开，后背惊出一身冷汗。\n好险。\n可他没有退。\n他抹了把脸，转身又朝着下一个呼救声跑去。\n风卷着血腥味掠过街道，惨叫声还在继续。\n也许历史的大方向不会变，但至少，他可以让多一个人活下来。\n命运的轨迹，从他迈出这一步开始，悄悄偏了分毫。\n</opening>`,\n  "T41": `<opening>\n{{时代}}，{{地区}}，巨大的帐像倒扣的黑碗压在街区上空，霓虹被隔绝在外，只剩火光舔舐着建筑轮廓，惨叫声顺着风卷过街道。\n普通人像被猎捕的兽，四散奔逃。没人知道那些看不见的怪物从何而来，只知道被追上就是死——前一秒还在说笑的同伴，下一秒就悄无声息地倒在地上，身体扭曲成诡异的形状。恐惧像瘟疫似的蔓延，哭喊声、脚步声、玻璃碎裂声搅在一起，人间地狱不过如此。\n{{user}}靠在倒塌的货架后，喉咙发紧，浑身都在抖。{{他她}}是{{身份}}，掌握着{{术式}}。几分钟前，他还和朋友举着南瓜灯拍照，现在却只能缩在这里，听着外面的惨叫声越来越近。\n他以为自己今天死定了。\n就在这时，一道漫不经心的声音穿透了嘈杂。\n“哟，大家好啊。”\n很轻，却奇异地压过了所有哭喊。\n所有人都愣住了。循声望去，街道中央站着个白发男人，黑制服，戴着眼罩，双手插兜，像在自家后院散步似的，慢悠悠往前走。那些追着人撕咬的“怪物”，在他身前像撞上了无形的墙，无论怎么嘶吼都近不了身。\n是……来救他们的吗？\n咒灵们显然认出了他，刚才还凶神恶煞，此刻竟像见到天敌似的，浑身战栗着往后退。不知是谁先崩了弦，所有咒灵转身就跑，像潮水似的往巷子里涌。\n“想跑？晚了哦。”\n男人笑了笑，抬手打了个响指。\n“啪”的一声轻响。\n奔逃的咒灵像被戳破的气球，接连炸开，化作黑水流淌在地。连惨叫都没来得及发出，整条街的威胁就消失得干干净净。\n死一般的寂静。\n没人敢说话，甚至不敢大口喘气。所有人都看着那个站在血污里的白发男人，像在看一尊从天而降的神。\n五条悟没在意周围的目光。他抬眼望向涩谷站的方向，眼罩下的眼神沉了下来。\n羂索，漏瑚，花御，真人……布这么大的局，不就是等他进来吗。\n好啊。他来了。\n他迈开步子，朝着黑暗更深处走去。背影被火光拉得很长，挺拔，却又说不出的孤独。\n{{user}}望着他的背影，心里五味杂陈。他不知道这个男人是谁，不知道他要去哪里，只知道对方救了自己。可那片黑暗里，明显还有更可怕的东西在等着他。\n他一个人去，真的没问题吗？\n可自己只是个普通人，什么忙都帮不上，连对方在对抗什么都不知道。\n风卷着焦糊味掠过街道，远处依旧有零星的惨叫传来。\n普通人活在阳光下，从不知道阴影里有多少人在以命相搏。\n而真正的战斗，才刚刚开始。\n</opening>`,\n  "T42": `<opening>\n{{时代}}，{{地区}}，地下空间的空气几乎凝固，咒力浓稠得像实质，压得人耳膜发疼。\n{{user}}躲在承重柱后，屏住呼吸，指尖都在发麻。{{他她}}是{{身份}}，掌握着{{术式}}。他奉命赶来支援，却撞上了这场特级之间的对决——漏瑚、花御、胀相，三个赫赫有名的特级存在，竟同时站在了五条悟的对面。\n三个打一个，说出去都丢人。可在场没人觉得可笑，因为对面站的是五条悟。\n“三个打一个，这么给我面子？”五条悟站在场地中央，白发沾了点灰尘，语气依旧吊儿郎当，“那就让我看看，你们长进了多少。”\n漏瑚率先发难。头顶火山口似的纹路亮起，一颗灼热的陨星呼啸着砸落，空气都被烧得扭曲。这一击足以夷平整条街，可五条悟只抬了抬手。\n“太慢了。”\n轰向他的火球像撞上了无形的壁垒，瞬间溃散，连火星都没溅到他身上。无下限咒术展开，所有攻击在他面前都会无限趋近于零——这是刻在五条家血脉里的绝对防御。\n“花岚！”“赤鳞跃动！”\n花御的藤蔓与胀相的血刃同时袭来，铺天盖地，封死了所有退路。可它们同样停在了半空中，像被按下了暂停键，再也前进不了半分。\n柱后的{{user}}心脏狂跳。这就是“现代最强”吗？三个特级联手，竟连他的衣角都碰不到。\n“就这点本事？”五条悟摇了摇头，语气里带着点失望，“轮到我了。”\n指尖亮起刺目的红光。\n“术式反转·赫。”\n光束瞬间洞穿了空间。漏瑚甚至来不及反应，半个身体就被轰碎，狠狠撞在岩壁上，黑血淌了一地。\n一击，就让特级咒灵失去了大半战力。\n“漏瑚！”花御失声喊了出来。\n“走……你们快走……”漏瑚撑着残破的身体站起来，声音断断续续，“去帮真人……这里我拖住……”\n“不行！要走一起走！”\n“别废话！”漏瑚吼了一声，摇摇晃晃地挡在前面，“计划最重要……”\n他明知是死，也要用命给同伴争取时间。\n五条悟皱了皱眉，没立刻动手。他看着这个拼尽最后一口气的咒灵，眼神里难得多了几分复杂。\n{{user}}攥紧了拳，心里却越来越不安。\n不对。太不对了。\n这些咒灵明明知道不是对手，为什么还要主动送上门？他们的目的从来都不是打赢五条悟……\n就在这时，通道深处传来了杂乱的脚步声。很多人，有男有女，有老有少——是普通人。\n他们为什么会出现在这里？\n一个可怕的念头在{{user}}脑子里炸开。\n他们不是来战斗的。他们是来牵制五条悟的。\n风从通道口灌进来，带着血腥味和普通人的哭腔。\n战斗还在继续，可真正的陷阱，才刚刚收起网口。\n</opening>`,\n  "T43": `<opening>\n{{时代}}，{{地区}}，地下空间的空气仿佛冻住了，连呼吸都带着滞涩感。\n{{user}}贴在柱子后面，浑身冰冷，指尖控制不住地发抖。{{他她}}是{{身份}}，掌握着{{术式}}。作为穿越者，他早就知道这一天会来，知道五条悟会在这里被封印，知道这是整个故事最黑暗的转折点。\n可亲眼看见狱门疆悬浮在空中、缓缓合拢的瞬间，他还是觉得浑身血液都凉了。\n怎么会……怎么会真的成功了？\n羂索算得太准了。他算准五条悟不会对普通人见死不救，算准无下限会在保护民众时分散精力，也算准了——夏油杰的声音，能让“最强”出现一瞬间的失神。\n只是一秒钟的动摇。\n只是听见那句熟悉的“悟”，五条悟顿了半拍。\n狱门疆就抓住了这万分之一的机会。\n立方体状的封印咒具悬在半空，表面爬满诡异的纹路，不祥的咒力一圈圈荡开。那个站在云端、从未败过的男人，那个所有咒术师的精神支柱，被关在了里面。\n“成功了……我们成功了！”真人笑得癫狂，声音都在抖，“五条悟被封印了！”\n花御站在一旁，脸上却没什么笑意。漏瑚死了，换来了一场暂时的胜利。可他们都清楚，这封印困不住五条悟一辈子。等他出来的那天，就是所有人的死期。\n真人没管那么多，转头看向身后瑟瑟发抖的普通人，眼里闪着残忍的光：“多亏了各位帮忙……作为奖励，就当咒灵的养料吧。”\n“住手。”\n胀相上前一步，挡在了普通人前面。\n“胀相？你疯了？”真人皱起眉。\n“他们不能杀。”胀相语气很沉，没有半分退让。他身上流着人类的血，做不到眼睁睁看着无辜者被屠戮。\n两人剑拔弩张，空气再次紧绷起来。花御叹了口气从中调停：“先撤，咒术师很快就会反扑。这些人……随他们去吧。”\n真人不甘心地啐了一声，最终还是转身离开了。\n地下空间终于安静下来。只剩瘫软在地的普通人，和静静悬浮的狱门疆。\n{{user}}腿一软，差点坐倒在地。\n真的封印了。\n没有五条悟的咒术界，会变成什么样？七海学长、钉崎同学……还有很多人，都会死在这场事变里。\n就在这时，时间感知术突然刺痛了一下。\n碎片化的画面涌入脑海——残破的街道，真人的笑声，七海建人倒下去的身影，还有那句微弱的“接下来就交给你了”。\n是未来。是即将发生的未来。\n“不……”{{user}}嘴唇发颤。\n他知道历史的走向，知道哪些人会离开。可真的眼睁睁看着悲剧走向自己，他做不到无动于衷。\n冲出去吗？他这点实力，在真人面前和蝼蚁没区别。\n可什么都不做吗？看着七海学长走向死亡，看着更多人牺牲？\n他攥紧了拳，指甲嵌进掌心，刺痛让他清醒过来。\n至少……至少要去提醒一声。\n他深吸一口气，从柱子后走了出来，朝着七海建人所在的方向跑去。\n五条老师被封印了。\n但战斗，还没结束。\n</opening>`,\n  "T44": `<opening>\n{{时代}}，{{地区}}，街道上弥漫着浓重的血腥味，风卷着碎纸掠过尸骸，远处的咒灵嘶吼声此起彼伏。\n五条悟被封印的消息像野火一样蔓延，咒术师阵营瞬间乱了阵脚。失去了最强的支柱，士气跌到了谷底，咒灵则趁机反扑，战线一退再退。\n七海建人就是在这时倒下的。\n{{user}}在大楼的断墙后看着下方，眼泪模糊了视线。{{他她}}是{{身份}}，掌握着{{术式}}。他怎么也不敢相信，那个永远沉稳可靠、只要站在那里就让人安心的七海前辈，会倒在这里。\n真人的无为转变太残忍了。被触碰的身体会不受控制地扭曲变形，连灵魂都能随意篡改。七海半边身体都已经异变，可他直到最后，都死死护着身后的虎杖悠仁。\n“接下来……就交给你了。”\n他留下这句话，便再也没了声息。\n虎杖悠仁跪在地上，脊背绷得很紧，浑身都在抖。他低着头，看不清表情，只有鲜血顺着攥紧的指缝滴下来，在地上晕开小小的血花。\n“悠仁……”钉崎野蔷薇站在一旁，声音沙哑，眼眶通红。她想说点什么，却又不知道该怎么开口。任何安慰在死亡面前，都显得太苍白。\n伏黑惠咬着牙，下颌线绷成一条直线。他看着七海前辈的遗体，拳头攥得指节发白。\n“小鬼，把身体给我。”宿傩的声音在虎杖脑海里响起来，带着戏谑的笑，“我帮你把它们全杀了，给你的前辈报仇。”\n虎杖没说话。\n他只是慢慢站了起来。\n眼睛很红，布满血丝，可眼神异常清醒。\n“不用。”他轻声说，声音哑得厉害，却异常坚定，“我自己来。”\n这是他的战斗。是他要扛的责任。\n他抬眼看向围过来的咒灵，眼底是翻涌的怒意，却没有失控。下一秒，他像一头蓄势已久的豹，猛地冲了出去。\n拳头砸在咒灵身上的闷响接连响起，黑血溅了他一脸。他打得很凶，却没有乱了章法，每一拳都带着豁出去的狠劲。\n钉崎和伏黑对视一眼，也立刻冲了上去。三个人背靠背站着，在咒灵潮里死死撑住了阵线。\n他们身后，是七海先生的遗体。\n他们不能退。\n{{user}}抹了把脸，把眼泪擦掉。他不能再站在这里哭了。\n他的治愈术很弱，连反转术式的皮毛都比不上。可哪怕只能处理一点外伤，哪怕只能递一瓶药剂，也比眼睁睁看着强。\n他深吸一口气，转身朝着楼下跑去。\n风从破碎的窗户灌进来，带着血腥味。\n七海先生走了。\n可还有人在战斗。还有人在拼命撑着这片天。\n只要还能站着，就不能认输。\n</opening>`,\n  "T45": `<opening>\n{{时代}}，{{地区}}，帐外的月光透不进来，只剩火光映着残垣断壁，空气里全是焦糊与血腥混合的味道。\n{{user}}蜷缩在倒塌的大楼缝隙里，捂着嘴，连呼吸都不敢大声。{{他她}}是{{身份}}，掌握着{{术式}}。几个小时前，他还在和朋友庆祝万圣节，现在却像只老鼠似的躲在废墟里，听着外面此起彼伏的惨叫。\n那些看不见的怪物已经够可怕了，可刚才出现的那个男人，才是真正的噩梦。\n他是顺着爆炸声看过去的。\n街道尽头的废墟上，站着个粉发少年。明明是年轻的面孔，脸上却爬着四道诡异的黑色纹路，眼睛是血一样的红。他只是随意地站在那里，就散发出一种让人灵魂发颤的压迫感——像天敌，像高高在上的审判者，随便扫一眼都能让人浑身发冷。\n那不是人类该有的气息。\n下一秒，少年抬手挥了一下。\n没有火光，没有巨响。可整条街的建筑，连同里面躲藏的人和怪物，都像被无形的巨力碾过，轰然坍塌。\n惨叫声戛然而止。\n{{user}}吓得死死咬住嘴唇，才没叫出声来。\n那是什么？恶魔吗？\n废墟之上，宿傩插着兜，居高临下地看着脚下的狼藉，嘴角勾起一抹残忍的笑。\n“千年了，还是这么无聊。”\n他的声音很轻，却顺着风飘得很远。咒术师不堪一击，咒灵丑陋又弱小，人类脆弱得像纸片——这个世界，和千年前一样无趣。\n“五条悟被封印了啊。”他嗤笑一声，语气里带着点不屑，“真是没用。本大爷还指望能打一场像样的架呢。”\n他低头看了看自己的手，活动了一下手指。\n“虎杖悠仁……是吧？”他低声笑了笑，“能压制住我，有点意思。”\n“不过现在，身体是我的了。”\n“好好看着，看本大爷怎么把这世界搅个天翻地覆。”\n他迈开步子，慢悠悠地往前走。所过之处，地面无声地开裂，建筑无声地崩塌，像在为王者开道。\n{{user}}缩在缝隙里，连气都不敢喘。他能听见脚步声越来越近，心脏狂跳得像要撞碎肋骨。\n会被发现吗？会像那些人一样，莫名其妙就死掉吗？\n他不想死。他还不想死。\n可除了躲着，他什么都做不了。\n脚步声慢慢远了。\n{{user}}紧绷的身体终于垮下来，瘫坐在地上，后背全是冷汗。\n风从废墟的缝隙里钻进来，带着血腥味。远处偶尔传来几声零星的惨叫，很快又归于寂静。\n地狱就在人间。\n而那个从地狱里爬出来的诅咒之王，才刚刚开始他的游戏。\n</opening>`,\n  "T46": `<opening>\n{{时代}}，{{地区}}，铅灰色的云压得很低，风卷着涩谷事变未散的血腥味掠过城市，空气里弥漫着山雨欲来的压抑。\n五条悟被封印的余波还没平息，羂索的第二阶段计划就已经落下。死灭回游，这场以全日本为棋盘的大逃杀，在无人预料的时刻骤然启动。\n遍布各地的结界同时亮起，像凭空长出的囚笼，将所有具备咒力的人强行拖拽其中——咒术师、诅咒师、甚至只是稍有咒力天赋的普通人，来不及反应就被卷入厮杀。规则简单而残酷：击杀他人获取分数，分数可追加规则，拒绝参与则会被术式抹杀。\n没有道理可讲，没有退路可选。\n结界里瞬间乱成一团。有人崩溃哭喊，有人为了活下去率先挥刀，有人结成团伙猎杀落单者，也有人拼尽全力护住身边的陌生人。人性在生死边缘被撕得淋漓尽致，善良与恶都赤裸得刺眼。\n羂索站在棋局之外，冷漠地看着这一切。他要的从来不是一场单纯的屠杀，而是通过死斗筛选、进化咒力，最终推动全人类与天元的强制同化。所有人都是他的棋子，包括那些特级咒灵。\n\n{{user}}站在东京结界的边缘，指尖泛着凉。{{他她}}是{{身份}}，掌握着{{术式}}。作为穿越者，他比谁都清楚这场游戏的规则、走向与结局，知道哪些人会陨落，知道羂索的阴谋有多疯狂。\n可他太弱了。弱到连被强行拉进结界的“资格”都没有——咒力微薄到羂索的筛选机制都懒得理会。\n讽刺吗？好像有点。\n躲起来吧。找个偏僻的地方熬到事件结束，明哲保身，反正历史本来就是这样走的，他一个小人物改变不了什么。这个念头一遍遍在脑子里转。\n可闭上眼睛，就是结界里普通人的哭喊声，是那些熟悉的角色一步步走向悲剧的样子。\n明明知道一切，却什么都不做吗？\n他攥了攥手，规则解析的咒力在指尖微微流转。就算战斗力为零，至少他懂规则，至少他能帮一些人避开陷阱，至少……他试过。\n深吸一口气，他迈步朝着结界光膜走了过去。\n风卷着秋意掠过原野，结界里的惨叫声隐约传出来。\n死灭回游已经开始，而他选择踏进这场棋局。\n</opening>`,\n  "T47": `<opening>\n{{时代}}，{{地区}}，正午的阳光落在结界光膜上，折射出冰冷的光泽。入口处站着一行人，每个人脸上都没什么笑意，空气里沉甸甸的。\n涩谷事变过去十几天，整个咒术界天翻地覆。五条老师被封，七海先生牺牲，钉崎重伤昏迷至今未醒……曾经热热闹闹的一年级，如今只剩两个人站在这里。\n虎杖悠仁站在最前面，身形依旧挺拔，眼底却多了层化不开的沉郁。他不再是那个总挂着笑的少年了，涩谷的血与死亡逼着他一夜长大，连脊背都绷出了几分孤绝的味道。\n伏黑惠站在他身侧，脸色比往常更冷。姐姐津美纪被卷入死灭回游，是他必须踏进去的理由。哪怕里面刀山火海，他也得把人救出来。\n禅院真希、熊猫、狗卷棘都来了，还有{{user}}。\n“我也去。”出发前他是这么说的。他知道自己术式偏辅助，战斗力不强，进去说不定还会拖后腿。可伙伴都在往前冲，他没有缩在后面的道理。\n“都准备好了？”虎杖开口，声音比以前哑了些。\n没人说话，只是点头。\n虎杖深吸一口气，率先迈步走向结界。其他人紧随其后，身影依次没入光膜之中。\n结界内是另一个世界。天空是浑浊的暗红色，风里裹着化不开的血腥味，远处偶尔传来爆炸声与惨叫，像一头蛰伏的巨兽，等着猎物自投罗网。\n“先找落脚点，摸清附近的参与者分布。”伏黑低声吩咐，召唤出玉犬在前探路。\n可他们没走出多远，就被拦住了。\n几个满脸凶相的参与者从巷口转出来，盯着他们像盯着肥羊。“哟，新人啊？看着细皮嫩肉的，正好送上门刷分。”\n为首的男人舔了舔嘴唇，眼里全是贪婪。死灭回游里没有规矩，新人就是最好的猎物。\n虎杖皱起眉，周身的气息沉了下来：“你们杀过多少人？”\n“谁记得，几十个总有吧。”男人嗤笑，“怎么，你想替天行道？”\n话音落下，他一挥手，几人同时扑了上来。\n\n{{user}}立刻后退半步，咒力在掌心铺开。{{他她}}是{{身份}}，掌握着{{术式}}。这是他第一次真正直面死灭回游的厮杀，手心冒汗，却没慌。\n“辅助强化·速度增幅！”\n两道柔光落在虎杖和伏黑身上。\n“谢了！”虎杖回头喊了一声，脚下一蹬，迎着人群冲了上去。伏黑同时召唤出大蛇，藤蔓似的影子瞬间缠上冲在最前的人。\n战斗瞬间打响。\n风卷着血腥味掠过街道，远处的惨叫还在继续。\n死灭回游的第一战，就此拉开序幕。\n</opening>`,\n  "T48": `<opening>\n{{时代}}，{{地区}}，暗红色的天空压在头顶，街道两旁的建筑残破不堪，风卷着沙尘吹过，空荡得让人发慌。\n变故发生得毫无征兆。\n前一秒还在并肩作战的伏黑惠，下一秒身体骤然僵住，黑色的纹路以肉眼可见的速度爬上脸颊，瞳孔瞬间染成猩红。\n宿傩强行转移了受肉对象。\n他觊觎十种影法术太久了。虎杖的身体再好用，也没有他想要的术式。从一开始，伏黑惠就是他选中的第二容器，死灭回游的混乱，正好给了他可乘之机。\n压制住少年的意识，接管这具身体，宿傩活动了一下脖颈，骨骼发出清脆的响声。\n“呵……十种影法术，果然名不虚传。”\n他低头看着自己的手——不，是伏黑惠的手，嘴角勾起残忍又愉悦的笑。比虎杖那具身体顺手多了，尤其是藏在术式深处的魔虚罗，简直是意外之喜。\n“伏黑惠，你的术式，你的身体，我都收下了。”他低声笑着，声音是少年的音色，却透着千年的邪性，“好好看着，看本大爷用你的身体，把这世界搅个天翻地覆。”\n他抬眼望向远处，像是能穿透墙壁看到虎杖悠仁的位置。\n“虎杖悠仁，你现在一定很生气吧？”他嗤笑一声，语气里全是挑衅，“想报仇？那就来追我啊。”\n话音落下，他脚下影子微动，借玉犬的速度闪身消失在街道尽头，只留下满街狼藉。\n\n不远处的高楼上，虎杖悠仁扶着墙，浑身都在抖。\n他亲眼看着宿傩从自己身体里剥离，看着对方钻进伏黑的身体，看着最好的朋友闭上眼睛，再睁开时已经换了个灵魂。\n“伏黑……”他喉咙发紧，声音哑得几乎听不清。\n自责像潮水似的淹上来。是他没防备，是他太弱，是他没护住同伴。如果他能再强一点，是不是就不会变成这样？\n禅院真希攥着刀，指节发白。她看着伏黑被占据的身影消失的方向，眼底全是冷意。那是她从小看到大的弟弟，哪怕两人关系不算亲近，也绝不能容忍被诅咒之王当成容器。\n熊猫和狗卷棘站在一旁，脸色都很难看。谁也没料到宿傩会来这一手，有了十种影法术的诅咒之王，只会比以前更恐怖。\n\n{{user}}站在后面，心里也堵得慌。{{他她}}是{{身份}}，掌握着{{术式}}。他是被小队救下的参与者，相处时间不长，却也知道伏黑惠是外冷内热的人。那样温柔的人，被关在自己的身体里，看着别人用他的手作恶，该有多难受。\n“虎杖同学……”他小声开口，想安慰又不知道说什么。\n虎杖没回头。他沉默地站了很久，再开口时，声音很轻，却异常坚定。\n“追。”\n他转过身，眼底是翻涌的怒意，和不肯认输的执念。\n“我一定要把伏黑救回来。无论付出什么代价。”\n禅院真希点头：“我跟你一起。”\n熊猫拍了拍他的肩：“算我 }\n            track.innerHTML = html;\n            const finalY = -(track.children.length - 2) * ITEM_H;\n            track.style.transition = \'transform 1.9s cubic-bezier(.12,.85,.25,1)\';\n            track.style.transform = `translateY(${finalY}px)`;\n            await new Promise(r => setTimeout(r, 2000));\n        }\n    }\n    else {\n        form[slot.valuePath] = chosen;\n    }\n    spinning[slot.id] = false;\n    btn.disabled = false;\n    // Custom art modal flow for multi-select\n    if (slot.id === \'slot-art\' && chosen.type === \'自定义\') {\n        const ok = await editCustomArt();\n        if (!ok) {\n            form.arts = form.arts.filter(a => a.type !== \'自定义\');\n            if (!form.arts.length)\n                form.arts = [ARTS_POOL[0]];\n        }\n    }\n    renderTrack(slot);\n    onFormUpdate();\n    const card = $(`#${slot.id}`);\n    card.style.transform = \'scale(1.015)\';\n    setTimeout(() => card.style.transform = \'scale(1)\', 140);\n}\nfunction toggleLock(slot) {\n    locks[slot.id] = !locks[slot.id];\n    const btn = $(`#lock-${slot.id}`);\n    btn.classList.toggle(\'locked\', locks[slot.id]);\n    $(`#${slot.id}`).classList.toggle(\'locked\', locks[slot.id]);\n    syncSlotLockVisual(slot);\n    const hint = $(`#${slot.id}`)?.querySelector(\'.slot-lock-hint\');\n    if (hint) {\n        hint.textContent = locks[slot.id] ? \'已锁定\' : \'可重抽\';\n        hint.classList.toggle(\'is-locked\', locks[slot.id]);\n        hint.classList.toggle(\'is-unlocked\', !locks[slot.id]);\n    }\n    btn.innerHTML = locks[slot.id]\n        ? `🔒 已锁定`\n        : `🔒 锁定`;\n}\nfunction onFormUpdate() {\n    if (form.timeline) {\n        const locs = getLocationsForTimeline(form.timeline);\n        // Free-input locations are allowed; autoSpinAll will correct to a valid location if needed.\n        if (form.location && !locs.includes(form.location)) {\n            if (!window.__locationFreeWarned) {\n                toast(`地点「${form.location}」为自定义输入，已保留。`,     });\n    $(\'#btn-begin-story\').disabled = !ready;\n}\n/* ================= Custom art modal ================= */\nfunction editCustomArt() {\n    return new Promise(resolve => {\n        const existing = form.arts.find(a => a.custom);\n        const current = existing ? existing : { name: \'\', desc: \'\' };\n        showModal(`\n          <button class="btn-icon modal-close" id="modal-cancel" aria-label="关闭">${makeIcon(\'close\', 14, \'#C4B5FD\')}</button>\n          <h3 class="art-text art-text-stroke">自定义生得术式</h3>\n          <p>为你的角色命名并描述一门独创的生得术式。它将被写入 MVU 并出现在开场白中。</p>\n          <div class="modal-body">\n            <div class="modal-field">\n              <label>术式名称</label>\n              <input type="text" id="custom-art-name" placeholder="例如：镜花水月" value="${escapeHtml(current.name)}" maxlength="30" />\n            </div>\n            <div class="modal-field">\n              <label>术式描述</label>\n              <textarea id="custom-art-desc" placeholder="描述术式的效果、代价与限制" maxlength="120">${escapeHtml(current.desc)}</textarea>\n            </div>\n          </div>\n          <div class="modal-actions">\n            <button class="btn-ghost" id="modal-cancel-2">取消</button>\n            <button class="btn-primary" id="modal-confirm">确认</button>\n          </div>\n        `);\n        const confirm = () => {\n            const name = $(\'#custom-art-name\').value.trim();\n            const desc = $(\'#custom-art-desc\').value.trim();\n            if (!name) {\n                toast(\'请输入术式名称\', \'error\');\n                return;\n            }\n            if (!desc) {\n                toast(\'请输入术式描述\', \'error\');\n                return;\n            }\n            const custom = { name, desc, type: \'自定义生得术式\', custom: true, rarity: \'mythic\' };\n            // Replace any existing custom art, or append if room\n            const others = form.arts.filter(a => !a.custom);\n            if (others.length >= MAX_ARTS) {\n                form.arts = [custom, elected\' : \'\'}>${t.name}（${t.min}–${t.max}）</option>`).join(\'\')}\n            </select>\n          </div>\n          <p id="bp-hint" style="font-size:12px;color:var(--text-dim);line-height:1.6;"></p>\n        </div>\n        <div class="modal-actions">\n          <button class="btn-ghost" id="modal-cancel-2">取消</button>\n          <button class="btn-primary" id="modal-confirm">确认</button>\n        </div>\n      `);\n    const bpInput = $(\'#bp-value\');\n    const lvInput = $(\'#bp-level\');\n    const tierSelect = $(\'#bp-tier\');\n    const hint = $(\'#bp-hint\');\n    function validate() {\n        const bp = parseInt(bpInput.value, 10) || 0;\n        const lv = parseInt(lvInput.value, 10) || 0;\n        const matched = BP_TIERS.find(t => bp >= t.min && bp <= t.max);\n        let msgs = [];\n        if (!matched)\n            msgs.push(\'BP 超出常规层级，请确认是否为论外角色。\');\n        else if (matched.min !== parseInt(tierSelect.value, 10))\n            msgs.push(`BP 值更符合 ${matched.name}，已自动匹配。`);\n        if (lv < 1 || lv > 99)\n            msgs.push(\'等级应在 1–99 之间。\');\n        if (form.identity && lv < form.identity.level)\n            msgs.push(`等级低于身份基准 ${form.identity.level}，已建议修正。`);\n        hint.innerHTML = msgs.length ? msgs.map(m => `• ${m}`).join(\'<br>\') : \'输入符合 MVU 变量规则。\';\n    }\n    bpInput.oninput = validate;\n    lvInput.oninput = validate;\n    tierSelect.onchange = () => {\n        const t = BP_TIERS.find(x => x.min === parseInt(tierSelect.value, 10));\n        if (t) {\n            bpInput.value = Math.floor((t.min + t.max) / 2);\n            validate();\n        }\n    };\n    validate();\n    const confirm = () => {\n        let bp = parseInt(bpInput.value, 10) || 10;\n        let lv = parseInt(lvInput.value, 10) || 1;\n        if (bp < 1)\n            bp = 1;\n        if (bp > 9999)\n            bp = 9999;\n        if (lv < 1)\n            lv = 1;\n        if (lv > 99)\n            lv = 99;\n        if (form.identity && lv < form.identity.level)\n            lv = form.identity.level;\n        form.bp = bp;\n        form.level = lv;\n        hideModal();\n        overlayBackdropHandler = hideModal;\n        onFormUpdate();\n        focusSlot(slots.find(s => s.id === \'slot-bp\'));\n        toast(\'BP / 等级已设定\', \'success\');\n    };\n    const cancel = () => { hideModal(); overlayBackdropHandler = hideModal; };\n    $(\'#modal-confirm\').onclick = confirm;\n    $(\'#modal-cancel\').onclick = cancel;\n    $(\'#modal-cancel-2\').onclick = cancel;\n    overlayBackdropHandler = cancel;\n}\n/* ================= Background modal ================= */\nfunction openBackgroundModal() {\n    let selected = form.background ? BACKGROUNDS.findIndex(b => b.name === form.background.name) : -1;\n    const renderList = () => {\n        $(\'#bg-list\').innerHTML = BACKGROUNDS.map((b, i) => `\n          <div class="tag-art-card rarity-${getRarity(b)}${i === selected ? \' primary\' : \'\'}" data-idx="${i}">\n            <div class="tag-art-header">\n              <div class="tag-radio" role="radio" aria-checked="${i === selected}">${i === selected ? makeIcon(\'check\', 12, \'#fff\') : \'<span class="tag-radio-dot"></span>\'}</div>\n              <div class="tag-art-title">${escapeHtml(b.name)}</div>\n              <span class="rarity-chip rarity-${getRarity(b)}">${rarityName(getRarity(b))}</span>\n            </div>\n            <div class="tag-art-desc">${escapeHtml(b.desc)}</div>\n            <div class="tag-art-tags">\n              <span class="tag-chip">${escapeHtml(b.special)}</span>\n              <span class="tag-chip">家境 ${b.attrs.家境}</span>\n              <span class="tag-chip">天赋 ${b.attrs.天赋}</span>\n              <span class="tag-chip">家庭 ${b.attrs.家庭环境}</span>\n            </div>\n          </div>\n        `).join(\'\');\n        $(\'#bg-list\').querySelectorAll(\'.tag-art-card\').forEach(card => {\n            card.onclick = () => { selected = parseInt(card.dataset.idx, 10); renderList(); };\n        });\n    };\n    showModal(`\n        <button class="btn-icon modal-close" id="modal-cancel" aria-label="关闭">${makeIcon(\'close\', 14, \'#C4B5FD\')}</button>\n        <h3 class="art-text art-text-stroke">人生背景</h3>\n        <p>选择或抽取你的人间起点。属性参考 COC 规则，100 为人类极限，120 为咒术界极限。</p>\n        <div class="tag-list" id="bg-list" style="max-height:52dvh;overflow-y:auto;"></div>\n        <div class="modal-actions">\n          <button class="btn-ghost" id="bg-random">${makeIcon(\'sparkles\', 14, \'#C4B5FD\')} 随机抽取</button>\n          <button class="btn-primary" id="modal-confirm" ${selected >= 0 ? \'\' : \'disabled\'}>确认</button>\n        </div>\n      `);\n    renderList();\n    const confirm = () => {\n        if (selected < 0)\n            return;\n        form.background = BACKGROUNDS[selected];\n        hideModal();\n        overlayBackdropHandler = hideModal;\n        onFormUpdate();\n        focusSlot(slots.find(s => s.id === \'slot-background\'));\n        toast(\'人生背景已铭刻\', \'success\');\n    };\n    const cancel = () => { hideModal(); overlayBackdropHandler = hideModal; };\n    const randomize = () => {\n        const weights = BACKGROUNDS.map(b => { const o = [\'common\', \'uncommon\', \'rare\', \'epic\', \'legendary\', \'mythic\']; return o.indexOf(getRarity(b)) + 1; });\n        const total = weights.reduce((a, b) => a + b, 0);\n        let r = Math.random() * total, idx = 0;\n        for (let i = 0; i < weights.length; i++) {\n            r -= weights[i];\n            if (r <= 0) {\n                idx = i;\n                break;\n            }\n        }\n        selected = idx;\n        renderList();\n    };\n    $(\'#modal-confirm\').onclick = confirm;\n    $(\'#modal-cancel\').onclick = cancel;\n    $(\'#bg-random\').onclick = randomize;\n    overlayBackdropHandler = cancel;\n}\n/* ================= Slot detail modal (click to view full info) ================= */\nfunction openSlotDetail(slot) {\n    const val = form[slot.valuePath];\n    if (slot.id === \'slot-art\') {\n        const arts = Array.isArray(val) ? val : (val ? [val] : []);\n        if (!arts.length) {\n            toast(\'尚未选择术式\', \'warn\');\n            return;\n        }\n        const list = arts.map((a, i) => `\n          <div class="detail-block">\n            <h4 class="detail-title rarity-${getRarity(a)}">${i > 0 ? \'副术式\' : \'主术式\'} · ${escapeHtml(a.name)}</h4>\n            <div class="detail-meta">${escapeHtml(a.school || a.category || a.source || \'未知\')} · ${rarityName(getRarity(a))}${a.source ? \' · 来源：\' + escapeHtml(a.source) : \'\'}</div>\n            ${a.type && a.type !== a.name ? `<div class="detail-meta">类型：${escapeHtml(a.type)}</div>` : \'\'}\n            ${a.desc ? `<p class="detail-desc">${escapeHtml(a.desc)}</p>` : \'\'}\n            ${a.effect ? `<p class="detail-desc"><strong>效果：</strong>${escapeHtml(a.effect)}</p>` : \'\'}\n          </div>\n        `).join(\'<hr class="detail-sep">\');\n        showModal(`\n          <button class="btn-icon modal-close" id="modal-cancel" aria-label="关闭">${makeIcon(\'close\', 14, \'#C4B5FD\')}</button>\n          <h3 class="art-text art-text-stroke">术式详情</h3>\n          <div class="modal-body detail-body">${list}</div>\n          <div class="modal-actions"><button class="btn-ghost" id="modal-cancel-2">关闭</button></div>\n        `);\n    }\n    else if (!val && slot.id !== \'slot-bp\') {\n        toast(\'该维度尚未抽取\', \'warn\');\n        return;\n    }\n    else {\n        let title = slot.label + \'详情\';\n        let body = \'\';\n        switch (slot.id) {\n            case \'slot-timeline\':\n                body = `\n              <h4 class="detail-title rarity-${getRarity(val)}">${escapeHtml(val.era)}</h4>\n              <div class="detail-meta">${escapeHtml(val.year || \'\')} · ${rarityName(getRarity(val))}</div>\n              ${val.desc ? `<p class="detail-desc">${escapeHtml(val.desc)}</p>` : \'\'}`;\n                break;\n            case \'slot-gender\':\n                body = `<h4 class="detail-ti escapeHtml(val.name)}</h4>\n              <div class="detail-meta">${escapeHtml(val.special || \'\')} · ${rarityName(getRarity(val))}</div>\n              ${val.desc ? `<p class="detail-desc">${escapeHtml(val.desc)}</p>` : \'\'}\n              <ul class="detail-list">\n                <li><span class="field-key field-background">家境：</span>${lodashGet(val, \'attrs.家境\', 0)}</li>\n                <li><span class="field-key field-background">天赋：</span>${lodashGet(val, \'attrs.天赋\', 0)}</li>\n                <li><span class="field-key field-background">家庭环境：</span>${lodashGet(val, \'attrs.家庭环境\', 0)}</li>\n              </ul>`;\n                break;\n            case \'slot-bp\': {\n                const tier = BP_TIERS.find(t => form.bp >= t.min && form.bp <= t.max) || BP_TIERS[0];\n                body = `\n              <h4 class="detail-title rarity-${tier.rarity}">${form.bp} BP · Lv.${form.level}</h4>\n              <div class="detail-meta">${escapeHtml(tier.name)} · ${escapeHtml(tier.desc)} · ${rarityName(tier.rarity)}</div>\n              <p class="detail-desc">BP 由身份基础、术式稀有度/来源/领域、天与咒缚、人生背景属性与御三家出身共同推导。</p>`;\n                break;\n            }\n            default:\n                body = `<h4 class="detail-title">${escapeHtml(slot.map(val))}</h4>`;\n        }\n        showModal(`\n          <button class="btn-icon modal-close" id="modal-cancel" aria-label="关闭">${makeIcon(\'close\', 14, \'#C4B5FD\')}</button>\n          <h3 class="art-text art-text-stroke">${escapeHtml(title)}</h3>\n          <div class="modal-body detail-body">${body}</div>\n          <div class="modal-actions"><button class="btn-ghost" id="modal-cancel-2">关闭</button></div>\n        `);\n    }\n    const close = () => { hideModal(); overlayBackdropHandler = hideModal; };\n    $(\'#modal-cancel\').onclick = close;\n    $(\'#modal-cancel-2\').onclick = close;\n    overlayBackdropHandler = close;\n}\n/* ================= Generic edit modal with MVU validation ================= */\nfunction o nput = $(\'#edit-value\');\n    const hint = $(\'#edit-hint\');\n    function validate() {\n        const raw = input.value.trim();\n        let msgs = [];\n        if (!raw)\n            msgs.push(\'内容不能为空。\');\n        if (slot.id === \'slot-location\') {\n            const locs = getLocationsForTimeline(form.timeline);\n            if (!locs.includes(raw))\n                msgs.push(\'该地点不在当前时间线可用列表中，已建议替换为最接近选项。\');\n        }\n        if (slot.id === \'slot-identity\') {\n            const found = IDENTITIES.find(i => i.name === raw);\n            if (!found)\n                msgs.push(\'身份职业不在标准列表中，请从下拉选项选择。\');\n            else {\n                if (form.clan && form.clan.name === \'五条家\' && ![\'御三家外戚子弟\', \'御三家嫡系继承人\', \'五条家\'].some(k => found.name.includes(k) || form.clan.name.includes(k)))\n                    msgs.push(\'五条家出身与所选身份不匹配，建议修正。\');\n                if (form.timeline && typeof isIdentityValidForTimeline === \'function\' && !isIdentityValidForTimeline(found, form.timeline))\n                    msgs.push(`所选身份不适用于 ${form.timeline.era}，建议修正。`);\n            }\n        }\n        hint.innerHTML = msgs.length ? msgs.map(m => `• ${m}`).join(\'<br>\') : \'校验通过。\';\n    }\n    input.oninput = validate;\n    validate();\n    const confirm = () => {\n        let raw = input.value.trim();\n        if (slot.id === \'slot-location\') {\n            const locs = getLocationsForTimeline(form.timeline);\n            if (!locs.includes(raw)) {\n                const closest = locs.find(l => l.includes(raw) || raw.includes(l.split(\'·\').pop())) || locs[0];\n                raw = closest;\n                toast(`地点已自动修正为：${raw}`, \'warn\');\n            }\n            form[slot.valuePath] = raw;\n        }\n        else {\n            const chosen = pool.find(v => slot.map(v) === raw);\n            if (chosen)\n                form[slot.valuePath] = chosen;\n        }\n        hideModal();\n        overlayBackdropHandler = hideModal;\n        onFormUpdate();       form.arts = arts.slice();\n            hideModal();\n            overlayBackdropHandler = hideModal;\n            onFormUpdate();\n            focusSlot(slots.find(s => s.id === \'slot-art\'));\n            toast(\'术式标签已确认\', \'success\');\n        };\n        const cancel = () => { hideModal(); overlayBackdropHandler = hideModal; };\n        $(\'#modal-cancel\').onclick = cancel;\n        $(\'#modal-cancel-2\').onclick = cancel;\n        overlayBackdropHandler = cancel;\n    };\n    render();\n}\n\n/* ================= animation ================= */\n// @ts-nocheck\n/* ================= Particles ================= */\nfunction spawnParticles() {\n    const container = $(\'#particles\');\n    const colors = [\'#6B5A8E\', \'#A855F7\', \'#10B981\', \'#67E8F9\', \'#E8D5FF\'];\n    for (let i = 0; i < 18; i++) {\n        const p = document.createElement(\'div\');\n        p.className = \'particle\';\n        const size = 2 + Math.random() * 5;\n        p.style.width = size + \'px\';\n        p.style.height = size + \'px\';\n        p.style.left = Math.random() * 100 + \'%\';\n        p.style.top = Math.random() * 100 + \'%\';\n        p.style.background = colors[Math.floor(Math.random() * colors.length)];\n        p.style.animationDuration = (8 + Math.random() * 10) + \'s\';\n        p.style.animationDelay = (-Math.random() * 10) + \'s\';\n        container.appendChild(p);\n    }\n}\n/* ================= Reveal animation ================= */\nconst delay = ms => new Promise(r => setTimeout(r, ms));\nfunction getHighestRarity(items) {\n    const order = [\'common\', \'uncommon\', \'rare\', \'epic\', \'legendary\', \'mythic\'];\n    let best = \'common\', bestIdx = 0;\n    items.forEach(item => {\n        const r = getRarity(item);\n        const idx = order.indexOf(r);\n        if (idx > bestIdx) {\n            bestIdx = idx;\n            best = r;\n        }\n    });\n    return best;\n}\nfunction createRevealCard(label, value, rarity) {\n    const card = document.createElement(\'div\');\n    card.className = `reveal-card glass-panel rarity-${rarity}`;\n    card.innerHTML = `\n        <div class="reveal-label art-text art-text-stroke">${escapeHtml(label)}</div>\n        <div class="reveal-value art-text" id="reveal-value-${label.replace(/\\s+/g, \'\')}">${escapeHtml(value)}</div>\n        <div class="reveal-rarity rarity-chip rarity-${rarity}">${makeIcon(\'star\', 10)} ${rarityName(rarity)}</div>\n      `;\n    return card;\n}\nasync function spinRevealCard(card, finalValue, rarity, duration = 2500) {\n    card.classList.add(\'spinning\');\n    const valEl = card.querySelector(\'.reveal-value\');\n    const glyphs = \'咒力術式領域展開無下限十種影法術天与咒縛宿儺五條\';\n    const started = Date.now();\n    while (Date.now() - started < duration) {\n        let s = \'\';\n        for (let i = 0; i < finalValue.length; i++)\n            s += glyphs[Math.floor(Math.random() * glyphs.length)];\n        valEl.textContent = s;\n        await delay(60);\n    }\n    card.classList.remove(\'spinning\');\n    valEl.textContent = finalValue;\n    // swap placeholder rarity → real rarity on both the card root and the chip\n    card.classList.remove(\'rarity-common\');\n    card.classList.add(\'landed\');\n    card.classList.add(`rarity-${rarity}`);\n    const chip = card.querySelector(\'.reveal-rarity\');\n    if (chip) {\n        chip.classList.remove(\'rarity-common\');\n        chip.classList.add(`rarity-${rarity}`);\n        chip.innerHTML = `${makeIcon(\'star\', 10)} ${rarityName(rarity)}`;\n    }\n}\nasync function scrambleBP(container, duration = 1500) {\n    const card = document.createElement(\'div\');\n    card.className = \'reveal-card glass-panel bp-card\';\n    card.innerHTML = `\n        <div class="reveal-label art-text art-text-stroke">BP · 等级</div>\n        <div class="reveal-value art-text" id="bp-scramble">0000 BP · Lv.1</div>\n      `;\n    container.appendChild(card);\n    const valEl = card.querySelector(\'.reveal-value\');\n    const started = Date.now();\n    while (Date.now() - started < duration) {\n        valEl.textContent = `${Math.floor(Math.random() * 9999)} BP · Lv.${Math.floor(Math.random() * 20 + 1)}`;\n        await delay(80);\n    }\n    const tier = BP_TIERS.find(t => form.bp >= t.min && form.bp <= t.max) || BP_TIERS[0];\n    valEl.innerHTML = `<span class="rarity-${tier.rarity}">${form.bp} BP</span> · Lv.${form.level}`;\n    card.classList.add(\'landed\');\n}\nasync function revealGrade(grade) {\n    const overlay = document.createElement(\'div\');\n    overlay.className = \'grade-reveal glass-panel\';\n    overlay.id = \'grade-reveal\';\n    const colorClass = grade.startsWith(\'SS\') ? \'mythic\' : (grade === \'S\' ? \'legendary\' : ([\'A\', \'B\'].includes(grade) ? \'epic\' : ([\'C\', \'D\'].includes(grade) ? \'rare\' : \'common\')));\n    overlay.innerHTML = `\n        <div class="grade-letter grade-${grade} art-text art-text-stroke rarity-${colorClass}">${grade}</div>\n        <div class="grade-sub art-text art-text-stroke">综合评级</div>\n      `;\n    $(\'#stage\').appendChild(overlay);\n    await delay(100);\n    overlay.classList.add(\'active\');\n    await delay(2200);\n    overlay.classList.remove(\'active\');\n    await delay(300);\n    overlay.remove();\n}\nasync function runColorSweep(container) {\n    const sweep = document.createElement(\'div\');\n    sweep.className = \'rarity-sweep\';\n    container.appendChild(sweep);\n    await delay(1200);\n    sweep.remove();\n}\nasync function playRevealAnimation() {\n    showScreen(\'reveal\');\n    const container = $(\'#reveal-slots\');\n    container.innerHTML = \'\';\n    const title = document.createElement(\'div\');\n    title.className = \'reveal-title art-text-gold art-text-stroke\';\n    title.textContent = \'咒力检定中…\';\n    container.appendChild(title);\n    const dims = [\n        { label: \'时代\', value: form.timeline ? form.timeline.era : \'???\', rarity: getRarity(form.timeline) },\n        { label: \'出身\', value: `${f
