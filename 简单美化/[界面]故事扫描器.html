<body>
  <div class="scroll-container">
    <div class="scroll-header" id="toggle-btn">
      <span class="scroll-title">📜 天机推演卷宗（点击展开）</span>
      <span class="scroll-icon" id="toggle-icon">▼</span>
    </div>
    <div class="scroll-content" id="content">
      <div class="loading">正在解读天机...</div>
    </div>
  </div>

  <script type="module">
    function getMessageData() {
      var chatMessages = getChatMessages(getCurrentMessageId());
      if (!chatMessages || chatMessages.length === 0) return null;
      return chatMessages[0].message;
    }

    function extractContent(messageText) {
      var match = messageText.match(/<story_driver>([\s\S]*?)<\/story_driver>/);
      if (match && match[1]) {
        return match[1].trim();
      }
      return "";
    }

    function renderPage(text) {
      var html = '<div class="seal-stamp">天机绝密</div>';
      if (!text) {
        html += '<p>天机混沌，暂无推演记录。</p>';
      } else {
        var lines = text.split('\n');
        lines.forEach(function(line) {
          var trimmed = line.trim();
          if (trimmed) {
            if (trimmed.startsWith('━━')) {
              html += '<p style="font-weight:bold; color:#4a5d45; margin-top:15px; border-bottom:1px dashed #7c8f65; padding-bottom:2px;">' + trimmed + '</p>';
            } else if (trimmed.startsWith('[')) {
              var closeBracketIdx = trimmed.indexOf(']');
              if(closeBracketIdx !== -1) {
                var label = trimmed.substring(0, closeBracketIdx + 1);
                var content = trimmed.substring(closeBracketIdx + 1);
                html += '<p style="color:#2b3a32;"><span style="color:#7c8f65; font-weight:bold; margin-right:4px;">' + label + '</span>' + content + '</p>';
              } else {
                html += '<p>' + trimmed + '</p>';
              }
            } else {
              html += '<p>' + trimmed + '</p>';
            }
          }
        });
      }
      jQuery('#content').html(html);
    }

    function init() {
      try {
        var messageText = getMessageData();
        if (!messageText) {
          jQuery('#content').html('<div class="loading">❌ 无法获取天机卷宗</div>');
          return;
        }
        var text = extractContent(messageText);
        renderPage(text);

        /* 绑定折叠事件 */
        jQuery('#toggle-btn').off('click').on('click', function() {
          jQuery('#content').slideToggle(250);
          jQuery('#toggle-icon').toggleClass('open');
        });
      } catch (error) {
        console.error("错误:", error);
        jQuery('#content').html('<div class="loading">❌ 卷宗损毁：' + error.message + '</div>');
      }
    }

    jQuery(function() { init(); });
  </script>
</body>
</html>
