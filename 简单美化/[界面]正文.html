
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
    }
    .maintext-container {
      width: 100%;
      box-sizing: border-box;
      font-family: "楷体", "KaiTi", "Microsoft YaHei", sans-serif;
      margin: 10px 0;
    }
    .maintext-paper {
      background-color: rgba(244, 247, 237, 0.95); /* 清透护眼的淡青黄纸张色 */
      border: 1px solid rgba(139, 156, 118, 0.5);
      border-radius: 6px;
      padding: 20px 25px;
      color: #24302d;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05), inset 0 0 20px rgba(103,128,121,0.05);
      position: relative;
      overflow: hidden;
    }
    /* 装饰性左侧青绿点缀线 */
    .maintext-paper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(to bottom, transparent, #8b9c76, transparent);
    }
    /* 纸张纹理 */
    .paper-texture {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(139, 156, 118, 0.08) 30px, rgba(139, 156, 118, 0.08) 31px);
      pointer-events: none;
      z-index: 1;
    }
    .maintext-content {
      position: relative;
      z-index: 2;
    }
    .maintext-paragraph {
      text-indent: 2em;
      margin: 0 0 16px 0;
      font-size: 1.08em;
      line-height: 1.85;
      letter-spacing: 1px;
    }
    .maintext-paragraph:last-child {
      margin-bottom: 0;
    }
    .loading-text {
      text-align: center;
      color: #678079;
      font-style: italic;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="maintext-container">
    <div class="maintext-paper">
      <div class="paper-texture"></div>
      <div class="maintext-content" id="main-content">
        <div class="loading-text">正在书写...</div>
      </div>
    </div>
  </div>

  <script type="module">
    /* ========== 获取消息内容 ========== */
    function getMessageData() {
      var chatMessages = getChatMessages(getCurrentMessageId());
      if (!chatMessages || chatMessages.length === 0) {
        return null;
      }
      return chatMessages[0].message;
    }

    /* ========== 提取正文 ========== */
    function extractContent(messageText) {
      var match = messageText.match(/<maintext>([\s\S]*?)<\/maintext>/);
      if (match && match[1]) {
        return match[1].trim();
      }
      return "";
    }

    /* ========== 渲染界面 ========== */
    function renderPage(text) {
      var $content = jQuery('#main-content');
      if (!text) {
        $content.html('<div class="loading-text">纸上暂无墨迹。</div>');
        return;
      }
      
      /* 按双换行分段 */
      var paragraphs = text.split(/\n\s*\n/);
      var html = '';
      paragraphs.forEach(function(p) {
        var trimmed = p.trim();
        if (trimmed) {
          /* 将段内的单换行转为 <br> */
          var innerHtml = trimmed.replace(/\n/g, '<br>');
          html += '<p class="maintext-paragraph">' + innerHtml + '</p>';
        }
      });
      $content.html(html);
    }

    /* ========== 主函数 ========== */
    function init() {
      try {
        var messageText = getMessageData();
        if (!messageText) {
          jQuery('#main-content').html('<div class="loading-text">❌ 无法读取文本</div>');
          return;
        }
        var text = extractContent(messageText);
        renderPage(text);
      } catch (error) {
        console.error("正文渲染错误:", error);
        jQuery('#main-content').html('<div class="loading-text">❌ 渲染失败：' + error.message + '</div>');
      }
    }

    jQuery(function() { init(); });
  </script>
</body>
</html>
