<body>
  <div class="scroll-wrapper">
    <div class="scroll-paper">
      <div class="bamboo-bg"></div>
      <div class="leaf-decoration">🍃</div>
      <div class="story-title">清河传</div>
      <div id="scroll-content">
        <div class="loading-text">正在展开画卷...</div>
      </div>
    </div>
  </div>

  <script type="module">
    /* ========== 获取消息内容 ========== */
    function getMessageData() {
      var chatMessages = getChatMessages(getCurrentMessageId());
      if (!chatMessages || chatMessages.length === 0) {
        return null;
      }
      return chatMessages[0].message;
    }

    /* ========== 提取正文 ========== */
    function extractContent(messageText) {
      var match = messageText.match(/<open>([\s\S]*?)<\/open>/);
      if (match && match[1]) {
        return match[1].trim();
      }
      return "";
    }

    /* ========== 渲染界面 ========== */
    function renderPage(text) {
      var $content = jQuery('#scroll-content');
      if (!text) {
        $content.html('<div class="loading-text">画卷空白，未见笔墨。</div>');
        return;
      }
      
      /* 按双换行分段 */
      var paragraphs = text.split(/\n\s*\n/);
      var html = '';
      paragraphs.forEach(function(p) {
        var trimmed = p.trim();
        if (trimmed) {
          /* 将段内的单换行转为 <br> */
          var innerHtml = trimmed.replace(/\n/g, '<br>');
          html += '<p class="story-paragraph">' + innerHtml + '</p>';
        }
      });
      $content.html(html);
    }

    /* ========== 主函数 ========== */
    function init() {
      try {
        var messageText = getMessageData();
        if (!messageText) {
          jQuery('#scroll-content').html('<div class="loading-text">❌ 无法读取卷宗</div>');
          return;
        }
        var text = extractContent(messageText);
        renderPage(text);
      } catch (error) {
        console.error("画卷渲染错误:", error);
        jQuery('#scroll-content').html('<div class="loading-text">❌ 画卷展开失败：' + error.message + '</div>');
      }
    }

    jQuery(function() { init(); });
  </script>
</body>
</html>
