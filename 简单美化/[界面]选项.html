
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/@fontsource/fusion-pixel-12px-proportional-sc@5.2.5/400.css">
  <style>
    :root {
      --opt-glass-blur: 20px;
      --opt-glass-saturate: 1.35;
      --opt-gold: #c4a574;
      --opt-gold-bright: #e8d5a8;
      --opt-gold-dim: rgba(196, 165, 116, 0.28);
      --opt-glow: rgba(196, 165, 116, 0.22);
      --opt-bg: rgba(243, 238, 228, 0.42);
      --opt-bg-subtle: rgba(237, 232, 218, 0.55);
      --opt-bg-hover: rgba(224, 236, 228, 0.62);
      --opt-bg-btn: rgba(255, 252, 245, 0.38);
      --opt-bg-btn-hover: rgba(210, 230, 218, 0.55);
      --opt-bg-panel: rgba(255, 252, 245, 0.38);
      --opt-border: rgba(255, 255, 255, 0.52);
      --opt-border-strong: rgba(196, 165, 116, 0.45);
      --opt-accent: #5a8470;
      --opt-accent-soft: rgba(77, 117, 100, 0.72);
      --opt-text: #2a3d34;
      --opt-text-muted: #5f7a6d;
      --opt-text-on-accent: #faf8f2;
      --opt-shadow: rgba(42, 61, 52, 0.1);
      --opt-line: rgba(95, 122, 109, 0.06);
      --opt-header-from: rgba(255, 252, 245, 0.58);
      --opt-header-to: rgba(228, 240, 232, 0.48);
      --opt-header-hover-from: rgba(255, 253, 248, 0.68);
      --opt-header-hover-to: rgba(215, 232, 222, 0.58);
      --opt-shine: rgba(255, 255, 255, 0.65);
    }

    [data-theme="dark"] {
      --opt-green-deep: #1a2b24;
      --opt-green-mid: #1f322a;
      --opt-green-line: #23322b;
      --opt-gold: #c9a227;
      --opt-gold-bright: #f5e6b8;
      --opt-gold-dim: rgba(201, 162, 39, 0.14);
      --opt-glow: rgba(212, 175, 55, 0.16);
      --opt-bg: rgba(26, 43, 36, 0.94);
      --opt-bg-subtle: rgba(28, 45, 38, 0.96);
      --opt-bg-hover: rgba(35, 54, 44, 0.88);
      --opt-bg-btn: rgba(24, 40, 33, 0.82);
      --opt-bg-btn-hover: rgba(38, 58, 48, 0.9);
      --opt-bg-panel: rgba(22, 38, 31, 0.86);
      --opt-border: rgba(201, 162, 39, 0.16);
      --opt-border-strong: rgba(212, 175, 55, 0.32);
      --opt-accent: #3d5a4a;
      --opt-accent-soft: rgba(201, 162, 39, 0.2);
      --opt-text: #d4af37;
      --opt-text-muted: #9a7b3a;
      --opt-text-on-accent: #1a2b24;
      --opt-shadow: rgba(0, 0, 0, 0.28);
      --opt-line: rgba(35, 50, 43, 0.95);
      --opt-header-from: rgba(28, 45, 38, 0.98);
      --opt-header-to: rgba(22, 36, 30, 0.96);
      --opt-header-hover-from: rgba(32, 50, 42, 1);
      --opt-header-hover-to: rgba(26, 42, 35, 0.98);
      --opt-shine: rgba(245, 230, 184, 0.06);
      --opt-gild-grad: linear-gradient(180deg, #faf3d0 0%, #e8c872 38%, #d4af37 68%, #a67c00 100%);
      --opt-gild-muted: linear-gradient(180deg, #dcc88a 0%, #b8943a 100%);
    }

    body {
      margin: 0;
      padding: 0;
      background: transparent;
    }

    .opt-container {
      width: 100%;
      box-sizing: border-box;
      font-family: "Fusion Pixel 12px Proportional SC", "Fusion Pixel", monospace;
      font-size: 12px;
      line-height: 1.65;
      margin: 6px 0;
      color: var(--opt-text);
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: unset;
      text-rendering: geometricPrecision;
      position: relative;
    }

    /* 奢华外晕光 */
    .opt-container::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 12px;
      background:
        radial-gradient(ellipse 80% 60% at 12% 0%, var(--opt-glow), transparent 55%),
        radial-gradient(ellipse 60% 50% at 92% 100%, rgba(77, 117, 100, 0.12), transparent 50%),
        linear-gradient(145deg, var(--opt-gold-dim), transparent 42%, transparent 58%, var(--opt-gold-dim));
      pointer-events: none;
      z-index: 0;
      opacity: 0.85;
      transition: opacity 0.45s ease;
    }

    .opt-container.is-expanded::before {
      opacity: 0.55;
    }

    [data-theme="dark"] .opt-container::before {
      background:
        radial-gradient(ellipse 80% 60% at 12% 0%, var(--opt-glow), transparent 55%),
        radial-gradient(ellipse 60% 50% at 92% 100%, rgba(35, 50, 43, 0.35), transparent 50%),
        linear-gradient(145deg, var(--opt-gold-dim), transparent 42%, transparent 58%, var(--opt-gold-dim));
    }

    [data-theme="dark"] .opt-frame {
      border-color: rgba(201, 162, 39, 0.14);
      box-shadow:
        0 8px 32px var(--opt-shadow),
        0 1px 0 rgba(245, 230, 184, 0.05) inset,
        0 0 0 1px rgba(35, 50, 43, 0.6) inset;
    }

    [data-theme="dark"] .opt-content {
      background-color: var(--opt-green-deep);
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 28px,
          var(--opt-green-line) 28px,
          var(--opt-green-line) 29px
        ),
        radial-gradient(ellipse 100% 80% at 50% 0%, var(--opt-gold-dim), transparent 60%);
    }

    /* 夜间鎏金字体 */
    [data-theme="dark"] .opt-title,
    [data-theme="dark"] .opt-btn,
    [data-theme="dark"] .opt-theme-label,
    [data-theme="dark"] .opt-mode-btn {
      background-image: var(--opt-gild-grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    [data-theme="dark"] .opt-mode-btn:not(.active) {
      background-image: var(--opt-gild-muted);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    [data-theme="dark"] .opt-mode-btn.active {
      background: rgba(212, 175, 55, 0.22);
      background-image: none;
      -webkit-text-fill-color: #f5e6b8;
      color: #f5e6b8;
      box-shadow: inset 0 1px 0 rgba(245, 230, 184, 0.12);
    }

    [data-theme="dark"] .opt-icon {
      color: #d4af37;
      text-shadow: 0 0 8px rgba(212, 175, 55, 0.35);
    }

    [data-theme="dark"] .opt-title-gem {
      background: linear-gradient(135deg, #faf3d0, #d4af37);
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.45);
    }

    [data-theme="dark"] .opt-header {
      border-left-color: #d4af37;
    }

    [data-theme="dark"] .opt-btn {
      border-color: rgba(201, 162, 39, 0.12);
    }

    [data-theme="dark"] .opt-btn:hover {
      border-color: rgba(212, 175, 55, 0.28);
      background-color: var(--opt-bg-btn-hover);
      background-image: var(--opt-gild-grad);
    }

    [data-theme="dark"] .opt-btn::before {
      background: linear-gradient(180deg, #faf3d0, #d4af37);
    }

    [data-theme="dark"] .loading {
      background-image: var(--opt-gild-muted);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .opt-frame {
      position: relative;
      z-index: 1;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--opt-border);
      box-shadow:
        0 8px 32px var(--opt-shadow),
        0 1px 0 var(--opt-shine) inset,
        0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      backdrop-filter: blur(var(--opt-glass-blur)) saturate(var(--opt-glass-saturate));
      -webkit-backdrop-filter: blur(var(--opt-glass-blur)) saturate(var(--opt-glass-saturate));
    }

    .opt-header {
      background: linear-gradient(135deg, var(--opt-header-from), var(--opt-header-to));
      border-bottom: 1px solid var(--opt-border);
      border-left: 3px solid var(--opt-gold);
      padding: 5px 11px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--opt-text);
      user-select: none;
      transition: background 0.4s ease, box-shadow 0.4s ease, padding 0.25s ease;
      box-shadow: inset 0 1px 0 var(--opt-shine);
      position: relative;
    }

    .opt-container.is-expanded .opt-header {
      padding: 9px 14px;
    }

    .opt-header::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--opt-gold-bright), transparent);
      opacity: 0.45;
      pointer-events: none;
    }

    .opt-header:hover {
      background: linear-gradient(135deg, var(--opt-header-hover-from), var(--opt-header-hover-to));
    }

    .opt-title-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .opt-title-gem {
      width: 5px;
      height: 5px;
      border-radius: 1px;
      background: linear-gradient(135deg, var(--opt-gold-bright), var(--opt-gold));
      box-shadow: 0 0 8px var(--opt-glow);
      flex-shrink: 0;
      transform: rotate(45deg);
    }

    .opt-title {
      font-weight: normal;
      font-size: 1em;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.35;
    }

    .opt-container.is-expanded .opt-title {
      font-size: 1.08em;
    }

    .opt-header-right {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .opt-theme-cluster {
      display: flex;
      align-items: center;
      padding: 1px 4px;
      border-radius: 999px;
      background: var(--opt-bg-panel);
      border: 1px solid var(--opt-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 var(--opt-shine);
    }

    .opt-theme-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--opt-text-muted);
      font-size: 0.92em;
      padding: 3px 7px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.25s ease;
      white-space: nowrap;
      line-height: 1.2;
    }

    .opt-theme-btn:hover {
      color: var(--opt-text);
      background: var(--opt-bg-hover);
    }

    .opt-theme-btn .opt-theme-label {
      font-size: 0.72em;
      margin-left: 3px;
      letter-spacing: 0.5px;
    }

    .opt-mode {
      display: flex;
      border: 1px solid var(--opt-border);
      border-radius: 999px;
      overflow: hidden;
      background: var(--opt-bg-panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 var(--opt-shine);
    }

    .opt-mode-btn {
      border: none;
      background: transparent;
      color: var(--opt-text-muted);
      font-size: 0.75em;
      line-height: 1;
      padding: 3px 8px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .opt-mode-btn:hover {
      color: var(--opt-text);
      background: var(--opt-bg-hover);
    }

    .opt-mode-btn.active {
      background: var(--opt-accent-soft);
      color: var(--opt-text-on-accent);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .opt-icon {
      transition: transform 0.3s ease, color 0.3s ease;
      color: var(--opt-gold);
      font-size: 0.75em;
      opacity: 0.85;
    }

    .opt-icon.open {
      transform: rotate(180deg);
    }

    .opt-content {
      display: none;
      background: var(--opt-bg);
      padding: 14px;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 28px,
          var(--opt-line) 28px,
          var(--opt-line) 29px
        ),
        radial-gradient(ellipse 100% 80% at 50% 0%, var(--opt-gold-dim), transparent 60%);
      transition: background 0.4s ease;
      backdrop-filter: blur(calc(var(--opt-glass-blur) - 4px));
      -webkit-backdrop-filter: blur(calc(var(--opt-glass-blur) - 4px));
    }

    .opt-btn {
      display: block;
      width: 100%;
      text-align: left;
      background-color: var(--opt-bg-btn);
      border: 1px solid var(--opt-border);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 8px;
      color: var(--opt-text);
      font-size: 1em;
      line-height: 1.65;
      letter-spacing: 0;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 2px 8px var(--opt-shadow),
        inset 0 1px 0 var(--opt-shine);
      position: relative;
      overflow: hidden;
    }

    .opt-btn::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--opt-gold-bright), var(--opt-accent));
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .opt-btn:hover {
      background-color: var(--opt-bg-btn-hover);
      border-color: var(--opt-border-strong);
      transform: translateX(4px);
      box-shadow:
        0 4px 16px var(--opt-shadow),
        inset 0 1px 0 var(--opt-shine);
    }

    .opt-btn:hover::before {
      opacity: 1;
    }

    .opt-btn:last-child {
      margin-bottom: 0;
    }

    .loading {
      text-align: center;
      color: var(--opt-text-muted);
      font-style: italic;
      padding: 10px;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <div class="opt-container" id="opt-container">
    <div class="opt-frame">
      <div class="opt-header" id="opt-header">
        <div class="opt-title-wrap">
          <span class="opt-title-gem" aria-hidden="true"></span>
          <span class="opt-title">命运的抉择 · 点击展开</span>
        </div>
        <div class="opt-header-right">
          <div class="opt-theme-cluster">
            <button type="button" class="opt-theme-btn" id="opt-theme-btn" title="切换昼夜模式">
              <span id="opt-theme-icon">🌙</span><span class="opt-theme-label" id="opt-theme-label">夜间</span>
            </button>
          </div>
          <div class="opt-mode" id="opt-mode">
            <button type="button" class="opt-mode-btn active" data-mode="append" title="每项追加一行到输入栏，暂不发送">追加</button>
            <button type="button" class="opt-mode-btn" data-mode="direct" title="写入输入栏并发送">直接</button>
          </div>
          <span class="opt-icon" id="opt-icon">▼</span>
        </div>
      </div>
      <div class="opt-content" id="opt-body">
        <div class="loading">正在获取选项...</div>
      </div>
    </div>
  </div>

  <script type="module">
    var THEME_KEY = 'opt-ui-theme';

    /* ========== 昼夜模式 ========== */
    function getStoredTheme() {
      try {
        var saved = localStorage.getItem(THEME_KEY);
        if (saved === 'dark' || saved === 'light') return saved;
      } catch (e) {}
      return 'light';
    }

    function updateThemeButton(theme) {
      var isDark = theme === 'dark';
      jQuery('#opt-theme-icon').text(isDark ? '☀️' : '🌙');
      jQuery('#opt-theme-label').text(isDark ? '白天' : '夜间');
      jQuery('#opt-theme-btn').attr('title', isDark ? '切换至护眼白天模式' : '切换至护眼夜间模式');
    }

    function applyTheme(theme) {
      var next = theme === 'dark' ? 'dark' : 'light';
      jQuery('#opt-container').attr('data-theme', next === 'dark' ? 'dark' : null);
      updateThemeButton(next);
      try {
        localStorage.setItem(THEME_KEY, next);
      } catch (e) {}
    }

    function toggleTheme() {
      applyTheme(getStoredTheme() === 'dark' ? 'light' : 'dark');
    }

    function setExpanded(expanded) {
      jQuery('#opt-container').toggleClass('is-expanded', expanded);
    }

    /* ========== 获取消息内容 ========== */
    function getMessageData() {
      var chatMessages = getChatMessages(getCurrentMessageId());
      if (!chatMessages || chatMessages.length === 0) {
        return null;
      }
      return chatMessages[0].message;
    }

    function extractContent(messageText) {
      var match = messageText.match(/<options>([\s\S]*?)<\/options>/);
      if (match && match[1]) {
        return match[1].trim();
      }
      return "";
    }

    /* ========== 输入模式 ========== */
    var inputMode = 'append';

    function getTavernRoot() {
      if (window.parent && window.parent !== window && window.parent.jQuery) {
        return { $: window.parent.jQuery, doc: window.parent.document };
      }
      return { $: jQuery, doc: document };
    }

    function fillTavernInput(text, send) {
      var root = getTavernRoot();
      var $ta = root.$('#send_textarea', root.doc);
      if (!$ta.length) {
        if (typeof triggerSlash === 'function') {
          triggerSlash('/setinput ' + text);
          if (send) triggerSlash('/send ' + text + '|/trigger');
        }
        return;
      }
      $ta.val(text);
      $ta.trigger('input');
      if (send) root.$('#send_but', root.doc).trigger('click');
    }

    function appendToTavernInput(text) {
      var root = getTavernRoot();
      var $ta = root.$('#send_textarea', root.doc);
      if (!$ta.length) {
        if (typeof triggerSlash === 'function') triggerSlash('/setinput ' + text);
        return;
      }
      var current = String($ta.val() || '');
      var next = !current.trim()
        ? text
        : current.endsWith('\n')
          ? current + text
          : current + '\n' + text;
      $ta.val(next);
      $ta.trigger('input');
      $ta.trigger('focus');
      if ($ta[0] && typeof $ta[0].setSelectionRange === 'function') {
        var len = next.length;
        $ta[0].setSelectionRange(len, len);
      }
    }

    function setInputMode(mode) {
      inputMode = mode === 'append' ? 'append' : 'direct';
      jQuery('#opt-mode .opt-mode-btn').removeClass('active');
      jQuery('#opt-mode .opt-mode-btn[data-mode="' + inputMode + '"]').addClass('active');
    }

    window.handleOptionClick = function(btn) {
      var text = btn.getAttribute('data-text');
      if (!text) return;
      if (inputMode === 'append') {
        appendToTavernInput(text);
      } else {
        fillTavernInput(text, true);
      }
    };

    function renderPage(text) {
      if (!text) {
        jQuery('#opt-body').html('<div class="loading">暂无选项。</div>');
        return;
      }

      var options = text.split('|');
      var html = '';
      options.forEach(function(opt) {
        var cleanOpt = opt.trim();
        if (cleanOpt) {
          var safeText = cleanOpt.replace(/"/g, '&quot;');
          html += '<button class="opt-btn" data-text="' + safeText + '" onclick="handleOptionClick(this)">' + cleanOpt + '</button>';
        }
      });

      jQuery('#opt-body').html(html);
    }

    function init() {
      try {
        applyTheme(getStoredTheme());
        setInputMode(inputMode);
        setExpanded(false);

        var messageText = getMessageData();
        if (!messageText) {
          jQuery('#opt-body').html('<div class="loading">❌ 无法获取消息</div>');
          return;
        }

        var text = extractContent(messageText);
        renderPage(text);

        jQuery('#opt-header').off('click').on('click', function(e) {
          if (jQuery(e.target).closest('#opt-mode, #opt-theme-btn').length) return;
          var opening = !jQuery('#opt-body').is(':visible');
          jQuery('#opt-body').slideToggle(250, function() {
            setExpanded(jQuery('#opt-body').is(':visible'));
          });
          jQuery('#opt-icon').toggleClass('open');
        });

        jQuery('#opt-mode').off('click').on('click', '.opt-mode-btn', function(e) {
          e.stopPropagation();
          setInputMode(jQuery(this).attr('data-mode'));
        });

        jQuery('#opt-theme-btn').off('click').on('click', function(e) {
          e.stopPropagation();
          toggleTheme();
        });
      } catch (error) {
        console.error("选项渲染错误:", error);
        jQuery('#opt-body').html('<div class="loading">❌ 渲染失败：' + error.message + '</div>');
      }
    }

    jQuery(function() { init(); });
  </script>
</body>
</html>
