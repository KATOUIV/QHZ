<body>
  <div class="opt-container">
    <div class="opt-header" id="opt-header">
      <span class="opt-title">🎯 命运的抉择（点击展开）</span>
      <div class="opt-header-right">
        <div class="opt-mode" id="opt-mode">
          <button type="button" class="opt-mode-btn" data-mode="append" title="每项追加一行到输入栏，暂不发送">追加</button>
          <button type="button" class="opt-mode-btn active" data-mode="direct" title="写入输入栏并发送">直接</button>
        </div>
        <span class="opt-icon" id="opt-icon">▼</span>
      </div>
    </div>
    <div class="opt-content" id="opt-body">
      <div class="loading">正在获取选项...</div>
    </div>
  </div>

  <script type="module">
    /* ========== 获取消息内容 ========== */
    function getMessageData() {
      var chatMessages = getChatMessages(getCurrentMessageId());
      if (!chatMessages || chatMessages.length === 0) {
        return null;
      }
      return chatMessages[0].message;
    }

    /* ========== 提取内容 ========== */
    function extractContent(messageText) {
      var match = messageText.match(/<options>([\s\S]*?)<\/options>/);
      if (match && match[1]) {
        return match[1].trim();
      }
      return "";
    }

    /* ========== 输入模式 ========== */
    var inputMode = 'direct';

    function getTavernRoot() {
      if (window.parent && window.parent !== window && window.parent.jQuery) {
        return { $: window.parent.jQuery, doc: window.parent.document };
      }
      return { $: jQuery, doc: document };
    }

    /** 写入酒馆输入栏；send=true 时覆盖并发送 */
    function fillTavernInput(text, send) {
      var root = getTavernRoot();
      var $ta = root.$('#send_textarea', root.doc);
      if (!$ta.length) {
        if (typeof triggerSlash === 'function') {
          triggerSlash('/setinput ' + text);
          if (send) triggerSlash('/send ' + text + '|/trigger');
        }
        return;
      }
      $ta.val(text);
      $ta.trigger('input');
      if (send) root.$('#send_but', root.doc).trigger('click');
    }

    /** 追加模式：在输入栏末尾换行追加，不覆盖已有内容 */
    function appendToTavernInput(text) {
      var root = getTavernRoot();
      var $ta = root.$('#send_textarea', root.doc);
      if (!$ta.length) {
        if (typeof triggerSlash === 'function') triggerSlash('/setinput ' + text);
        return;
      }
      var current = String($ta.val() || '');
      var next = !current.trim()
        ? text
        : current.endsWith('\n')
          ? current + text
          : current + '\n' + text;
      $ta.val(next);
      $ta.trigger('input');
      $ta.trigger('focus');
      if ($ta[0] && typeof $ta[0].setSelectionRange === 'function') {
        var len = next.length;
        $ta[0].setSelectionRange(len, len);
      }
    }

    function setInputMode(mode) {
      inputMode = mode === 'append' ? 'append' : 'direct';
      jQuery('#opt-mode .opt-mode-btn').removeClass('active');
      jQuery('#opt-mode .opt-mode-btn[data-mode="' + inputMode + '"]').addClass('active');
    }

    /* ========== 点击事件 ========== */
    window.handleOptionClick = function(btn) {
      var text = btn.getAttribute('data-text');
      if (!text) return;
      if (inputMode === 'append') {
        appendToTavernInput(text);
      } else {
        fillTavernInput(text, true);
      }
    };

    /* ========== 渲染界面 ========== */
    function renderPage(text) {
      if (!text) {
        jQuery('#opt-body').html('<div class="loading">暂无选项。</div>');
        return;
      }
      
      /* 按 | 分割选项 */
      var options = text.split('|');
      var html = '';
      options.forEach(function(opt) {
        var cleanOpt = opt.trim();
        if (cleanOpt) {
          /* 使用 data-text 存储原始文本以避免引号冲突 */
          var safeText = cleanOpt.replace(/"/g, '&quot;');
          html += '<button class="opt-btn" data-text="' + safeText + '" onclick="handleOptionClick(this)">' + cleanOpt + '</button>';
        }
      });
      
      jQuery('#opt-body').html(html);
    }

    /* ========== 主函数 ========== */
    function init() {
      try {
        var messageText = getMessageData();
        if (!messageText) {
          jQuery('#opt-body').html('<div class="loading">❌ 无法获取消息</div>');
          return;
        }
        
        var text = extractContent(messageText);
        renderPage(text);

        /* 绑定折叠展开事件 */
        jQuery('#opt-header').off('click').on('click', function(e) {
          if (jQuery(e.target).closest('#opt-mode').length) return;
          jQuery('#opt-body').slideToggle(250);
          jQuery('#opt-icon').toggleClass('open');
        });

        jQuery('#opt-mode').off('click').on('click', '.opt-mode-btn', function(e) {
          e.stopPropagation();
          setInputMode(jQuery(this).attr('data-mode'));
        });
      } catch (error) {
        console.error("选项渲染错误:", error);
        jQuery('#opt-body').html('<div class="loading">❌ 渲染失败：' + error.message + '</div>');
      }
    }

    jQuery(function() { init(); });
  </script>
</body>
</html>
